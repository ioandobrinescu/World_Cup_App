<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Dobribet — Football Prediction Game</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%E2%9A%BD%3C/text%3E%3C/svg%3E\" />
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<style>
  html, body, #root { margin: 0; padding: 0; min-height: 100vh; background: #0a0e1a; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
  * { box-sizing: border-box; }
  input, select, button { font-family: inherit; }
  #loader {
    position: fixed; inset: 0; background: #0a0e1a; color: #f5c842;
    display: flex; align-items: center; justify-content: center; flex-direction: column;
    gap: 14px; font-weight: 700; z-index: 9999;
    transition: opacity 0.3s;
  }
  #loader.hidden { opacity: 0; pointer-events: none; }
  .spinner {
    width: 36px; height: 36px; border: 3px solid rgba(245,200,66,0.2);
    border-top-color: #f5c842; border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div id="loader">
  <div class="spinner"></div>
  <div>⚽ Loading Dobribet Cloud Backend...</div>
</div>
<div id="root"></div>

<script type="text/babel" data-presets="react">
const { useState, useEffect } = React;

// 🔗 PLUGGED INTO YOUR CLOUD DATABASE
const SUPABASE_URL = "https://mfvwumillzpofmvjibkp.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_QUjFKlHhgcIgisSV-SESdg_49GIA0c0";
const supabase = Supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const ADMIN_USERNAME = "dobrinescu";

const TEAMS = [
  "United States","Canada","Mexico","Argentina","Brazil","Colombia","Ecuador","Paraguay","Uruguay",
  "England","France","Croatia","Norway","Portugal","Germany","Netherlands","Austria","Belgium",
  "Scotland","Spain","Switzerland","Sweden","Türkiye","Bosnia and Herzegovina","Czechia",
  "Algeria","Cabo Verde","Côte d'Ivoire","Egypt","Ghana","Morocco","Senegal","South Africa","Tunisia","DR Congo",
  "Australia","Iran","Japan","Jordan","South Korea","Qatar","Saudi Arabia","Uzbekistan","Iraq",
  "Curaçao","Haiti","Panama","New Zealand"
];

const TOURNAMENT_OPTIONS = ["World Cup 2026","Euro 2028","World Cup 2030","Other"];

function App() {
  // Application Global Real-Time State
  const [session, setSession] = useState(null); // Holds current authenticated Supabase Auth session
  const [profiles, setProfiles] = useState({}); // Mapping of profile rows from DB
  const [currentUserProfile, setCurrentUserProfile] = useState(null);
  const [matches, setMatches] = useState([]);
  const [tournamentConfig, setTournamentConfig] = useState({ tournament_name: "World Cup 2026", tournament_winner: null, champion_odds: {} });
  
  const [page, setPage] = useState("home");
  const [authMode, setAuthMode] = useState("login");
  const [form, setForm] = useState({});
  const [error, setError] = useState("");
  const [adminTab, setAdminTab] = useState("matches");
  const [toast, setToast] = useState("");
  const [tick, setTick] = useState(0);
  const [loading, setLoading] = useState(true);

  // Layout Filters and Form state
  const [scheduleFilter, setScheduleFilter] = useState("ALL");
  const [bulkTeam1, setBulkTeam1] = useState("");
  const [bulkTeam2, setBulkTeam2] = useState("");
  const [bulkDate, setBulkDate] = useState("");
  const [bulkTime, setBulkTime] = useState("20:00");
  const [bulkOdds1, setBulkOdds1] = useState("");
  const [bulkOddsX, setBulkOddsX] = useState("");
  const [bulkOdds2, setBulkOdds2] = useState("");
  const [bulkGroup, setBulkGroup] = useState("");
  const [addError, setAddError] = useState("");

  // Periodical countdown refresher
  useEffect(() => {
    const id = setInterval(() => setTick(t => t + 1), 15000);
    return () => clearInterval(id);
  }, []);

  // Sync state on load and monitor authentication session changes
  useEffect(() => {
    supabase.auth.getSession().then(({ data: { session } }) => {
      setSession(session);
      fetchData(session);
    });

    const { data: { subscription } } = supabase.auth.onAuthStateChange((_event, session) => {
      setSession(session);
      fetchData(session);
    });

    return () => subscription.unsubscribe();
  }, []);

  // Master fetch utility to sync cloud records down into React
  async function fetchData(currentSession) {
    try {
      // 1. Fetch matches
      const { data: matchesData } = await supabase.from('matches').select('*');
      if (matchesData) {
        // map db names into UI fields smoothly
        const normalizedMatches = matchesData.map(m => ({
          id: m.id, team1: m.team1, team2: m.team2,
          date: m.match_date, time: m.match_time,
          odds1: m.odds1, oddsX: m.oddsx, odds2: m.odds2,
          result: m.result, group: m.tournament_stage
        }));
        setMatches(normalizedMatches);
      }

      // 2. Fetch config
      const { data: configData } = await supabase.from('tournament_config').select('*').eq('id', 1).single();
      if (configData) {
        setTournamentConfig({
          tournament_name: configData.tournament_name,
          tournament_winner: configData.tournament_winner,
          champion_odds: configData.champion_odds || {}
        });
      }

      // 3. Fetch player profiles
      const { data: profilesData } = await supabase.from('profiles').select('*');
      if (profilesData) {
        const profileMap = {};
        profilesData.forEach(p => {
          profileMap[p.id] = {
            id: p.id,
            username: p.username,
            isAdmin: p.is_admin,
            championPick: p.champion_pick,
            picks: p.picks || {},
            joinedAt: p.created_at
          };
        });
        setProfiles(profileMap);

        if (currentSession?.user) {
          const userProf = profileMap[currentSession.user.id];
          setCurrentUserProfile(userProf);
          
          // Auto route to panels if logged in and on fallback landing page
          if (page === "home" || page === "auth") {
            setPage(userProf?.isAdmin ? "admin" : "leaderboard");
          }
        } else {
          setCurrentUserProfile(null);
        }
      }
    } catch (err) {
      console.error("Data synchronization error:", err);
    } finally {
      setLoading(false);
      const loader = document.getElementById("loader");
      if (loader) { loader.classList.add("hidden"); }
    }
  }

  function showToast(msg) {
    setToast(msg);
    setTimeout(() => setToast(""), 2800);
  }

  const isAdmin = currentUserProfile?.isAdmin;

  function computeLeaderboard() {
    return Object.values(profiles)
      .filter(u => !u.isAdmin)
      .map(u => {
        let pts = 0;
        matches.forEach(m => {
          if (m.result && u.picks[m.id] === m.result) {
            const odds = m.result === "1" ? m.odds1 : m.result === "X" ? m.oddsX : m.odds2;
            pts += parseFloat(odds) || 0;
          }
        });
        if (tournamentConfig.tournament_winner && u.championPick === tournamentConfig.tournament_winner) {
          pts += parseFloat(tournamentConfig.champion_odds[tournamentConfig.tournament_winner]) || 0;
        }
        return { ...u, computedPoints: Math.round(pts * 100) / 100 };
      })
      .sort((a, b) => b.computedPoints - a.computedPoints);
  }

  async function handleLogin() {
    if (!form.username || !form.password) {
      setError("Username and password are required.");
      return;
    }
    setError("");
    const email = `${form.username.toLowerCase().trim()}@dobribet.local`;
    
    const { data, error: authErr } = await supabase.auth.signInWithPassword({
      email: email,
      password: form.password,
    });

    if (authErr) {
      setError("Invalid username or password.");
      return;
    }
    setForm({});
  }

  async function handleRegister() {
    if (!form.username || !form.password || !form.password2) {
      setError("All fields required."); return;
    }
    if (form.password !== form.password2) {
      setError("Passwords don't match."); return;
    }
    if (form.password.length < 6) {
      setError("Password must be at least 6 characters long."); return;
    }
    const uname = form.username.toLowerCase().trim();
    if (uname === ADMIN_USERNAME) { setError("Username restricted."); return; }
    if (!form.championPick) { setError("Please pick your champion."); return; }

    setError("");
    const fakeEmail = `${uname}@dobribet.local`;

    // 1. Create safe entry inside Supabase Auth Engine
    const { data: authData, error: signupErr } = await supabase.auth.signUp({
      email: fakeEmail,
      password: form.password,
    });

    if (signupErr) {
      setError(signupErr.message.includes("already registered") ? "Username taken." : signupErr.message);
      return;
    }

    if (authData?.user) {
      // 2. Insert player profile link row
      const isFirstAdmin = uname === ADMIN_USERNAME;
      const { error: profileErr } = await supabase.from('profiles').insert([{
        id: authData.user.id,
        username: uname,
        is_admin: isFirstAdmin,
        champion_pick: form.championPick,
        picks: {}
      }]);

      if (profileErr) {
        setError("Error setting up player profile data.");
        return;
      }

      showToast(`Welcome ${uname}! Account registered securely! 🏆`);
      setForm({});
    }
  }

  async function handleLogout() {
    await supabase.auth.signOut();
    setPage("home");
  }

  const kickoffDate = (m) => new Date(m.date + "T" + (m.time || "00:00"));
  const isLocked = (m) => !!m.result || kickoffDate(m) <= new Date();

  const countdown = (m) => {
    const ms = kickoffDate(m) - new Date();
    if (ms <= 0) return null;
    const mins = Math.floor(ms / 60000);
    const days = Math.floor(mins / 1440);
    const hours = Math.floor((mins % 1440) / 60);
    const remMins = mins % 60;
    if (days > 0) return `${days}d ${hours}h`;
    if (hours > 0) return `${hours}h ${remMins}m`;
    if (mins > 0) return `${mins}m`;
    return "<1m";
  };

  async function makePick(matchId, pick) {
    const m = matches.find(x => x.id === matchId);
    if (!m) return;
    if (isLocked(m)) {
      showToast("⛔ Picks are locked — the match has already started.");
      return;
    }

    const updatedPicks = { ...currentUserProfile.picks, [matchId]: pick };
    
    // Cloud upsert pick profile patch
    const { error: updateErr } = await supabase
      .from('profiles')
      .update({ picks: updatedPicks })
      .eq('id', session.user.id);

    if (updateErr) {
      showToast("⛔ Database sync error saving pick.");
      return;
    }

    // Update state locally
    setProfiles(prev => ({
      ...prev,
      [session.user.id]: { ...prev[session.user.id], picks: updatedPicks }
    }));
    setCurrentUserProfile(p => ({ ...p, picks: updatedPicks }));

    showToast(`Pick saved: ${pick === "1" ? m.team1 : pick === "2" ? m.team2 : "Draw"}`);
  }

  // Admin Cloud Operations
  async function adminAddMatch() {
    if (!bulkTeam1 || !bulkTeam2 || !bulkDate || !bulkOdds1 || !bulkOddsX || !bulkOdds2) {
      setAddError("Fill all fields."); return;
    }
    const id = `m_${Date.now()}`;
    const newMatchRow = {
      id,
      team1: bulkTeam1,
      team2: bulkTeam2,
      match_date: bulkDate,
      match_time: bulkTime || "20:00",
      odds1: parseFloat(bulkOdds1),
      oddsx: parseFloat(bulkOddsX),
      odds2: parseFloat(bulkOdds2),
      tournament_stage: bulkGroup || "",
      result: null
    };

    const { error: insertErr } = await supabase.from('matches').insert([newMatchRow]);
    if (insertErr) {
      setAddError("Database entry failure.");
      return;
    }

    setBulkTeam1(""); setBulkTeam2(""); setBulkOdds1(""); setBulkOddsX(""); setBulkOdds2(""); setBulkGroup("");
    setAddError("");
    fetchData(session);
    showToast("Match safely broadcasted to cloud!");
  }

  async function adminSetResult(matchId, result) {
    const { error: updateErr } = await supabase
      .from('matches')
      .update({ result: result })
      .eq('id', matchId);

    if (updateErr) {
      showToast("⛔ Could not publish match outcome.");
      return;
    }
    fetchData(session);
    showToast("Result published successfully!");
  }

  async function adminUndoResult(matchId) {
    await supabase.from('matches').update({ result: null }).eq('id', matchId);
    fetchData(session);
    showToast("Result reverted.");
  }

  async function adminDeleteMatch(matchId) {
    const m = matches.find(x => x.id === matchId);
    if (!m) return;
    if (!window.confirm(`Delete this match completely from cloud?`)) return;
    
    await supabase.from('matches').delete().eq('id', matchId);
    fetchData(session);
    showToast("Match removed.");
  }

  async function adminDeleteUser(userId, username) {
    if (!window.confirm(`Permanently wipe player "${username}" profiles from cloud?`)) return;
    // Removing user profile directly cascade triggers inside our schema
    await supabase.from('profiles').delete().eq('id', userId);
    fetchData(session);
    showToast(`Player "${username}" records deleted.`);
  }

  async function adminUpdateConfig(name, winner) {
    await supabase.from('tournament_config').update({
      tournament_name: name,
      tournament_winner: winner
    }).eq('id', 1);
    fetchData(session);
    showToast("Global tournament settings updated.");
  }

  async function adminUpdateChampionOdds(team, val) {
    const freshOdds = { ...tournamentConfig.champion_odds };
    if (val === "") delete freshOdds[team]; else freshOdds[team] = parseFloat(val);
    
    await supabase.from('tournament_config').update({ champion_odds: freshOdds }).eq('id', 1);
    setTournamentConfig(prev => ({ ...prev, champion_odds: freshOdds }));
  }

  // Pre-compiled filtered views 
  const pickableMatches = matches.filter(m => !isLocked(m)).sort((a, b) => kickoffDate(a) - kickoffDate(b));
  const nextMatchday = pickableMatches.slice(0, 10);
  const matchesAwaitingResult = matches.filter(m => !m.result && kickoffDate(m) <= new Date()).sort((a, b) => kickoffDate(a) - kickoffDate(b));
  const pastMatches = matches.filter(m => m.result).sort((a,b) => kickoffDate(b) - kickoffDate(a));
  const leaderboard = computeLeaderboard();

  const flagEmoji = (team) => {
    const flags = {
      "United States":"🇺🇸","Canada":"🇨🇦","Mexico":"🇲🇽","Argentina":"🇦🇷","Brazil":"🇧🇷","Colombia":"🇨🇴","Ecuador":"🇪🇨","Paraguay":"🇵🇾","Uruguay":"🇺🇾",
      "England":"🏴󠁧󠁢󠁥󠁮󠁧󠁿","France":"🇫🇷","Croatia":"🇭🇷","Norway":"🇳🇴","Portugal":"🇵🇹","Germany":"🇩🇪","Netherlands":"🇳🇱","Austria":"🇦🇹","Belgium":"🇧🇪",
      "Scotland":"🏴󠁧󠁢󠁳󠁣󠁴󠁿","Spain":"🇪🇸","Switzerland":"🇨🇭","Sweden":"🇸🇪","Türkiye":"🇹🇷","Bosnia and Herzegovina":"🇧🇦","Czechia":"🇨🇿",
      "Algeria":"🇩🇿","Cabo Verde":"🇨🇻","Côte d'Ivoire":"🇨🇮","Egypt":"🇪🇬","Ghana":"🇬🇭","Morocco":"🇲🇦","Senegal":"🇸🇳","South Africa":"🇿🇦","Tunisia":"🇹🇳","DR Congo":"🇨🇩",
      "Australia":"🇦🇺","Iran":"🇮🇷","Japan":"🇯🇵","Jordan":"🇯🇴","South Korea":"🇰🇷","Qatar":"🇶🇦","Saudi Arabia":"🇸🇦","Uzbekistan":"🇺🇿","Iraq":"🇮🇶",
      "Curaçao":"🇨🇼","Haiti":"🇭🇹","Panama":"🇵🇦","New Zealand":"🇳🇿"
    };
    return flags[team] || "🏳";
  };

  const styles = {
    app: { minHeight: "100vh", background: "#0a0e1a", color: "#e8eaf0", fontFamily: "'Outfit', 'Segoe UI', sans-serif" },
    nav: { background: "rgba(10,14,26,0.95)", borderBottom: "1px solid rgba(255,255,255,0.08)", padding: "0 24px", display: "flex", alignItems: "center", height: 56, position: "sticky", top: 0, zIndex: 100 },
    logo: { fontWeight: 800, fontSize: 22, color: "#f5c842", letterSpacing: "-0.5px", marginRight: "auto", cursor: "pointer" },
    navBtn: (active) => ({ background: active ? "rgba(245,200,66,0.12)" : "transparent", border: "none", color: active ? "#f5c842" : "rgba(232,234,240,0.6)", padding: "8px 14px", borderRadius: 8, cursor: "pointer", fontSize: 13.5, fontWeight: active ? 600 : 400, transition: "all 0.15s" }),
    hero: { padding: "80px 24px 60px", maxWidth: 820, margin: "0 auto", textAlign: "center" },
    heroTitle: { fontSize: 56, fontWeight: 800, color: "#f5c842", margin: "0 0 12px", lineHeight: 1.1, letterSpacing: "-2px" },
    heroSub: { fontSize: 18, color: "rgba(232,234,240,0.6)", margin: "0 0 48px" },
    card: { background: "rgba(255,255,255,0.04)", border: "1px solid rgba(255,255,255,0.08)", borderRadius: 14, padding: "20px 24px", marginBottom: 16 },
    btn: (variant="primary") => ({ background: variant === "primary" ? "#f5c842" : variant === "danger" ? "#e24b4b" : "rgba(255,255,255,0.07)", color: variant === "primary" ? "#0a0e1a" : "#e8eaf0", border: "none", borderRadius: 10, padding: "10px 20px", fontWeight: 700, fontSize: 14, cursor: "pointer", transition: "opacity 0.15s" }),
    pickBtn: (selected, type) => {
      const colors = { "1": "#4caf50", "X": "#f5c842", "2": "#2196f3" };
      return { background: selected ? colors[type] : "rgba(255,255,255,0.06)", color: selected ? "#0a0e1a" : "#e8eaf0", border: `1.5px solid ${selected ? colors[type] : "rgba(255,255,255,0.12)"}`, borderRadius: 8, padding: "8px 14px", cursor: "pointer", fontWeight: 700, fontSize: 13, minWidth: 52 };
    },
    input: { background: "rgba(255,255,255,0.06)", border: "1px solid rgba(255,255,255,0.12)", borderRadius: 10, color: "#e8eaf0", padding: "10px 14px", fontSize: 14, width: "100%", outline: "none" },
    label: { fontSize: 12, color: "rgba(232,234,240,0.5)", marginBottom: 5, display: "block" },
    badge: (color) => ({ background: color === "gold" ? "rgba(245,200,66,0.15)" : color === "green" ? "rgba(76,175,80,0.15)" : "rgba(255,255,255,0.08)", color: color === "gold" ? "#f5c842" : color === "green" ? "#4caf50" : "rgba(232,234,240,0.5)", borderRadius: 6, padding: "3px 10px", fontSize: 12, fontWeight: 600 }),
    podium: [
      { bg: "rgba(255,215,0,0.12)", border: "rgba(255,215,0,0.3)", color: "#ffd700", rank: "🥇" },
      { bg: "rgba(192,192,192,0.1)", border: "rgba(192,192,192,0.25)", color: "#c0c0c0", rank: "🥈" },
      { bg: "rgba(205,127,50,0.1)", border: "rgba(205,127,50,0.25)", color: "#cd7f32", rank: "🥉" },
    ],
  };

  const ToastEl = toast ? (
    <div style={{ position: "fixed", bottom: 24, left: "50%", transform: "translateX(-50%)", background: "#f5c842", color: "#0a0e1a", padding: "12px 24px", borderRadius: 12, fontWeight: 700, fontSize: 14, zIndex: 9999, boxShadow: "0 4px 20px rgba(0,0,0,0.3)" }}>{toast}</div>
  ) : null;

  // ---- RENDER VIEWS ----

  function LandingPage() {
    return (
      <div style={styles.hero}>
        <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet" />
        <div style={{ fontSize: 48, marginBottom: 8 }}>⚽</div>
        <h1 style={styles.heroTitle}>Dobribet</h1>
        <p style={styles.heroSub}>The ultimate football prediction game. Sourced securely from cloud servers.</p>
        <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit,minmax(220px,1fr))", gap: 16, marginBottom: 48, textAlign: "left" }}>
          {[
            ["⚽", "Pick the result", "Choose 1, X, or 2 for each match before kickoff."],
            ["📊", "Real odds, real stakes", "Correct picks earn you those fractional odds straight as points."],
            ["🏆", "Predict the champion", "Pick your tournament champion. Big rewards unlocked at final whistles."],
            ["🥇", "Climb the leaderboard", "Compete live with friends across multiple locations simultaneously."],
          ].map(([icon, title, desc]) => (
            <div key={title} style={{ ...styles.card, padding: "18px 20px" }}>
              <div style={{ fontSize: 26, marginBottom: 8 }}>{icon}</div>
              <div style={{ fontWeight: 700, fontSize: 15, marginBottom: 6 }}>{title}</div>
              <div style={{ fontSize: 13, color: "rgba(232,234,240,0.55)", lineHeight: 1.6 }}>{desc}</div>
            </div>
          ))}
        </div>
        <div style={{ display: "flex", gap: 12, justifyContent: "center" }}>
          <button style={{ ...styles.btn("primary"), padding: "13px 32px", fontSize: 15 }} onClick={() => { setAuthMode("register"); setPage("auth"); }}>Join the game</button>
          <button style={{ ...styles.btn("ghost"), padding: "13px 32px", fontSize: 15, border: "1px solid rgba(255,255,255,0.12)" }} onClick={() => { setAuthMode("login"); setPage("auth"); }}>Sign in</button>
        </div>
      </div>
    );
  }

  function AuthPage() {
    return (
      <div style={{ maxWidth: 420, margin: "60px auto", padding: "0 24px" }}>
        <div style={styles.card}>
          <div style={{ textAlign: "center", marginBottom: 24 }}>
            <div style={{ fontSize: 32, marginBottom: 8 }}>⚽</div>
            <div style={{ fontSize: 22, fontWeight: 800, color: "#f5c842" }}>Dobribet</div>
          </div>
          <div style={{ display: "flex", marginBottom: 20, background: "rgba(255,255,255,0.04)", borderRadius: 10, padding: 3 }}>
            {["login","register"].map(m => (
              <button key={m} style={{ flex: 1, background: authMode === m ? "rgba(245,200,66,0.15)" : "transparent", border: "none", color: authMode === m ? "#f5c842" : "rgba(232,234,240,0.5)", padding: "9px 0", borderRadius: 8, cursor: "pointer", fontWeight: 600, fontSize: 13.5 }} onClick={() => { setAuthMode(m); setError(""); }}>
                {m === "login" ? "Sign in" : "Register"}
              </button>
            ))}
          </div>

          {authMode === "login" ? (
            <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>
              <div><label style={styles.label}>Username</label><input style={styles.input} value={form.username||""} onChange={e=>setForm(p=>({...p,username:e.target.value}))} onKeyDown={e=>e.key==="Enter"&&handleLogin()} /></div>
              <div><label style={styles.label}>Password</label><input style={styles.input} type="password" value={form.password||""} onChange={e=>setForm(p=>({...p,password:e.target.value}))} onKeyDown={e=>e.key==="Enter"&&handleLogin()} /></div>
              {error && <div style={{ color: "#e24b4b", fontSize: 13 }}>{error}</div>}
              <button style={{ ...styles.btn("primary"), padding: "12px", fontSize: 15 }} onClick={handleLogin}>Sign in</button>
            </div>
          ) : (
            <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>
              <div><label style={styles.label}>Username</label><input style={styles.input} value={form.username||""} onChange={e=>setForm(p=>({...p,username:e.target.value}))} /></div>
              <div><label style={styles.label}>Password</label><input style={styles.input} type="password" value={form.password||""} onChange={e=>setForm(p=>({...p,password:e.target.value}))} /></div>
              <div><label style={styles.label}>Confirm password</label><input style={styles.input} type="password" value={form.password2||""} onChange={e=>setForm(p=>({...p,password2:e.target.value}))} /></div>
              <div>
                <label style={styles.label}>🏆 Tournament champion prediction</label>
                <select style={styles.input} value={form.championPick||""} onChange={e=>setForm(p=>({...p,championPick:e.target.value}))}>
                  <option value="">Pick the winner...</option>
                  {TEAMS.map(t=><option key={t} value={t}>{flagEmoji(t)} {t}</option>)}
                </select>
              </div>
              {error && <div style={{ color: "#e24b4b", fontSize: 13 }}>{error}</div>}
              <button style={{ ...styles.btn("primary"), padding: "12px", fontSize: 15 }} onClick={handleRegister}>Create account</button>
            </div>
          )}
        </div>
      </div>
    );
  }

  function LeaderboardPage() {
    const lb = leaderboard;
    const myRank = session?.user ? lb.findIndex(u => u.id === session.user.id) + 1 : 0;
    
    return (
      <div style={{ maxWidth: 700, margin: "0 auto", padding: "32px 24px" }}>
        <div style={{ marginBottom: 28 }}>
          <h2 style={{ margin: "0 0 4px", fontSize: 26, fontWeight: 800 }}>Leaderboard</h2>
          <p style={{ margin: 0, color: "rgba(232,234,240,0.5)", fontSize: 14 }}>{tournamentConfig.tournament_name} — {lb.length} players</p>
        </div>

        {tournamentConfig.tournament_winner && (
          <div style={{ ...styles.card, background: "rgba(245,200,66,0.08)", border: "1px solid rgba(245,200,66,0.25)", marginBottom: 20, display: "flex", alignItems: "center", gap: 12 }}>
            <div style={{ fontSize: 28 }}>🏆</div>
            <div>
              <div style={{ fontWeight: 700, color: "#f5c842" }}>Tournament winner: {flagEmoji(tournamentConfig.tournament_winner)} {tournamentConfig.tournament_winner}</div>
            </div>
          </div>
        )}

        {currentUserProfile && myRank > 0 && (
          <div style={{ ...styles.card, background: "rgba(245,200,66,0.06)", border: "1px solid rgba(245,200,66,0.2)", marginBottom: 24 }}>
            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between" }}>
              <div>
                <div style={{ fontSize: 12, color: "rgba(232,234,240,0.4)" }}>Your position</div>
                <div style={{ fontWeight: 800, fontSize: 20 }}>#{myRank} — {currentUserProfile.username}</div>
              </div>
              <div style={{ textAlign: "right" }}>
                <div style={{ fontSize: 28, fontWeight: 800, color: "#f5c842" }}>{(lb.find(x=>x.id===session.user.id)?.computedPoints || 0).toFixed(2)}</div>
                <div style={{ fontSize: 11, color: "rgba(232,234,240,0.4)" }}>pts</div>
              </div>
            </div>
            <div style={{ marginTop: 10, display: "flex", gap: 10 }}>
              <span style={styles.badge("gold")}>🏆 {currentUserProfile.championPick || "No pick"}</span>
            </div>
          </div>
        )}

        {lb.length > 0 && (
          <div style={{ display: "grid", gridTemplateColumns: "repeat(3,1fr)", gap: 12, marginBottom: 20 }}>
            {lb.slice(0,3).map((u, i) => (
              <div key={u.id} style={{ ...styles.card, background: styles.podium[i]?.bg, border: `1px solid ${styles.podium[i]?.border}`, textAlign: "center", padding: "16px 12px" }}>
                <div style={{ fontSize: 26, marginBottom: 4 }}>{styles.podium[i]?.rank}</div>
                <div style={{ fontWeight: 800, fontSize: 14, color: styles.podium[i]?.color, marginBottom: 2 }}>{u.username}</div>
                <div style={{ fontSize: 20, fontWeight: 800 }}>{u.computedPoints.toFixed(2)}</div>
                {u.championPick && <div style={{ fontSize: 11, marginTop: 6, color: "rgba(232,234,240,0.45)" }}>{flagEmoji(u.championPick)} {u.championPick}</div>}
              </div>
            ))}
          </div>
        )}

        {lb.slice(3).map((u, i) => (
          <div key={u.id} style={{ ...styles.card, display: "flex", alignItems: "center", gap: 14, padding: "14px 20px" }}>
            <div style={{ width: 28, textAlign: "center", fontWeight: 700, color: "rgba(232,234,240,0.3)" }}>#{i+4}</div>
            <div style={{ flex: 1 }}>
              <div style={{ fontWeight: 600, fontSize: 14 }}>{u.username}</div>
              <div style={{ fontSize: 12, color: "rgba(232,234,240,0.4)" }}>{flagEmoji(u.championPick)} {u.championPick}</div>
            </div>
            <div style={{ fontWeight: 800, fontSize: 18 }}>{u.computedPoints.toFixed(2)}</div>
          </div>
        ))}
      </div>
    );
  }

  function NextMatchdayPage() {
    return (
      <div style={{ maxWidth: 700, margin: "0 auto", padding: "32px 24px" }}>
        <div style={{ marginBottom: 28 }}>
          <h2 style={{ margin: "0 0 4px", fontSize: 26, fontWeight: 800 }}>Next matchday</h2>
          <p style={{ margin: 0, color: "rgba(232,234,240,0.5)", fontSize: 14 }}>⏱ Picks lock the moment a match kicks off</p>
        </div>
        {nextMatchday.length === 0 ? (
          <div style={{ textAlign: "center", padding: "60px 0", color: "rgba(232,234,240,0.3)" }}>No upcoming matches with odds yet. Check back soon!</div>
        ) : (
          nextMatchday.map(m => {
            const userPick = currentUserProfile?.picks?.[m.id];
            const cd = countdown(m);
            return (
              <div key={m.id} style={styles.card}>
                <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 14 }}>
                  <div>
                    <div style={{ fontWeight: 800, fontSize: 17 }}>{flagEmoji(m.team1)} {m.team1} vs {m.team2} {flagEmoji(m.team2)}</div>
                    <div style={{ fontSize: 12, color: "rgba(232,234,240,0.4)", marginTop: 3 }}>{m.date} · {m.time} {m.group && `· ${m.group}`}</div>
                  </div>
                  {cd && <span style={styles.badge("gold")}>⏱ {cd}</span>}
                </div>
                <div style={{ display: "flex", gap: 10 }}>
                  {[["1", m.odds1, m.team1], ["X", m.oddsX, "Draw"], ["2", m.odds2, m.team2]].map(([val, odds, label]) => (
                    <button key={val} style={{ ...styles.pickBtn(userPick === val, val), flex: 1, display: "flex", flexDirection: "column", alignItems: "center" }} onClick={() => makePick(m.id, val)}>
                      <span style={{ fontSize: 11, opacity: 0.6 }}>{label}</span>
                      <span style={{ fontSize: 16 }}>{val}</span>
                      <span style={{ fontSize: 13, fontWeight: 800 }}>{odds}</span>
                    </button>
                  ))}
                </div>
              </div>
            );
          })
        )}
      </div>
    );
  }

  function PastMatchesPage() {
    return (
      <div style={{ maxWidth: 700, margin: "0 auto", padding: "32px 24px" }}>
        <div style={{ marginBottom: 28 }}>
          <h2 style={{ margin: "0 0 4px", fontSize: 26, fontWeight: 800 }}>Results</h2>
        </div>
        {pastMatches.map(m => {
          const userPick = currentUserProfile?.picks?.[m.id];
          const correct = userPick === m.result;
          return (
            <div key={m.id} style={{ ...styles.card, background: correct ? "rgba(76,175,80,0.05)" : "rgba(255,255,255,0.04)" }}>
              <div style={{ display: "flex", justifyContent: "space-between" }}>
                <div style={{ fontWeight: 800 }}>{flagEmoji(m.team1)} {m.team1} vs {m.team2} {flagEmoji(m.team2)}</div>
                <div style={{ color: "#f5c842", fontWeight: 700 }}>Result: {m.result}</div>
              </div>
              <div style={{ marginTop: 10 }}>
                {userPick ? <span style={styles.badge(correct ? "green" : "")}>Your pick: {userPick}</span> : <span>No pick made</span>}
              </div>
            </div>
          );
        })}
      </div>
    );
  }

  function SchedulePage() {
    const visible = matches.filter(m => {
      if (scheduleFilter === "UPCOMING") return !m.result;
      if (scheduleFilter === "RESULTS") return !!m.result;
      return true;
    });

    return (
      <div style={{ maxWidth: 760, margin: "0 auto", padding: "32px 24px" }}>
        <div style={{ display: "flex", gap: 8, marginBottom: 24 }}>
          {["ALL", "UPCOMING", "RESULTS"].map(f => (
            <button key={f} style={styles.btn(scheduleFilter===f?"primary":"ghost")} onClick={()=>setScheduleFilter(f)}>{f}</button>
          ))}
        </div>
        {visible.map(m => (
          <div key={m.id} style={styles.card}>
            <div style={{ display: "grid", gridTemplateColumns: "1fr auto 1fr", alignItems: "center", textAlign: "center" }}>
              <div>{flagEmoji(m.team1)} {m.team1}</div>
              <div style={{ fontWeight: 800, background: "rgba(255,255,255,0.05)", padding: "4px 12px", borderRadius: 6 }}>
                {m.result ? `FT: ${m.result}` : m.time}
              </div>
              <div>{m.team2} {flagEmoji(m.team2)}</div>
            </div>
          </div>
        ))}
      </div>
    );
  }

  function AdminPage() {
    return (
      <div style={{ maxWidth: 780, margin: "0 auto", padding: "32px 24px" }}>
        <div style={{ display: "flex", gap: 8, marginBottom: 24 }}>
          {["matches","results","tournament","players"].map(k => (
            <button key={k} style={styles.btn(adminTab===k?"primary":"ghost")} onClick={() => setAdminTab(k)}>{k.toUpperCase()}</button>
          ))}
        </div>

        {adminTab === "matches" && (
          <div>
            <div style={styles.card}>
              <div style={{ fontWeight: 700, marginBottom: 16 }}>Add Match Form</div>
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
                <select style={styles.input} value={bulkTeam1} onChange={e=>setBulkTeam1(e.target.value)}><option value="">Home...</option>{TEAMS.map(t=><option key={t}>{t}</option>)}</select>
                <select style={styles.input} value={bulkTeam2} onChange={e=>setBulkTeam2(e.target.value)}><option value="">Away...</option>{TEAMS.map(t=><option key={t}>{t}</option>)}</select>
                <input type="date" style={styles.input} value={bulkDate} onChange={e=>setBulkDate(e.target.value)} />
                <input type="time" style={styles.input} value={bulkTime} onChange={e=>setBulkTime(e.target.value)} />
                <input type="number" step="0.01" style={styles.input} placeholder="Odds 1" value={bulkOdds1} onChange={e=>setBulkOdds1(e.target.value)} />
                <input type="number" step="0.01" style={styles.input} placeholder="Odds X" value={bulkOddsX} onChange={e=>setBulkOddsX(e.target.value)} />
                <input type="number" step="0.01" style={styles.input} placeholder="Odds 2" value={bulkOdds2} onChange={e=>setBulkOdds2(e.target.value)} />
                <input style={styles.input} placeholder="Stage (e.g. Group A)" value={bulkGroup} onChange={e=>setBulkGroup(e.target.value)} />
              </div>
              {addError && <div style={{ color: "#e24b4b", marginTop: 8 }}>{addError}</div>}
              <button style={{ ...styles.btn("primary"), marginTop: 16 }} onClick={adminAddMatch}>Add match to Cloud</button>
            </div>

            {matches.filter(m => !m.result).map(m => (
              <div key={m.id} style={{ ...styles.card, display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                <div>{m.team1} vs {m.team2} ({m.date})</div>
                <button style={styles.btn("danger")} onClick={() => adminDeleteMatch(m.id)}>Delete</button>
              </div>
            ))}
          </div>
        )}

        {adminTab === "results" && (
          <div>
            {matchesAwaitingResult.map(m => (
              <div key={m.id} style={styles.card}>
                <div style={{ fontWeight: 700, marginBottom: 10 }}>{m.team1} vs {m.team2}</div>
                <div style={{ display: "flex", gap: 10 }}>
                  <button style={styles.btn("ghost")} onClick={() => adminSetResult(m.id, "1")}>1</button>
                  <button style={styles.btn("ghost")} onClick={() => adminSetResult(m.id, "X")}>X</button>
                  <button style={styles.btn("ghost")} onClick={() => adminSetResult(m.id, "2")}>2</button>
                </div>
              </div>
            ))}
            {pastMatches.map(m => (
              <div key={m.id} style={{ ...styles.card, display: "flex", justifyContent: "space-between" }}>
                <div>{m.team1} vs {m.team2} [Outcome: {m.result}]</div>
                <button style={styles.btn("ghost")} onClick={() => adminUndoResult(m.id)}>Undo</button>
              </div>
            ))}
          </div>
        )}

        {adminTab === "tournament" && (
          <div style={styles.card}>
            <label style={styles.label}>Tournament Settings Name</label>
            <input style={{ ...styles.input, marginBottom: 14 }} value={tournamentConfig.tournament_name} onChange={e => adminUpdateConfig(e.target.value, tournamentConfig.tournament_winner)} />
            
            <label style={styles.label}>Tournament Winner Champion</label>
            <select style={styles.input} value={tournamentConfig.tournament_winner || ""} onChange={e => adminUpdateConfig(tournamentConfig.tournament_name, e.target.value || null)}>
              <option value="">Undecided</option>
              {TEAMS.map(t => <option key={t} value={t}>{t}</option>)}
            </select>

            <div style={{ marginTop: 20, display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
              {TEAMS.map(t => (
                <div key={t} style={{ display: "flex", alignItems: "center", background: "rgba(255,255,255,0.02)", padding: 6, borderRadius: 6 }}>
                  <span style={{ flex: 1, fontSize: 12 }}>{t}</span>
                  <input type="number" step="0.01" style={{ ...styles.input, width: 70 }} value={tournamentConfig.champion_odds[t] || ""} onChange={e => adminUpdateChampionOdds(t, e.target.value)} />
                </div>
              ))}
            </div>
          </div>
        )}

        {adminTab === "players" && (
          <div>
            {Object.values(profiles).map(u => (
              <div key={u.id} style={{ ...styles.card, display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                <div><strong>{u.username}</strong> {u.isAdmin && "(Admin)"} — Choice: {u.championPick}</div>
                {!u.isAdmin && <button style={styles.btn("danger")} onClick={() => adminDeleteUser(u.id, u.username)}>Wipe Account</button>}
              </div>
            ))}
          </div>
        )}
      </div>
    );
  }

  const playerTabs = [["leaderboard", "Leaderboard"], ["picks", "Next Matchday"], ["results", "Results"], ["schedule", "Schedule"]];

  return (
    <div style={styles.app}>
      {ToastEl}
      <nav style={styles.nav}>
        <div style={styles.logo} onClick={() => setPage(isAdmin ? "admin" : session ? "leaderboard" : "home")}>⚽ Dobribet</div>
        {session ? (
          <>
            {isAdmin ? (
              <button style={styles.navBtn(page==="admin")} onClick={() => setPage("admin")}>Admin Panel</button>
            ) : (
              playerTabs.map(([key, label]) => <button key={key} style={styles.navBtn(page===key)} onClick={() => setPage(key)}>{label}</button>)
            )}
            <div style={{ marginLeft: 12, display: "flex", alignItems: "center", gap: 10 }}>
              <span style={{ fontSize: 13, color: "rgba(232,234,240,0.4)" }}>{currentUserProfile?.username}</span>
              <button style={{ ...styles.btn("ghost"), padding: "7px 14px", fontSize: 13 }} onClick={handleLogout}>Sign out</button>
            </div>
          </>
        ) : (
          <div style={{ display: "flex", gap: 8 }}>
            <button style={{ ...styles.btn("ghost"), padding: "7px 16px", fontSize: 13 }} onClick={() => { setAuthMode("login"); setPage("auth"); }}>Sign in</button>
            <button style={{ ...styles.btn("primary"), padding: "7px 16px", fontSize: 13 }} onClick={() => { setAuthMode("register"); setPage("auth"); }}>Join</button>
          </div>
        )}
      </nav>

      {loading ? null : (
        <>
          {!session && page === "home" && LandingPage()}
          {!session && page === "auth" && AuthPage()}
          {session && !isAdmin && page === "leaderboard" && LeaderboardPage()}
          {session && !isAdmin && page === "picks" && NextMatchdayPage()}
          {session && !isAdmin && page === "results" && PastMatchesPage()}
          {session && !isAdmin && page === "schedule" && SchedulePage()}
          {session && isAdmin && AdminPage()}
        </>
      )}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>
</body>
</html>
