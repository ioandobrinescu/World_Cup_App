<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Pariuri World Cup 2026</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%8F%86%3C/text%3E%3C/svg%3E" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root {
  --pitch: #0b1e12;
  --pitch-mid: #112518;
  --pitch-light: #163020;
  --gold: #f0b429;
  --gold-light: #ffd166;
  --gold-dim: rgba(240,180,41,0.15);
  --red: #e63946;
  --green: #52c41a;
  --blue: #4895ef;
  --white: #f0f4f0;
  --muted: rgba(240,244,240,0.45);
  --card: rgba(255,255,255,0.04);
  --card-border: rgba(255,255,255,0.07);
  --radius: 14px;
  --radius-sm: 8px;
  --font-display: 'Barlow Condensed', sans-serif;
  --font-body: 'Barlow', sans-serif;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html {
  background: var(--pitch);
  min-height: 100%;
}

body {
  font-family: var(--font-body);
  color: var(--white);
  min-height: 100vh;
  background:
    radial-gradient(ellipse 120% 60% at 50% -10%, rgba(20,70,30,0.9) 0%, transparent 70%),
    radial-gradient(ellipse 80% 40% at 80% 110%, rgba(10,40,20,0.6) 0%, transparent 60%),
    var(--pitch);
  -webkit-font-smoothing: antialiased;
  padding-bottom: env(safe-area-inset-bottom, 0);
  overflow-x: hidden;
}

/* Grass line texture overlay */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image: repeating-linear-gradient(
    180deg,
    transparent 0px,
    transparent 38px,
    rgba(255,255,255,0.012) 38px,
    rgba(255,255,255,0.012) 40px
  );
  pointer-events: none;
  z-index: 0;
}

#root { position: relative; z-index: 1; }

input, select, button, textarea { font-family: var(--font-body); }

/* LOADER */
#loader {
  position: fixed; inset: 0;
  background: var(--pitch);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 16px; z-index: 9999;
  transition: opacity 0.4s ease;
}
#loader.hidden { opacity: 0; pointer-events: none; }
.loader-ball {
  width: 52px; height: 52px;
  background: radial-gradient(circle at 35% 35%, #fff 0%, #bbb 40%, #555 100%);
  border-radius: 50%;
  animation: bounce 0.7s ease-in-out infinite alternate;
  box-shadow: 0 0 30px rgba(240,180,41,0.3);
}
@keyframes bounce {
  from { transform: translateY(-14px) rotate(-10deg); }
  to   { transform: translateY(8px) rotate(10deg); box-shadow: 0 20px 30px rgba(0,0,0,0.5); }
}
.loader-text {
  font-family: var(--font-display);
  font-weight: 800;
  font-size: 13px;
  letter-spacing: 3px;
  color: var(--gold);
  text-transform: uppercase;
}

/* NAV */
.topnav {
  position: sticky; top: 0; z-index: 100;
  display: flex; align-items: center;
  padding: 0 20px;
  height: 58px;
  background: rgba(11,30,18,0.92);
  backdrop-filter: blur(16px);
  border-bottom: 1px solid rgba(240,180,41,0.15);
}
.nav-logo {
  font-family: var(--font-display);
  font-weight: 900;
  font-size: 20px;
  letter-spacing: 0.5px;
  color: var(--gold);
  display: flex; align-items: center; gap: 8px;
}
.nav-logo span { color: var(--white); }
.nav-right {
  margin-left: auto;
  display: flex; align-items: center; gap: 10px;
}
.nav-user {
  font-family: var(--font-display);
  font-weight: 700;
  font-size: 14px;
  letter-spacing: 0.5px;
  color: var(--gold);
}
.btn-ghost {
  background: transparent;
  border: 1px solid rgba(255,255,255,0.18);
  color: var(--muted);
  font-size: 11px;
  font-weight: 600;
  padding: 5px 12px;
  border-radius: 20px;
  cursor: pointer;
  letter-spacing: 0.5px;
  transition: all 0.2s;
}
.btn-ghost:hover { border-color: var(--gold); color: var(--gold); }

/* BOTTOM NAV */
.bottom-nav {
  position: fixed; bottom: 0; left: 0; right: 0;
  height: calc(62px + env(safe-area-inset-bottom, 0px));
  padding-bottom: env(safe-area-inset-bottom, 0px);
  background: rgba(9,24,14,0.97);
  backdrop-filter: blur(20px);
  border-top: 1px solid rgba(240,180,41,0.12);
  display: flex;
  justify-content: space-around;
  align-items: center;
  z-index: 900;
}
.nav-btn {
  background: transparent; border: none;
  color: var(--muted);
  display: flex; flex-direction: column; align-items: center;
  gap: 4px; font-size: 10px; font-weight: 600;
  cursor: pointer; flex: 1; height: 62px;
  justify-content: center;
  letter-spacing: 0.5px;
  text-transform: uppercase;
  transition: all 0.2s;
  position: relative;
}
.nav-btn.active { color: var(--gold); }
.nav-btn.active::before {
  content: '';
  position: absolute;
  top: 0; left: 50%;
  transform: translateX(-50%);
  width: 28px; height: 2px;
  background: var(--gold);
  border-radius: 0 0 3px 3px;
}
.nav-btn-icon { font-size: 22px; line-height: 1; }

/* LAYOUT */
.page-body { padding-bottom: 80px; }
.container {
  max-width: 680px;
  margin: 0 auto;
  padding: 20px 16px;
}

/* CARDS */
.card {
  background: var(--card);
  border: 1px solid var(--card-border);
  border-radius: var(--radius);
  padding: 18px 20px;
  margin-bottom: 12px;
  position: relative;
  overflow: hidden;
}
.card-gold {
  background: linear-gradient(135deg, rgba(240,180,41,0.08) 0%, rgba(11,30,18,0.8) 100%);
  border-color: rgba(240,180,41,0.25);
}
.card-pitch {
  background: linear-gradient(135deg, rgba(22,48,32,0.9) 0%, rgba(11,30,18,0.95) 100%);
  border-color: rgba(255,255,255,0.06);
}

/* INPUTS */
.input {
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: var(--radius-sm);
  color: var(--white);
  padding: 12px 14px;
  font-size: 15px;
  width: 100%;
  outline: none;
  transition: border-color 0.2s;
  -webkit-appearance: none;
}
.input:focus { border-color: rgba(240,180,41,0.5); }
.input::placeholder { color: var(--muted); }
.input option { background: #0b1e12; }

/* BUTTONS */
.btn {
  border: none;
  border-radius: var(--radius-sm);
  padding: 13px 24px;
  font-family: var(--font-display);
  font-weight: 800;
  font-size: 15px;
  letter-spacing: 0.8px;
  cursor: pointer;
  transition: all 0.15s;
  text-transform: uppercase;
  display: inline-flex; align-items: center; justify-content: center;
}
.btn:active { transform: scale(0.97); }
.btn-gold { background: linear-gradient(135deg, #f0b429, #e09a10); color: #0b1e12; }
.btn-gold:hover { background: linear-gradient(135deg, #ffd166, #f0b429); }
.btn-danger { background: rgba(230,57,70,0.15); color: var(--red); border: 1px solid rgba(230,57,70,0.3); }
.btn-danger:hover { background: rgba(230,57,70,0.25); }
.btn-green { background: rgba(82,196,26,0.15); color: var(--green); border: 1px solid rgba(82,196,26,0.3); }
.btn-sm { padding: 7px 14px; font-size: 12px; }
.btn-block { width: 100%; }

/* BADGES */
.badge {
  display: inline-block;
  border-radius: 20px;
  padding: 3px 10px;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.5px;
  text-transform: uppercase;
}
.badge-gold { background: var(--gold-dim); color: var(--gold); }
.badge-green { background: rgba(82,196,26,0.12); color: var(--green); }
.badge-red { background: rgba(230,57,70,0.12); color: var(--red); }
.badge-muted { background: rgba(255,255,255,0.06); color: var(--muted); }

/* PICK BUTTONS */
.pick-row { display: flex; gap: 8px; }
.pick-btn {
  flex: 1; border-radius: var(--radius-sm);
  padding: 12px 8px;
  display: flex; flex-direction: column; align-items: center; gap: 3px;
  cursor: pointer;
  border: 1.5px solid rgba(255,255,255,0.08);
  background: rgba(255,255,255,0.04);
  transition: all 0.15s;
}
.pick-btn:active { transform: scale(0.96); }
.pick-btn-label { font-size: 10px; font-weight: 700; letter-spacing: 0.5px; color: var(--muted); text-transform: uppercase; }
.pick-btn-odds { font-family: var(--font-display); font-size: 18px; font-weight: 900; color: var(--white); }
.pick-btn.selected-1 { background: rgba(82,196,26,0.15); border-color: var(--green); }
.pick-btn.selected-1 .pick-btn-odds, .pick-btn.selected-1 .pick-btn-label { color: var(--green); }
.pick-btn.selected-X { background: rgba(240,180,41,0.15); border-color: var(--gold); }
.pick-btn.selected-X .pick-btn-odds, .pick-btn.selected-X .pick-btn-label { color: var(--gold); }
.pick-btn.selected-2 { background: rgba(72,149,239,0.15); border-color: var(--blue); }
.pick-btn.selected-2 .pick-btn-odds, .pick-btn.selected-2 .pick-btn-label { color: var(--blue); }

/* DISTRIBUTION BAR */
.dist-bar { height: 4px; border-radius: 2px; overflow: hidden; background: rgba(255,255,255,0.05); display: flex; margin-top: 10px; }
.dist-seg { height: 100%; transition: width 0.4s ease; }

/* TOAST */
.toast {
  position: fixed; top: 70px; left: 50%; transform: translateX(-50%);
  background: linear-gradient(135deg, #f0b429, #e09a10);
  color: #0b1e12;
  padding: 11px 22px;
  border-radius: 30px;
  font-family: var(--font-display);
  font-weight: 800;
  font-size: 14px;
  letter-spacing: 0.5px;
  z-index: 9999;
  box-shadow: 0 8px 28px rgba(240,180,41,0.35);
  white-space: nowrap;
  animation: toastIn 0.3s ease;
  pointer-events: none;
}
@keyframes toastIn {
  from { opacity: 0; top: 60px; }
  to   { opacity: 1; top: 70px; }
}

/* SECTION HEADINGS */
.section-label {
  font-family: var(--font-display);
  font-weight: 800;
  font-size: 11px;
  letter-spacing: 2.5px;
  text-transform: uppercase;
  color: var(--gold);
  margin-bottom: 4px;
}
.section-title {
  font-family: var(--font-display);
  font-weight: 900;
  font-size: 26px;
  letter-spacing: -0.5px;
  line-height: 1;
  margin-bottom: 16px;
}

/* MATCH CARD */
.match-header {
  display: flex; justify-content: space-between; align-items: center;
  font-size: 11px; color: var(--muted); font-weight: 600;
  text-transform: uppercase; letter-spacing: 0.5px;
  margin-bottom: 14px;
}
.match-teams {
  display: flex; align-items: center; justify-content: center;
  gap: 12px;
  font-family: var(--font-display);
  font-weight: 800;
  font-size: 17px;
  text-align: center;
  margin-bottom: 14px;
}
.match-team { display: flex; flex-direction: column; align-items: center; gap: 3px; flex: 1; }
.match-flag { font-size: 28px; line-height: 1; }
.match-team-name { font-size: 13px; font-weight: 800; letter-spacing: 0.3px; }
.match-vs {
  font-family: var(--font-display);
  font-size: 13px;
  font-weight: 700;
  color: var(--muted);
  flex-shrink: 0;
}

/* LEADERBOARD */
.lb-row {
  display: flex; align-items: center; gap: 14px;
  padding: 14px 18px;
  border-radius: var(--radius);
  background: var(--card);
  border: 1px solid var(--card-border);
  margin-bottom: 8px;
  cursor: pointer;
  transition: background 0.2s, border-color 0.2s;
}
.lb-row:hover { background: rgba(255,255,255,0.06); border-color: rgba(240,180,41,0.2); }
.lb-row.gold-row { background: rgba(240,180,41,0.07); border-color: rgba(240,180,41,0.25); }
.lb-rank-num {
  font-family: var(--font-display);
  font-size: 22px; font-weight: 900;
  width: 36px; text-align: center; flex-shrink: 0;
}
.lb-rank-num.top3 { color: var(--gold); }
.lb-delta { font-size: 10px; font-weight: 800; text-align: center; }
.lb-name { font-family: var(--font-display); font-size: 17px; font-weight: 800; }
.lb-sub { font-size: 12px; color: var(--muted); margin-top: 1px; }
.lb-pts { font-family: var(--font-display); font-size: 22px; font-weight: 900; color: var(--gold); }
.lb-wins { font-size: 11px; color: var(--muted); text-align: right; }

/* PROFILE HEADER */
.profile-hero {
  background: linear-gradient(135deg, rgba(22,48,32,0.95) 0%, rgba(17,37,24,0.95) 100%);
  border: 1px solid rgba(240,180,41,0.2);
  border-radius: var(--radius);
  padding: 22px 20px;
  margin-bottom: 12px;
  display: flex; align-items: center; gap: 16px;
}
.profile-avatar {
  width: 56px; height: 56px;
  background: linear-gradient(135deg, var(--gold), #b87f10);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-family: var(--font-display);
  font-size: 22px; font-weight: 900;
  color: #0b1e12;
  flex-shrink: 0;
}
.profile-name { font-family: var(--font-display); font-size: 26px; font-weight: 900; line-height: 1; }
.profile-rank { font-family: var(--font-display); font-size: 28px; font-weight: 900; color: var(--gold); }

/* HOME / AUTH */
.home-hero {
  text-align: center;
  padding: 60px 20px 40px;
}
.hero-badge {
  display: inline-flex; align-items: center; gap: 6px;
  background: var(--gold-dim);
  border: 1px solid rgba(240,180,41,0.2);
  color: var(--gold);
  font-family: var(--font-display);
  font-size: 11px; font-weight: 800;
  letter-spacing: 2px;
  padding: 5px 14px;
  border-radius: 20px;
  text-transform: uppercase;
  margin-bottom: 20px;
}
.hero-title {
  font-family: var(--font-display);
  font-weight: 900;
  font-size: clamp(44px, 12vw, 72px);
  line-height: 0.9;
  letter-spacing: -1px;
  margin-bottom: 8px;
}
.hero-title .accent { color: var(--gold); }
.hero-sub {
  font-size: 15px;
  color: var(--muted);
  max-width: 380px;
  margin: 0 auto 36px;
  line-height: 1.55;
}

/* AUTH TABS */
.auth-tabs {
  display: flex;
  background: rgba(255,255,255,0.03);
  border-radius: var(--radius-sm);
  padding: 4px;
  margin-bottom: 20px;
}
.auth-tab {
  flex: 1; padding: 10px;
  background: transparent; border: none;
  font-family: var(--font-display);
  font-size: 14px; font-weight: 700;
  letter-spacing: 0.5px; text-transform: uppercase;
  color: var(--muted);
  cursor: pointer; border-radius: 6px;
  transition: all 0.2s;
}
.auth-tab.active {
  background: var(--gold-dim);
  color: var(--gold);
}

/* GATEWAY */
.gateway-wrap {
  display: flex; flex-direction: column; align-items: center;
  text-align: center;
  padding: 80px 20px 40px;
  max-width: 480px;
  margin: 0 auto;
}
.countdown-display {
  font-family: var(--font-display);
  font-size: clamp(36px, 9vw, 56px);
  font-weight: 900;
  letter-spacing: 2px;
  color: var(--white);
  background: rgba(240,180,41,0.06);
  border: 1px solid rgba(240,180,41,0.2);
  border-radius: var(--radius);
  padding: 20px 28px;
  width: 100%;
  margin: 16px 0 32px;
}

/* ADMIN */
.admin-tabs {
  display: flex; gap: 4px;
  background: rgba(255,255,255,0.03);
  padding: 4px; border-radius: var(--radius-sm);
  margin-bottom: 20px; overflow-x: auto;
}
.admin-tab {
  flex: 1; min-width: 68px; padding: 9px 6px;
  background: transparent; border: none;
  font-family: var(--font-display);
  font-size: 12px; font-weight: 800; letter-spacing: 0.5px;
  text-transform: uppercase; color: var(--muted);
  cursor: pointer; border-radius: 6px;
  white-space: nowrap;
  transition: all 0.2s;
}
.admin-tab.active { background: var(--gold); color: #0b1e12; }

/* MODAL */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.75);
  backdrop-filter: blur(8px);
  display: flex; align-items: flex-end;
  justify-content: center;
  z-index: 1000;
  padding: 0;
}
@media (min-width: 500px) {
  .modal-overlay { align-items: center; padding: 20px; }
}
.modal-content {
  background: #0d1f14;
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: var(--radius) var(--radius) 0 0;
  width: 100%;
  max-height: 88vh;
  overflow-y: auto;
  padding: 24px 20px;
}
@media (min-width: 500px) {
  .modal-content {
    border-radius: var(--radius);
    max-width: 520px;
  }
}
.modal-handle {
  width: 36px; height: 4px;
  background: rgba(255,255,255,0.15);
  border-radius: 2px;
  margin: 0 auto 16px;
}
@media (min-width: 500px) { .modal-handle { display: none; } }

/* RESULT HISTORY */
.history-row {
  display: flex; justify-content: space-between; align-items: center;
  padding: 12px 16px;
  background: rgba(255,255,255,0.02);
  border: 1px solid rgba(255,255,255,0.04);
  border-radius: var(--radius-sm);
  margin-bottom: 8px;
  border-left-width: 3px;
}
.history-row.win { border-left-color: var(--green); }
.history-row.loss { border-left-color: var(--red); }
.history-row.neutral { border-left-color: rgba(255,255,255,0.08); }

/* MVP BANNER */
.mvp-banner {
  background: linear-gradient(135deg, #1a2d12 0%, #3a3010 100%);
  border: 1px solid var(--gold);
  border-radius: var(--radius);
  padding: 16px 20px;
  text-align: center;
  margin-bottom: 16px;
  position: relative; overflow: hidden;
}
.mvp-banner::before {
  content: '⭐';
  position: absolute; font-size: 80px;
  opacity: 0.06; top: -10px; right: -10px;
}

/* RESULT PILL */
.result-pill {
  display: inline-flex; align-items: center; gap: 6px;
  background: rgba(82,196,26,0.12);
  border: 1px solid rgba(82,196,26,0.25);
  color: var(--green);
  padding: 4px 12px;
  border-radius: 20px;
  font-family: var(--font-display);
  font-size: 12px; font-weight: 800;
  text-transform: uppercase; letter-spacing: 0.5px;
}

/* CHAMPION CARD */
.champion-card {
  background: linear-gradient(135deg, rgba(17,37,24,0.95) 0%, rgba(22,48,32,0.95) 100%);
  border: 1px solid rgba(240,180,41,0.3);
  border-radius: var(--radius);
  padding: 18px 20px;
  margin-bottom: 12px;
}

/* GRID HELPERS */
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.flex-col { display: flex; flex-direction: column; gap: 12px; }
.flex-row { display: flex; align-items: center; gap: 10px; }

/* DIVIDER */
.divider {
  height: 1px;
  background: rgba(255,255,255,0.06);
  margin: 16px 0;
}

/* SCORE TAG on locked matches */
.score-tag {
  font-family: var(--font-display);
  font-size: 13px; font-weight: 800;
  background: rgba(255,255,255,0.06);
  padding: 3px 10px; border-radius: 20px;
  color: var(--muted);
}

/* ODDS STRIP on matchday cards */
.odds-strip {
  display: flex; gap: 6px; margin-top: 12px;
}

/* ADMIN MATCH ROW */
.admin-match-row {
  display: flex; justify-content: space-between; align-items: center;
  padding: 12px 16px;
  background: rgba(255,255,255,0.02);
  border: 1px solid var(--card-border);
  border-radius: var(--radius-sm);
  margin-bottom: 8px;
}

/* SCROLLBAR */
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(240,180,41,0.2); border-radius: 3px; }

/* RESPONSIVE */
@media (min-width: 600px) {
  .page-body { padding-bottom: 40px; }
  .bottom-nav { display: none; }
  .topnav-desktop-tabs { display: flex !important; }
}
.topnav-desktop-tabs { display: none; }
.desktop-tab {
  background: transparent; border: none;
  font-family: var(--font-display);
  font-size: 13px; font-weight: 700;
  letter-spacing: 0.5px; text-transform: uppercase;
  color: var(--muted);
  cursor: pointer; padding: 8px 14px;
  border-radius: 6px;
  transition: all 0.2s;
  white-space: nowrap;
}
.desktop-tab.active { color: var(--gold); background: var(--gold-dim); }

/* LIVE badge */
.live-badge {
  display: inline-flex; align-items: center; gap: 4px;
  background: rgba(230,57,70,0.15);
  border: 1px solid rgba(230,57,70,0.3);
  color: var(--red);
  font-family: var(--font-display);
  font-size: 10px; font-weight: 800;
  letter-spacing: 1px;
  padding: 3px 10px;
  border-radius: 20px;
  text-transform: uppercase;
}
.live-dot {
  width: 6px; height: 6px;
  background: var(--red);
  border-radius: 50%;
  animation: pulse 1s ease infinite;
}
@keyframes pulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.4; transform: scale(0.7); }
}

/* Error text */
.error-text { color: var(--red); font-size: 13px; font-weight: 600; margin-top: 4px; }

/* Champion odds badge in select */
select option { background: #0b1e12; }
</style>
</head>
<body>

<div id="loader">
  <div class="loader-ball"></div>
  <div class="loader-text">Loading Arena...</div>
</div>

<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useMemo } = React;

const SUPABASE_URL = "https://mfvwumillzpofmvjibkp.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_QUjFKlHhgcIgisSV-SESdg_49GIA0c0";
const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const API_FOOTBALL_KEY = "YOUR_API_FOOTBALL_KEY_HERE";
const API_LEAGUE_ID = 1;
const API_SEASON = 2026;

const TEAMS = [
  "United States","Canada","Mexico","Argentina","Brazil","Colombia","Ecuador","Paraguay","Uruguay",
  "England","France","Croatia","Norway","Portugal","Germany","Netherlands","Austria","Belgium",
  "Scotland","Spain","Switzerland","Sweden","Türkiye","Bosnia and Herzegovina","Czechia",
  "Algeria","Cabo Verde","Côte d'Ivoire","Egypt","Ghana","Morocco","Senegal","South Africa","Tunisia","DR Congo",
  "Australia","Iran","Japan","Jordan","South Korea","Qatar","Saudi Arabia","Uzbekistan","Iraq",
  "Curaçao","Haiti","Panama","New Zealand"
].sort();

const WORLD_CUP_KICKOFF = new Date("2026-06-11T20:00:00Z");

const flagEmoji = (team) => {
  if (!team || typeof team !== 'string') return "🏳️";
  const flags = {
    "United States":"🇺🇸","Canada":"🇨🇦","Mexico":"🇲🇽","Argentina":"🇦🇷","Brazil":"🇧🇷","Colombia":"🇨🇴",
    "Ecuador":"🇪🇨","Paraguay":"🇵🇾","Uruguay":"🇺🇾","England":"🏴󠁧󠁢󠁥󠁮󠁧󠁿","France":"🇫🇷","Croatia":"🇭🇷",
    "Norway":"🇳🇴","Portugal":"🇵🇹","Germany":"🇩🇪","Netherlands":"🇳🇱","Austria":"🇦🇹","Belgium":"🇧🇪",
    "Scotland":"🏴󠁧󠁢󠁳󠁣󠁴󠁿","Spain":"🇪🇸","Switzerland":"🇨🇭","Sweden":"🇸🇪","Türkiye":"🇹🇷",
    "Bosnia and Herzegovina":"🇧🇦","Czechia":"🇨🇿","Algeria":"🇩🇿","Cabo Verde":"🇨🇻",
    "Côte d'Ivoire":"🇨🇮","Egypt":"🇪🇬","Ghana":"🇬🇭","Morocco":"🇲🇦","Senegal":"🇸🇳",
    "South Africa":"🇿🇦","Tunisia":"🇹🇳","DR Congo":"🇨🇩","Australia":"🇦🇺","Iran":"🇮🇷",
    "Japan":"🇯🇵","Jordan":"🇯🇴","South Korea":"🇰🇷","Qatar":"🇶🇦","Saudi Arabia":"🇸🇦",
    "Uzbekistan":"🇺🇿","Iraq":"🇮🇶","Curaçao":"🇨🇼","Haiti":"🇭🇹","Panama":"🇵🇦","New Zealand":"🇳🇿"
  };
  return flags[team] || "🏴‍☠️";
};

function App() {
  const [session, setSession] = useState(() => {
    try { return JSON.parse(localStorage.getItem("pariuri_session")); } catch { return null; }
  });
  const [users, setUsers] = useState({});
  const [matches, setMatches] = useState([]);
  const [tournamentConfig, setTournamentConfig] = useState({ tournament_name: "World Cup 2026", tournament_winner: null, champion_odds: {} });
  const [page, setPage] = useState("home");
  const [authMode, setAuthMode] = useState("login");
  const [form, setForm] = useState({ username: "", password: "", favoriteTeam: "" });
  const [error, setError] = useState("");
  const [toast, setToast] = useState("");
  const [adminTab, setAdminTab] = useState("matches");
  const [inspectUser, setInspectUser] = useState(null);
  const [inspectMatchBets, setInspectMatchBets] = useState(null);
  const [globalTimer, setGlobalTimer] = useState("");
  const [isTournamentBegun, setIsTournamentBegun] = useState(false);
  const [matchForm, setMatchForm] = useState({ team1: "", team2: "", date: "", time: "21:00", odds1: "", oddsX: "", odds2: "", stage: "", apiFixtureId: "" });

  async function fetchAllData() {
    try {
      const { data: m } = await supabaseClient.from('matches').select('*');
      if (m) setMatches(m);
      const { data: p } = await supabaseClient.from('profiles').select('*');
      if (p) {
        const mapped = {};
        p.forEach(u => {
          if (u.username) {
            mapped[u.username.toLowerCase().trim()] = {
              id: u.id, username: String(u.username), password: String(u.password),
              isAdmin: u.is_admin || false, favoriteTeam: u.favorite_team ? String(u.favorite_team) : "",
              tournamentWinnerPick: u.tournament_winner_pick ? String(u.tournament_winner_pick) : null,
              isPickLocked: u.is_pick_locked || false,
              picks: u.picks && typeof u.picks === 'object' ? u.picks : {},
              previousRank: u.previous_rank || 0
            };
          }
        });
        setUsers(mapped);
      }
      const { data: cfg } = await supabaseClient.from('tournament_config').select('*').eq('id', 1).maybeSingle();
      if (cfg) setTournamentConfig({ tournament_name: cfg.tournament_name || "World Cup 2026", tournament_winner: cfg.tournament_winner || null, champion_odds: cfg.champion_odds || {} });
    } catch (ex) { console.error(ex); }
  }

  useEffect(() => {
    fetchAllData().then(() => {
      const el = document.getElementById("loader");
      if (el) el.classList.add("hidden");
    });
    const interval = setInterval(fetchAllData, 20000);
    return () => clearInterval(interval);
  }, []);

  useEffect(() => {
    if (session) {
      localStorage.setItem("pariuri_session", JSON.stringify(session));
      const targetUser = users[session.username.toLowerCase()];
      if (targetUser?.isAdmin) { setPage("admin"); }
      else if (page === "home") {
        const timeRemaining = WORLD_CUP_KICKOFF - new Date();
        setPage(timeRemaining > 0 ? "gateway" : "profile");
      }
    } else {
      localStorage.removeItem("pariuri_session");
    }
  }, [session, users]);

  useEffect(() => {
    function computeTimer() {
      const remaining = WORLD_CUP_KICKOFF - new Date();
      if (remaining <= 0) { setIsTournamentBegun(true); setGlobalTimer("AO VIU"); return; }
      const days = Math.floor(remaining / 86400000);
      const hours = Math.floor((remaining % 86400000) / 3600000);
      const minutes = Math.floor((remaining % 3600000) / 60000);
      const seconds = Math.floor((remaining % 60000) / 1000);
      setGlobalTimer(`${days}z ${hours}h ${minutes}m ${seconds}s`);
    }
    computeTimer();
    const id = setInterval(computeTimer, 1000);
    return () => clearInterval(id);
  }, []);

  function triggerToast(msg) { setToast(msg); setTimeout(() => setToast(""), 2800); }

  const currentUser = (session && users[session.username.toLowerCase()]) ? users[session.username.toLowerCase()] : null;

  const sortedLeaderboard = useMemo(() => {
    return Object.values(users).filter(u => !u.isAdmin).map(u => {
      let pts = 0, correctWins = 0;
      matches.forEach(m => {
        if (m.result && u.picks && u.picks[m.id] === m.result) {
          correctWins++;
          pts += parseFloat(m.result === "1" ? m.odds1 : m.result === "X" ? m.oddsx : m.odds2) || 0;
        }
      });
      if (tournamentConfig.tournament_winner && u.tournamentWinnerPick === tournamentConfig.tournament_winner)
        pts += parseFloat(tournamentConfig.champion_odds[tournamentConfig.tournament_winner]) || 0;
      return { ...u, totalPoints: Math.round(pts * 100) / 100, correctWins };
    }).sort((a, b) => b.totalPoints - a.totalPoints || b.correctWins - a.correctWins);
  }, [users, matches, tournamentConfig]);

  const matchdayMvpNode = useMemo(() => {
    const mds = [...new Set(matches.filter(m => m.result).map(m => parseInt(m.matchday) || 1))];
    if (!mds.length) return null;
    const latestMD = Math.max(...mds);
    const scores = Object.values(users).filter(u => !u.isAdmin).map(u => {
      let mdWins = 0, mdPts = 0;
      matches.filter(m => parseInt(m.matchday) === latestMD && m.result).forEach(m => {
        if (u.picks?.[m.id] === m.result) {
          mdWins++;
          mdPts += parseFloat(m.result === "1" ? m.odds1 : m.result === "X" ? m.oddsx : m.odds2) || 0;
        }
      });
      return { username: u.username, mdWins, mdPts };
    }).sort((a, b) => b.mdWins - a.mdWins || b.mdPts - a.mdPts);
    return (scores[0] && scores[0].mdWins > 0) ? { matchday: latestMD, username: scores[0].username, wins: scores[0].mdWins } : null;
  }, [users, matches]);

  function runLogin() {
    if (!form.username || !form.password) { setError("Completați toate câmpurile"); return; }
    const target = users[form.username.trim().toLowerCase()];
    if (!target || target.password !== form.password) { setError("Date invalide"); return; }
    setError(""); setSession({ username: target.username });
  }

  async function runRegister() {
    if (!form.username || !form.password || !form.favoriteTeam) { setError("Completați toate câmpurile"); return; }
    const normalized = form.username.trim().toLowerCase();
    if (users[normalized]) { setError("Username deja folosit"); return; }
    const isSystemAdmin = normalized === "dobrinescu" && form.password === "admin123";
    const generatedEmail = `${normalized}@pariuriwc2026.com`;
    const { data: authWrap, error: authErr } = await supabaseClient.auth.signUp({ email: generatedEmail, password: form.password });
    if (authErr) { setError(authErr.message); return; }
    if (authWrap.user) {
      const { error: profErr } = await supabaseClient.from('profiles').insert([{
        id: authWrap.user.id, username: form.username.trim(), password: form.password,
        is_admin: isSystemAdmin, favorite_team: form.favoriteTeam,
        tournament_winner_pick: null, is_pick_locked: false, picks: {}, previous_rank: 0
      }]);
      if (profErr) { setError(profErr.message); return; }
    }
    await fetchAllData();
    setSession({ username: form.username.trim() });
  }

  async function submitPrediction(matchId, outcome) {
    const m = matches.find(x => x.id === matchId);
    if (!m || m.result || new Date(m.match_date + "T" + m.match_time) <= new Date()) {
      triggerToast("🔒 Predicțiile sunt închise"); return;
    }
    const localUpdated = { ...(currentUser.picks || {}), [matchId]: outcome };
    const { error: updateErr } = await supabaseClient.from('profiles').update({ picks: localUpdated }).eq('username', currentUser.username);
    if (updateErr) { triggerToast("❌ Eroare de sincronizare"); return; }
    setUsers(prev => ({ ...prev, [currentUser.username.toLowerCase()]: { ...currentUser, picks: localUpdated } }));
    triggerToast("⚽ Predicție salvată!");
  }

  async function updateChampionPrediction(team) {
    if (currentUser.isPickLocked || isTournamentBegun) return;
    await supabaseClient.from('profiles').update({ tournament_winner_pick: team || null }).eq('username', currentUser.username);
    fetchAllData(); triggerToast("🏆 Campion actualizat");
  }

  async function lockChampionChoice() {
    if (!currentUser.tournamentWinnerPick) { triggerToast("Selectați mai întâi o echipă"); return; }
    if (!window.confirm("Blocați selecția definitiv?")) return;
    await supabaseClient.from('profiles').update({ is_pick_locked: true }).eq('username', currentUser.username);
    fetchAllData(); triggerToast("🔒 Campion blocat!");
  }

  function computeGlobalBetDistribution(matchId) {
    const pool = Object.values(users).filter(u => !u.isAdmin).map(u => u.picks?.[matchId]).filter(Boolean);
    if (!pool.length) return { p1: 33, pX: 34, p2: 33 };
    const c = { "1": 0, "X": 0, "2": 0 };
    pool.forEach(v => { if (c[v] !== undefined) c[v]++; });
    const tot = pool.length;
    return { p1: Math.round((c["1"]/tot)*100), pX: Math.round((c["X"]/tot)*100), p2: Math.round((c["2"]/tot)*100) };
  }

  async function adminFetchLiveResults() {
    if (API_FOOTBALL_KEY === "YOUR_API_FOOTBALL_KEY_HERE") { alert("Adaugați cheia API_FOOTBALL_KEY"); return; }
    triggerToast("🔄 Contactare API-Football...");
    try {
      const res = await fetch(`https://v3.football.api-sports.io/fixtures?league=${API_LEAGUE_ID}&season=${API_SEASON}`, { headers: { "x-apisports-key": API_FOOTBALL_KEY } });
      const data = await res.json();
      if (!data.response?.length) { alert("Niciun răspuns primit"); return; }
      let count = 0;
      for (const item of data.response) {
        const fixId = item.fixture.id.toString();
        const status = item.fixture.status.short;
        const local = matches.find(x => x.api_fixture_id === fixId);
        if (local && !local.result && ["FT","AET","PEN"].includes(status)) {
          const h = item.goals.home, a = item.goals.away;
          await commitMatchResultWithRankSnapshot(local.id, h > a ? "1" : a > h ? "2" : "X");
          count++;
        }
      }
      await fetchAllData(); alert(`Sincronizare completă: ${count} meciuri finalizate.`);
    } catch (err) { alert(`Eroare: ${err.message}`); }
  }

  async function commitMatchResultWithRankSnapshot(matchId, outcome) {
    for (let i = 0; i < sortedLeaderboard.length; i++)
      await supabaseClient.from('profiles').update({ previous_rank: i + 1 }).eq('username', sortedLeaderboard[i].username);
    await supabaseClient.from('matches').update({ result: outcome }).eq('id', matchId);
  }

  async function adminCreateMatch() {
    if (!matchForm.team1 || !matchForm.team2 || !matchForm.date || !matchForm.odds1) { alert("Câmpuri lipsă"); return; }
    await supabaseClient.from('matches').insert([{
      id: `match_${Date.now()}`, team1: matchForm.team1, team2: matchForm.team2,
      match_date: matchForm.date, match_time: matchForm.time,
      odds1: parseFloat(matchForm.odds1), oddsx: parseFloat(matchForm.oddsX || 3.0), odds2: parseFloat(matchForm.odds2),
      matchday: matchForm.stage || "1", result: null, api_fixture_id: matchForm.apiFixtureId || null
    }]);
    setMatchForm({ team1: "", team2: "", date: "", time: "21:00", odds1: "", oddsX: "", odds2: "", stage: "", apiFixtureId: "" });
    fetchAllData(); triggerToast("✅ Meci adăugat!");
  }

  async function adminForceResult(mid, res) {
    if (window.confirm("Override rezultat?")) { await commitMatchResultWithRankSnapshot(mid, res); fetchAllData(); }
  }

  async function adminRevertResult(mid) {
    await supabaseClient.from('matches').update({ result: null }).eq('id', mid);
    fetchAllData(); triggerToast("↩️ Rezultat anulat");
  }

  async function adminDeleteMatch(mid) {
    if (window.confirm("Ștergeți meciul?")) { await supabaseClient.from('matches').delete().eq('id', mid); fetchAllData(); }
  }

  async function adminSaveWinnerConfig(winner) {
    await supabaseClient.from('tournament_config').update({ tournament_winner: winner }).eq('id', 1);
    fetchAllData(); triggerToast("🏆 Campion setat!");
  }

  async function adminSetOddsConfig(team, oddsVal) {
    const copy = { ...tournamentConfig.champion_odds };
    if (!oddsVal) delete copy[team]; else copy[team] = parseFloat(oddsVal);
    await supabaseClient.from('tournament_config').update({ champion_odds: copy }).eq('id', 1);
    setTournamentConfig(p => ({ ...p, champion_odds: copy }));
  }

  const upcomingMatchesSorted = useMemo(() => matches.filter(m => !m.result).sort((a,b) => new Date(a.match_date+"T"+a.match_time) - new Date(b.match_date+"T"+b.match_time)), [matches]);

  const processedMatchdaySplit = useMemo(() => {
    const future = upcomingMatchesSorted.filter(m => new Date(m.match_date+"T"+m.match_time) > new Date());
    const unlocked = [], locked = [];
    future.forEach(m => { if (currentUser?.picks?.[m.id]) locked.push(m); else unlocked.push(m); });
    return { unlocked, locked };
  }, [upcomingMatchesSorted, currentUser]);

  const myRank = sortedLeaderboard.findIndex(x => x.username.toLowerCase() === currentUser?.username?.toLowerCase()) + 1;

  // ─── RENDER ───────────────────────────────────────────────────────────────

  return (
    <div>
      {/* TOAST */}
      {toast && <div className="toast">{toast}</div>}

      {/* TOP NAV */}
      <nav className="topnav">
        <div className="nav-logo">🏆 <span>{String(tournamentConfig.tournament_name).toUpperCase()}</span></div>

        {/* Desktop tab nav */}
        {session && !currentUser?.isAdmin && (
          <div className="topnav-desktop-tabs" style={{ marginLeft: 24, display: 'flex', gap: 4 }}>
            {[["profile","👤 Profil"],["leaderboard","📊 Clasament"],["matchday","⚽ Meciuri"]].map(([key, label]) => (
              <button key={key} className={`desktop-tab ${page===key?"active":""}`} onClick={() => setPage(key)}>{label}</button>
            ))}
          </div>
        )}

        <div className="nav-right">
          {session && (
            <>
              <span className="nav-user">{String(session.username).toUpperCase()}</span>
              <button className="btn-ghost" onClick={() => { setSession(null); setPage("home"); }}>Ieșire</button>
            </>
          )}
        </div>
      </nav>

      {/* ── HOME ── */}
      {page === "home" && (
        <div style={{ minHeight: 'calc(100vh - 58px)', display: 'flex', flexDirection: 'column', justifyContent: 'center' }}>
          <div className="home-hero">
            <div className="hero-badge">⚽ Sezonul 2026</div>
            <h1 className="hero-title">PARIURI<br/><span className="accent">WORLD CUP</span></h1>
            <p className="hero-sub">Prezice meciurile, câștigă puncte pe baza cotelor, și urcă în clasament.</p>
          </div>

          <div className="container" style={{ maxWidth: 440 }}>
            <div className="card card-pitch">
              <div className="auth-tabs">
                <button className={`auth-tab ${authMode==="login"?"active":""}`} onClick={() => setAuthMode("login")}>Intră</button>
                <button className={`auth-tab ${authMode==="register"?"active":""}`} onClick={() => setAuthMode("register")}>Înregistrare</button>
              </div>

              {authMode === "login" ? (
                <div className="flex-col">
                  <input placeholder="Nume utilizator" className="input" onChange={e => setForm({ ...form, username: e.target.value })} />
                  <input type="password" placeholder="Parolă" className="input" onChange={e => setForm({ ...form, password: e.target.value })} onKeyDown={e => e.key === "Enter" && runLogin()} />
                  {error && <div className="error-text">{error}</div>}
                  <button className="btn btn-gold btn-block" onClick={runLogin}>INTRĂ ÎN ARENĂ →</button>
                </div>
              ) : (
                <div className="flex-col">
                  <input placeholder="Alege un username" className="input" onChange={e => setForm({ ...form, username: e.target.value })} />
                  <input type="password" placeholder="Parolă" className="input" onChange={e => setForm({ ...form, password: e.target.value })} />
                  <select className="input" onChange={e => setForm({ ...form, favoriteTeam: e.target.value })}>
                    <option value="">❤️ Echipa favorită</option>
                    {TEAMS.map(t => <option key={t} value={t}>{flagEmoji(t)} {t}</option>)}
                  </select>
                  {error && <div className="error-text">{error}</div>}
                  <button className="btn btn-gold btn-block" onClick={runRegister}>CREEAZĂ CONT →</button>
                </div>
              )}
            </div>
          </div>
        </div>
      )}

      {/* ── GATEWAY ── */}
      {page === "gateway" && (
        <div className="gateway-wrap">
          <div className="hero-badge">⚽ Turneul începe în</div>
          <h2 style={{ fontFamily: 'var(--font-display)', fontSize: 32, fontWeight: 900, marginBottom: 0 }}>ARENA SE DESCHIDE</h2>
          <p style={{ color: 'var(--muted)', fontSize: 14, marginTop: 8, marginBottom: 0, lineHeight: 1.5 }}>Setează-ți parametrii înainte de primul fluier.</p>
          <div className="countdown-display">{globalTimer}</div>
          <button className="btn btn-gold" style={{ padding: '14px 44px', fontSize: 16 }} onClick={() => setPage("profile")}>
            INTRĂ ÎN ARENĂ →
          </button>
        </div>
      )}

      {/* ── MAIN PAGES ── */}
      <div className="container page-body">

        {/* ── PROFILE ── */}
        {page === "profile" && currentUser && (
          <div>
            {/* Hero Card */}
            <div className="profile-hero">
              <div className="profile-avatar">{String(currentUser.username)[0].toUpperCase()}</div>
              <div style={{ flex: 1 }}>
                <div className="section-label">Contender</div>
                <div className="profile-name">{String(currentUser.username).toUpperCase()}</div>
                <div style={{ marginTop: 6 }}>
                  <span className="badge badge-gold">{flagEmoji(currentUser.favoriteTeam)} {currentUser.favoriteTeam}</span>
                </div>
              </div>
              <div style={{ textAlign: 'right' }}>
                <div style={{ fontSize: 11, color: 'var(--muted)', fontWeight: 600 }}>RANG</div>
                <div className="profile-rank">#{myRank || '—'}</div>
                <div style={{ fontSize: 11, color: 'var(--muted)' }}>
                  {(sortedLeaderboard.find(x => x.username.toLowerCase() === currentUser.username.toLowerCase())?.totalPoints || 0).toFixed(2)} pts
                </div>
              </div>
            </div>

            {/* Champion Pick */}
            <div className="champion-card">
              <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 12 }}>
                <div>
                  <div className="section-label">Predicție</div>
                  <div style={{ fontFamily: 'var(--font-display)', fontSize: 18, fontWeight: 800 }}>🏆 Câștigător Turneu</div>
                </div>
                {currentUser.isPickLocked && <span className="badge badge-green">BLOCAT 🔒</span>}
              </div>
              <div className="flex-row">
                <select className="input" style={{ flex: 1 }} value={currentUser.tournamentWinnerPick || ""} disabled={currentUser.isPickLocked || isTournamentBegun} onChange={e => updateChampionPrediction(e.target.value)}>
                  <option value="">Selectați echipa...</option>
                  {TEAMS.map(t => <option key={t} value={t}>{flagEmoji(t)} {t} — cotă {tournamentConfig.champion_odds[t] || "10.0"}x</option>)}
                </select>
                {!currentUser.isPickLocked && !isTournamentBegun && (
                  <button className="btn btn-gold btn-sm" onClick={lockChampionChoice}>BLOCHEAZĂ</button>
                )}
              </div>
            </div>

            {/* Match history */}
            <div className="section-label" style={{ marginTop: 20, marginBottom: 12 }}>Istoric Meciuri</div>
            {matches.filter(m => m.result).length === 0 ? (
              <div style={{ textAlign: 'center', color: 'var(--muted)', padding: '40px 0', fontSize: 14 }}>
                Rezultatele vor apărea după meciuri.
              </div>
            ) : matches.filter(m => m.result).map(m => {
              const choice = currentUser.picks?.[m.id];
              const gained = choice === m.result ? (parseFloat(m[m.result === "1" ? "odds1" : m.result === "X" ? "oddsx" : "odds2"]) || 0).toFixed(2) : "0.00";
              const isWin = parseFloat(gained) > 0;
              return (
                <div key={m.id} className={`history-row ${isWin ? "win" : choice ? "loss" : "neutral"}`}>
                  <div>
                    <div style={{ fontFamily: 'var(--font-display)', fontWeight: 800, fontSize: 15 }}>
                      {flagEmoji(m.team1)} {m.team1} vs {m.team2} {flagEmoji(m.team2)}
                    </div>
                    <div style={{ fontSize: 11, color: 'var(--muted)', marginTop: 2 }}>
                      Rezultat: [{m.result}] · Alegerea ta: [{choice || "–"}]
                    </div>
                  </div>
                  <span className={`badge ${isWin ? "badge-green" : "badge-red"}`}>+{gained} pts</span>
                </div>
              );
            })}
          </div>
        )}

        {/* ── LEADERBOARD ── */}
        {page === "leaderboard" && (
          <div>
            {matchdayMvpNode && (
              <div className="mvp-banner">
                <div style={{ fontSize: 10, fontWeight: 800, letterSpacing: '2px', color: 'var(--gold)', textTransform: 'uppercase' }}>
                  🔥 MVP Etapa {matchdayMvpNode.matchday}
                </div>
                <div style={{ fontFamily: 'var(--font-display)', fontSize: 28, fontWeight: 900, color: 'var(--gold)', margin: '4px 0' }}>
                  {String(matchdayMvpNode.username).toUpperCase()}
                </div>
                <div style={{ fontSize: 13, color: 'var(--white)' }}>
                  <strong>{matchdayMvpNode.wins}</strong> predicții corecte
                </div>
              </div>
            )}

            <div style={{ marginBottom: 16 }}>
              <div className="section-label">Sezon 2026</div>
              <div className="section-title">Clasament Arena</div>
              <div style={{ fontSize: 12, color: 'var(--muted)' }}>Puncte cumulative bazate pe cote · Egalitate: nr. victorii</div>
            </div>

            {sortedLeaderboard.map((u, i) => {
              const rank = i + 1;
              const prev = u.previousRank || rank;
              const delta = prev - rank;
              const isMvp = matchdayMvpNode && String(matchdayMvpNode.username).toLowerCase() === String(u.username).toLowerCase();
              return (
                <div key={u.username} className={`lb-row ${isMvp ? "gold-row" : ""}`} onClick={() => setInspectUser(u)}>
                  <div style={{ minWidth: 44, textAlign: 'center' }}>
                    <div className={`lb-rank-num ${rank <= 3 ? "top3" : ""}`}>
                      {rank === 1 ? "🥇" : rank === 2 ? "🥈" : rank === 3 ? "🥉" : `#${rank}`}
                    </div>
                    {delta !== 0 && (
                      <div className="lb-delta" style={{ color: delta > 0 ? 'var(--green)' : 'var(--red)' }}>
                        {delta > 0 ? `↑${delta}` : `↓${Math.abs(delta)}`}
                      </div>
                    )}
                  </div>
                  <div style={{ flex: 1 }}>
                    <div className="lb-name">{String(u.username).toUpperCase()} {isMvp && "👑"}</div>
                    <div className="lb-sub">{flagEmoji(u.favoriteTeam)} {u.favoriteTeam}</div>
                  </div>
                  <div style={{ textAlign: 'right' }}>
                    <div className="lb-pts">{u.totalPoints.toFixed(2)}</div>
                    <div className="lb-wins">{u.correctWins} victorii</div>
                  </div>
                </div>
              );
            })}
          </div>
        )}

        {/* ── MATCHDAY ── */}
        {page === "matchday" && (
          <div>
            <div style={{ marginBottom: 16, display: 'flex', justifyContent: 'space-between', alignItems: 'flex-end' }}>
              <div>
                <div className="section-label">Preziceri</div>
                <div className="section-title">Meciuri</div>
              </div>
              {isTournamentBegun && (
                <div className="live-badge"><div className="live-dot"></div>LIVE</div>
              )}
            </div>

            {processedMatchdaySplit.unlocked.length === 0 && processedMatchdaySplit.locked.length === 0 && (
              <div style={{ textAlign: 'center', color: 'var(--muted)', padding: '60px 0', fontSize: 14 }}>
                Niciun meci disponibil momentan.
              </div>
            )}

            {processedMatchdaySplit.unlocked.map(m => {
              const distrib = computeGlobalBetDistribution(m.id);
              const sel = currentUser?.picks?.[m.id];
              return (
                <div key={m.id} className="card" style={{ borderLeftColor: 'var(--gold)', borderLeftWidth: 3 }}>
                  <div className="match-header">
                    <span>Etapa {m.matchday} · {m.match_date}</span>
                    <span className="badge badge-gold">⏳ DESCHIS</span>
                  </div>
                  <div className="match-teams">
                    <div className="match-team">
                      <div className="match-flag">{flagEmoji(m.team1)}</div>
                      <div className="match-team-name">{m.team1}</div>
                    </div>
                    <div className="match-vs">VS</div>
                    <div className="match-team">
                      <div className="match-flag">{flagEmoji(m.team2)}</div>
                      <div className="match-team-name">{m.team2}</div>
                    </div>
                  </div>
                  <div className="pick-row">
                    {[["1","ACASĂ",m.odds1],["X","EGAL",m.oddsx],["2","OASPEȚI",m.odds2]].map(([key,label,odds]) => (
                      <button key={key} className={`pick-btn ${sel===key?`selected-${key}`:""}`} onClick={() => submitPrediction(m.id, key)}>
                        <span className="pick-btn-label">{label}</span>
                        <span className="pick-btn-odds">{odds}</span>
                      </button>
                    ))}
                  </div>
                  <div style={{ marginTop: 12, fontSize: 11, color: 'var(--muted)' }}>
                    <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 4 }}>
                      <span>Distribuție comunitate</span>
                      <span style={{ fontWeight: 700 }}>1: {distrib.p1}% · X: {distrib.pX}% · 2: {distrib.p2}%</span>
                    </div>
                    <div className="dist-bar">
                      <div className="dist-seg" style={{ width: `${distrib.p1}%`, background: 'var(--green)' }}></div>
                      <div className="dist-seg" style={{ width: `${distrib.pX}%`, background: 'var(--gold)' }}></div>
                      <div className="dist-seg" style={{ width: `${distrib.p2}%`, background: 'var(--blue)' }}></div>
                    </div>
                  </div>
                </div>
              );
            })}

            {processedMatchdaySplit.locked.length > 0 && (
              <div className="section-label" style={{ margin: '16px 0 10px' }}>Predicții blocate</div>
            )}

            {processedMatchdaySplit.locked.map(m => {
              const distrib = computeGlobalBetDistribution(m.id);
              const sel = currentUser?.picks?.[m.id];
              return (
                <div key={m.id} className="card" style={{ opacity: 0.75 }}>
                  <div className="match-header">
                    <span>Etapa {m.matchday} · {m.match_date}</span>
                    <span className="badge badge-muted">🔒 BLOCAT</span>
                  </div>
                  <div className="match-teams">
                    <div className="match-team">
                      <div className="match-flag">{flagEmoji(m.team1)}</div>
                      <div className="match-team-name">{m.team1}</div>
                    </div>
                    <div className="match-vs">VS</div>
                    <div className="match-team">
                      <div className="match-flag">{flagEmoji(m.team2)}</div>
                      <div className="match-team-name">{m.team2}</div>
                    </div>
                  </div>
                  <div className="pick-row">
                    {[["1","ACASĂ",m.odds1],["X","EGAL",m.oddsx],["2","OASPEȚI",m.odds2]].map(([key,label,odds]) => (
                      <button key={key} className={`pick-btn ${sel===key?`selected-${key}`:""}`} onClick={() => submitPrediction(m.id, key)}>
                        <span className="pick-btn-label">{label}</span>
                        <span className="pick-btn-odds">{odds}</span>
                      </button>
                    ))}
                  </div>
                  <div style={{ marginTop: 10, fontSize: 11, color: 'var(--muted)', display: 'flex', justifyContent: 'space-between' }}>
                    <span>Comunitate</span>
                    <span style={{ fontWeight: 700 }}>1: {distrib.p1}% · X: {distrib.pX}% · 2: {distrib.p2}%</span>
                  </div>
                </div>
              );
            })}
          </div>
        )}

        {/* ── ADMIN ── */}
        {page === "admin" && currentUser?.isAdmin && (
          <div>
            <div style={{ marginBottom: 20 }}>
              <div className="section-label">Panou de Control</div>
              <div className="section-title">Administrator</div>
            </div>
            <div className="admin-tabs">
              {[["matches","Meciuri"],["results","Rezultate"],["winner","Câștigător"],["players","Jucători"]].map(([key,label]) => (
                <button key={key} className={`admin-tab ${adminTab===key?"active":""}`} onClick={() => setAdminTab(key)}>{label}</button>
              ))}
            </div>

            {adminTab === "matches" && (
              <div>
                <div className="card card-pitch">
                  <div className="section-label" style={{ marginBottom: 14 }}>Adaugă Meci</div>
                  <div className="grid-2">
                    <select className="input" value={matchForm.team1} onChange={e=>setMatchForm({...matchForm,team1:e.target.value})}>
                      <option value="">Echipa Acasă</option>{TEAMS.map(t=><option key={t}>{t}</option>)}
                    </select>
                    <select className="input" value={matchForm.team2} onChange={e=>setMatchForm({...matchForm,team2:e.target.value})}>
                      <option value="">Echipa Oaspeți</option>{TEAMS.map(t=><option key={t}>{t}</option>)}
                    </select>
                    <input type="date" className="input" value={matchForm.date} onChange={e=>setMatchForm({...matchForm,date:e.target.value})} />
                    <input type="time" className="input" value={matchForm.time} onChange={e=>setMatchForm({...matchForm,time:e.target.value})} />
                    <input type="number" step="0.01" placeholder="Cotă 1" className="input" value={matchForm.odds1} onChange={e=>setMatchForm({...matchForm,odds1:e.target.value})} />
                    <input type="number" step="0.01" placeholder="Cotă X" className="input" value={matchForm.oddsX} onChange={e=>setMatchForm({...matchForm,oddsX:e.target.value})} />
                    <input type="number" step="0.01" placeholder="Cotă 2" className="input" value={matchForm.odds2} onChange={e=>setMatchForm({...matchForm,odds2:e.target.value})} />
                    <input placeholder="Nr. Etapă" className="input" value={matchForm.stage} onChange={e=>setMatchForm({...matchForm,stage:e.target.value})} />
                  </div>
                  <input placeholder="API Fixture ID (opțional)" className="input" style={{ marginTop: 10 }} value={matchForm.apiFixtureId} onChange={e=>setMatchForm({...matchForm,apiFixtureId:e.target.value})} />
                  <button className="btn btn-gold btn-block" style={{ marginTop: 14 }} onClick={adminCreateMatch}>+ ADAUGĂ MECI</button>
                </div>

                <div className="section-label" style={{ margin: '20px 0 10px' }}>Meciuri Programate</div>
                {matches.sort((a,b) => new Date(a.match_date)-new Date(b.match_date)).map(m => (
                  <div key={m.id} className="admin-match-row">
                    <div>
                      <div style={{ fontFamily: 'var(--font-display)', fontWeight: 800, fontSize: 14 }}>{flagEmoji(m.team1)} {m.team1} vs {m.team2} {flagEmoji(m.team2)}</div>
                      <div style={{ fontSize: 11, color: 'var(--muted)', marginTop: 2 }}>
                        {m.match_date} · Cote: {m.odds1} / {m.oddsx} / {m.odds2}
                        {m.api_fixture_id && ` · API: ${m.api_fixture_id}`}
                      </div>
                    </div>
                    <button className="btn btn-danger btn-sm" onClick={() => adminDeleteMatch(m.id)}>✕</button>
                  </div>
                ))}
              </div>
            )}

            {adminTab === "results" && (
              <div>
                <div className="card card-gold" style={{ marginBottom: 20 }}>
                  <div style={{ fontFamily: 'var(--font-display)', fontSize: 16, fontWeight: 800, marginBottom: 6 }}>Sincronizare Automată API</div>
                  <p style={{ fontSize: 12, color: 'var(--muted)', marginBottom: 14, lineHeight: 1.5 }}>Preia rezultatele de la API-Football și actualizează clasamentul.</p>
                  <button className="btn btn-gold btn-block" onClick={adminFetchLiveResults}>🔄 RULEAZĂ SINCRONIZAREA</button>
                </div>

                <div className="section-label" style={{ marginBottom: 10 }}>Override Manual</div>
                {matches.map(m => (
                  <div key={m.id} className="card">
                    <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 10 }}>
                      <div style={{ fontFamily: 'var(--font-display)', fontWeight: 800, fontSize: 14 }}>{flagEmoji(m.team1)} {m.team1} vs {m.team2} {flagEmoji(m.team2)}</div>
                      {m.result ? <span className="result-pill">✓ {m.result}</span> : <span className="badge badge-muted">Pending</span>}
                    </div>
                    <div style={{ display: 'flex', gap: 6 }}>
                      {[["1","Acasă"],["X","Egal"],["2","Oaspeți"]].map(([key,label]) => (
                        <button key={key} className="btn btn-sm" style={{ flex: 1, background: 'rgba(255,255,255,0.05)', border: '1px solid rgba(255,255,255,0.1)', color: '#fff', fontSize: 11 }} onClick={() => adminForceResult(m.id, key)}>{label} ({key})</button>
                      ))}
                      {m.result && <button className="btn btn-sm" style={{ background: 'rgba(255,255,255,0.06)', border: '1px solid rgba(255,255,255,0.1)', color: 'var(--muted)', fontSize: 11 }} onClick={() => adminRevertResult(m.id)}>↩</button>}
                      <button className="btn btn-sm" style={{ background: 'rgba(255,255,255,0.04)', border: '1px solid rgba(255,255,255,0.08)', color: 'var(--muted)', fontSize: 11 }} onClick={() => setInspectMatchBets(m)}>👁</button>
                    </div>
                  </div>
                ))}
              </div>
            )}

            {adminTab === "winner" && (
              <div className="card card-gold">
                <div className="section-label" style={{ marginBottom: 8 }}>Turneu Final</div>
                <div style={{ fontFamily: 'var(--font-display)', fontSize: 18, fontWeight: 800, marginBottom: 16 }}>🏆 Campion Mondial</div>
                <select className="input" style={{ marginBottom: 20 }} value={tournamentConfig.tournament_winner || ""} onChange={e => adminSaveWinnerConfig(e.target.value || null)}>
                  <option value="">— Turneu activ —</option>
                  {TEAMS.map(t => <option key={t} value={t}>{flagEmoji(t)} {t}</option>)}
                </select>

                <div className="section-label" style={{ marginBottom: 12 }}>Cote Campion per Echipă</div>
                <div className="grid-2">
                  {TEAMS.map(t => (
                    <div key={t} style={{ display: 'flex', alignItems: 'center', gap: 8, background: 'rgba(255,255,255,0.02)', padding: '7px 10px', borderRadius: 8 }}>
                      <span style={{ flex: 1, fontSize: 12 }}>{flagEmoji(t)} {t}</span>
                      <input type="number" step="0.01" className="input" style={{ width: 72, padding: '6px 8px', fontSize: 13 }} placeholder="10.0" value={tournamentConfig.champion_odds[t] || ""} onChange={e => adminSetOddsConfig(t, e.target.value)} />
                    </div>
                  ))}
                </div>
              </div>
            )}

            {adminTab === "players" && (
              <div>
                <div className="section-label" style={{ marginBottom: 12 }}>Toți Jucătorii</div>
                {Object.keys(users).map(k => {
                  const u = users[k];
                  return (
                    <div key={k} className="admin-match-row">
                      <div>
                        <div style={{ fontFamily: 'var(--font-display)', fontWeight: 800, fontSize: 15 }}>
                          {String(u.username)} {u.isAdmin && <span className="badge badge-gold" style={{ fontSize: 10 }}>Admin</span>}
                        </div>
                        <div style={{ fontSize: 11, color: 'var(--muted)', marginTop: 2 }}>
                          {flagEmoji(u.favoriteTeam)} {u.favoriteTeam} · Campion: {u.tournamentWinnerPick || "Neselectat"}
                        </div>
                      </div>
                      {!u.isAdmin && (
                        <button className="btn btn-danger btn-sm" onClick={async () => {
                          if (window.confirm("Ștergeți contul?")) {
                            await supabaseClient.from('profiles').delete().eq('username', u.username);
                            fetchAllData();
                          }
                        }}>DELETE</button>
                      )}
                    </div>
                  );
                })}
              </div>
            )}
          </div>
        )}

      </div>{/* /container */}

      {/* ── BOTTOM NAV (mobile) ── */}
      {session && !currentUser?.isAdmin && (
        <div className="bottom-nav">
          {[["profile","👤","Profil"],["leaderboard","📊","Clasament"],["matchday","⚽","Meciuri"]].map(([key, icon, label]) => (
            <button key={key} className={`nav-btn ${page===key?"active":""}`} onClick={() => setPage(key)}>
              <span className="nav-btn-icon">{icon}</span>
              <span>{label}</span>
            </button>
          ))}
        </div>
      )}

      {/* ── INSPECT USER MODAL ── */}
      {inspectUser && (
        <div className="modal-overlay" onClick={() => setInspectUser(null)}>
          <div className="modal-content" onClick={e => e.stopPropagation()}>
            <div className="modal-handle"></div>
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 16 }}>
              <div>
                <div className="section-label">Profil</div>
                <div style={{ fontFamily: 'var(--font-display)', fontSize: 22, fontWeight: 900 }}>{String(inspectUser.username).toUpperCase()}</div>
              </div>
              <button style={{ background: 'rgba(255,255,255,0.06)', border: 'none', color: '#fff', width: 32, height: 32, borderRadius: '50%', cursor: 'pointer', fontSize: 14 }} onClick={() => setInspectUser(null)}>✕</button>
            </div>

            <div style={{ background: 'rgba(255,255,255,0.03)', padding: '12px 16px', borderRadius: 8, marginBottom: 16, display: 'flex', flexDirection: 'column', gap: 8 }}>
              <div style={{ fontSize: 13 }}><strong>Echipă favorită:</strong> {flagEmoji(inspectUser.favoriteTeam)} {String(inspectUser.favoriteTeam)}</div>
              <div style={{ fontSize: 13 }}>
                <strong>Predicție campion:</strong>{" "}
                {(isTournamentBegun || inspectUser.isPickLocked || String(inspectUser.username).toLowerCase() === String(currentUser?.username).toLowerCase())
                  ? `${flagEmoji(inspectUser.tournamentWinnerPick)} ${inspectUser.tournamentWinnerPick || "Neselectat"}`
                  : "🔒 Ascuns până la start"
                }
                {inspectUser.isPickLocked && " 🔒"}
              </div>
            </div>

            <div className="section-label" style={{ marginBottom: 10 }}>Istoric Selecții</div>
            {matches.map(m => {
              const choice = inspectUser.picks?.[m.id];
              const matchClosed = m.result || new Date(m.match_date+"T"+m.match_time) <= new Date();
              const visible = (matchClosed || String(inspectUser.username).toLowerCase() === String(currentUser?.username).toLowerCase())
                ? (choice ? `[${choice}]` : "– Nicio predicție") : "🔒 Ascuns";
              let variant = "muted";
              if (m.result && choice) variant = choice === m.result ? "green" : "danger";
              return (
                <div key={m.id} style={{ display: 'flex', justifyContent: 'space-between', padding: '10px 12px', background: 'rgba(255,255,255,0.02)', borderRadius: 8, marginBottom: 6, border: '1px solid rgba(255,255,255,0.04)' }}>
                  <div>
                    <div style={{ fontFamily: 'var(--font-display)', fontWeight: 700, fontSize: 13 }}>{m.team1} vs {m.team2}</div>
                    <div style={{ fontSize: 10, color: 'var(--muted)', marginTop: 2 }}>{m.match_date} {m.result && `· Rezultat: ${m.result}`}</div>
                  </div>
                  <span className={`badge badge-${variant}`}>{visible}</span>
                </div>
              );
            })}
          </div>
        </div>
      )}

      {/* ── INSPECT MATCH BETS MODAL ── */}
      {inspectMatchBets && (
        <div className="modal-overlay" onClick={() => setInspectMatchBets(null)}>
          <div className="modal-content" onClick={e => e.stopPropagation()}>
            <div className="modal-handle"></div>
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 16 }}>
              <div>
                <div className="section-label">Audit Pariuri</div>
                <div style={{ fontFamily: 'var(--font-display)', fontSize: 18, fontWeight: 900 }}>{inspectMatchBets.team1} vs {inspectMatchBets.team2}</div>
              </div>
              <button style={{ background: 'rgba(255,255,255,0.06)', border: 'none', color: '#fff', width: 32, height: 32, borderRadius: '50%', cursor: 'pointer', fontSize: 14 }} onClick={() => setInspectMatchBets(null)}>✕</button>
            </div>
            {Object.values(users).filter(u => !u.isAdmin).map(u => {
              const choice = u.picks?.[inspectMatchBets.id] || "–";
              const isCorrect = choice === inspectMatchBets.result;
              return (
                <div key={u.username} style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', padding: '10px 14px', background: 'rgba(255,255,255,0.02)', borderRadius: 8, marginBottom: 6, border: '1px solid rgba(255,255,255,0.04)' }}>
                  <span style={{ fontFamily: 'var(--font-display)', fontSize: 14, fontWeight: 700 }}>{String(u.username)}</span>
                  <span className={`badge ${isCorrect ? "badge-green" : "badge-muted"}`}>{String(choice)}</span>
                </div>
              );
            })}
          </div>
        </div>
      )}

    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>
</body>
</html>
