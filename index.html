<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>World Cup 2026 — Pariuri</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%8F%86%3C/text%3E%3C/svg%3E" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Montserrat:wght@600;700;800;900&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root {
  /* USA 2026 palette — deep navy base, patriotic red & blue, trophy gold accent */
  --pitch: #0a1230;
  --pitch-mid: #111c44;
  --pitch-light: #18244f;
  --gold: #f5c542;
  --gold-light: #ffd97a;
  --gold-dim: rgba(245,197,66,0.15);
  --red: #e23b4e;
  --red-dim: rgba(226,59,78,0.15);
  --green: #2fbf71;
  --blue: #3b7bff;
  --blue-dim: rgba(59,123,255,0.15);
  --white: #eef2ff;
  --muted: rgba(238,242,255,0.5);
  --card: rgba(255,255,255,0.045);
  --card-border: rgba(255,255,255,0.09);
  --radius: 14px;
  --radius-sm: 8px;
  --font-display: 'Montserrat', sans-serif;
  --font-body: 'Inter', sans-serif;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html {
  background: var(--pitch);
  min-height: 100%;
}

body {
  font-family: var(--font-body);
  color: var(--white);
  min-height: 100vh;
  background:
    radial-gradient(ellipse 110% 55% at 50% -10%, rgba(59,123,255,0.20) 0%, transparent 70%),
    radial-gradient(ellipse 90% 45% at 50% 112%, rgba(226,59,78,0.16) 0%, transparent 62%),
    var(--pitch);
  -webkit-font-smoothing: antialiased;
  padding-bottom: env(safe-area-inset-bottom, 0);
  overflow-x: hidden;
}

/* Subtle "stars" dot field overlay */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image: radial-gradient(rgba(255,255,255,0.04) 1px, transparent 1.5px);
  background-size: 30px 30px;
  pointer-events: none;
  z-index: 0;
}

#root { position: relative; z-index: 1; }

input, select, button, textarea { font-family: var(--font-body); }

/* LOADER */
#loader {
  position: fixed; inset: 0;
  background: var(--pitch);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 16px; z-index: 9999;
  transition: opacity 0.4s ease;
}
#loader.hidden { opacity: 0; pointer-events: none; }
.loader-ball {
  width: 52px; height: 52px;
  background: radial-gradient(circle at 35% 35%, #fff 0%, #bbb 40%, #555 100%);
  border-radius: 50%;
  animation: bounce 0.7s ease-in-out infinite alternate;
  box-shadow: 0 0 30px rgba(59,123,255,0.45);
}
@keyframes bounce {
  from { transform: translateY(-14px) rotate(-10deg); }
  to   { transform: translateY(8px) rotate(10deg); box-shadow: 0 20px 30px rgba(0,0,0,0.5); }
}
.loader-text {
  font-family: var(--font-display);
  font-weight: 800;
  font-size: 13px;
  letter-spacing: 3px;
  color: var(--gold);
  text-transform: uppercase;
}

/* NAV */
.topnav {
  position: sticky; top: 0; z-index: 100;
  display: flex; align-items: center;
  padding: 0 20px;
  height: 58px;
  background: rgba(10,18,48,0.92);
  backdrop-filter: blur(16px);
  border-width: 0 0 2px 0;
  border-style: solid;
  border-image: linear-gradient(90deg, var(--red) 0%, var(--white) 50%, var(--blue) 100%) 1;
}
.nav-logo {
  font-family: var(--font-display);
  font-weight: 800;
  font-size: 19px;
  letter-spacing: 0.3px;
  color: var(--gold);
  display: flex; align-items: center; gap: 8px;
  white-space: nowrap;
  min-width: 0;
}
.nav-logo span { color: var(--white); }
.nav-right {
  margin-left: auto;
  display: flex; align-items: center; gap: 10px;
}
.nav-user {
  font-family: var(--font-display);
  font-weight: 700;
  font-size: 14px;
  letter-spacing: 0.5px;
  color: var(--gold);
}
.btn-ghost {
  background: transparent;
  border: 1px solid rgba(255,255,255,0.18);
  color: var(--muted);
  font-size: 11px;
  font-weight: 600;
  padding: 5px 12px;
  border-radius: 20px;
  cursor: pointer;
  letter-spacing: 0.5px;
  transition: all 0.2s;
}
.btn-ghost:hover { border-color: var(--gold); color: var(--gold); }

/* Language toggle (EN / RO) */
.lang-toggle { display: inline-flex; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.12); border-radius: 20px; overflow: hidden; }
.lang-toggle button {
  background: transparent; border: none; cursor: pointer;
  color: var(--muted); font-family: var(--font-display); font-weight: 800;
  font-size: 11px; letter-spacing: 0.5px; padding: 5px 10px;
}
.lang-toggle button.active { background: var(--gold); color: #0a1230; }

/* BOTTOM NAV */
.bottom-nav {
  position: fixed; bottom: 0; left: 0; right: 0;
  height: calc(62px + env(safe-area-inset-bottom, 0px));
  padding-bottom: env(safe-area-inset-bottom, 0px);
  background: rgba(8,14,40,0.97);
  backdrop-filter: blur(20px);
  border-top: 2px solid transparent;
  border-image: linear-gradient(90deg, var(--red) 0%, var(--white) 50%, var(--blue) 100%) 1;
  display: flex;
  justify-content: space-around;
  align-items: center;
  z-index: 900;
}
.nav-btn {
  background: transparent; border: none;
  color: var(--muted);
  display: flex; flex-direction: column; align-items: center;
  gap: 4px; font-size: 10px; font-weight: 600;
  cursor: pointer; flex: 1; height: 62px;
  justify-content: center;
  letter-spacing: 0.5px;
  text-transform: uppercase;
  transition: all 0.2s;
  position: relative;
}
.nav-btn.active { color: var(--gold); }
.nav-btn.active::before {
  content: '';
  position: absolute;
  top: 0; left: 50%;
  transform: translateX(-50%);
  width: 28px; height: 2px;
  background: var(--gold);
  border-radius: 0 0 3px 3px;
}
.nav-btn-icon { font-size: 22px; line-height: 1; }

/* LAYOUT */
.page-body { padding-bottom: 80px; }
.container {
  max-width: 680px;
  margin: 0 auto;
  padding: 20px 16px;
}

/* CARDS */
.card {
  background: var(--card);
  border: 1px solid var(--card-border);
  border-radius: var(--radius);
  padding: 18px 20px;
  margin-bottom: 12px;
  position: relative;
  overflow: hidden;
}
.card-gold {
  background: linear-gradient(135deg, rgba(245,197,66,0.08) 0%, rgba(10,18,48,0.85) 100%);
  border-color: rgba(245,197,66,0.25);
}
.card-pitch {
  background: linear-gradient(135deg, rgba(24,36,79,0.92) 0%, rgba(10,18,48,0.96) 100%);
  border-color: rgba(255,255,255,0.07);
}

/* INPUTS */
.input {
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: var(--radius-sm);
  color: var(--white);
  padding: 12px 14px;
  font-size: 16px; /* 16px min keeps iOS Safari from auto-zooming on focus */
  width: 100%;
  outline: none;
  transition: border-color 0.2s;
  -webkit-appearance: none;
  -moz-appearance: none;
  appearance: none;
}
.input:focus { border-color: rgba(59,123,255,0.6); }
.input::placeholder { color: var(--muted); font-size: 15px; }
.input option { background: #0c1430; color: var(--white); }

/* Password field with show/hide eye */
.pwd-wrap { position: relative; display: flex; align-items: center; width: 100%; }
.pwd-wrap .input { padding-right: 46px; }
.pwd-eye {
  position: absolute; right: 6px; top: 50%; transform: translateY(-50%);
  background: transparent; border: none; cursor: pointer;
  font-size: 17px; line-height: 1; padding: 6px 8px; opacity: 0.65;
}
.pwd-eye:hover { opacity: 1; }

/* Select wrapper — adds custom dropdown arrow */
.select-wrap {
  position: relative;
  display: flex;
  align-items: center;
  width: 100%;
}
.select-wrap .input { padding-right: 36px; }
.select-wrap::after {
  content: '';
  position: absolute;
  right: 13px;
  top: 50%;
  transform: translateY(-50%);
  pointer-events: none;
  width: 10px; height: 6px;
  background: var(--muted);
  clip-path: polygon(0 0, 100% 0, 50% 100%);
}

/* BUTTONS */
.btn {
  border: none;
  border-radius: 11px;
  padding: 14px 24px;
  font-family: var(--font-display);
  font-weight: 800;
  font-size: 15px;
  letter-spacing: 0.2px;
  cursor: pointer;
  transition: transform 0.12s ease, background 0.15s ease, box-shadow 0.15s ease, filter 0.15s ease;
  text-transform: uppercase;
  display: inline-flex; align-items: center; justify-content: center;
}
.btn:active { transform: translateY(1px) scale(0.99); }
.btn:disabled { opacity: 0.45; cursor: not-allowed; box-shadow: none; filter: none; }
.btn:disabled:active { transform: none; }
.btn-gold { background: linear-gradient(135deg, #ffce4a, #eaa90f); color: #0a1230; box-shadow: 0 6px 18px rgba(245,197,66,0.28); }
.btn-gold:hover { filter: brightness(1.06); box-shadow: 0 8px 22px rgba(245,197,66,0.36); }
.btn-danger { background: rgba(226,59,78,0.15); color: var(--red); border: 1px solid rgba(226,59,78,0.3); }
.btn-danger:hover { background: rgba(226,59,78,0.25); }
.btn-green { background: rgba(47,191,113,0.15); color: var(--green); border: 1px solid rgba(47,191,113,0.3); }
.btn-sm { padding: 7px 14px; font-size: 12px; }
.btn-block { width: 100%; }

/* BADGES */
.badge {
  display: inline-block;
  border-radius: 20px;
  padding: 3px 10px;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.5px;
  text-transform: uppercase;
}
.badge-gold { background: var(--gold-dim); color: var(--gold); }
.badge-green { background: rgba(47,191,113,0.14); color: var(--green); }
.badge-red { background: rgba(226,59,78,0.14); color: var(--red); }
.badge-muted { background: rgba(255,255,255,0.06); color: var(--muted); }

/* PICK BUTTONS — HOME (red) / DRAW (gold) / AWAY (blue) */
.pick-row { display: flex; gap: 8px; }
.pick-btn {
  flex: 1; border-radius: var(--radius-sm);
  padding: 12px 8px;
  display: flex; flex-direction: column; align-items: center; gap: 3px;
  cursor: pointer;
  border: 1.5px solid rgba(255,255,255,0.08);
  background: rgba(255,255,255,0.04);
  transition: all 0.15s;
}
.pick-btn:active { transform: scale(0.96); }
.pick-btn.locked { cursor: default; }
.pick-btn.locked:active { transform: none; }
.pick-btn-label { font-size: 10px; font-weight: 700; letter-spacing: 0.5px; color: var(--muted); text-transform: uppercase; }
.pick-btn-odds { font-family: var(--font-display); font-size: 18px; font-weight: 900; color: var(--white); }
.pick-btn.selected-1 { background: rgba(226,59,78,0.16); border-color: var(--red); }
.pick-btn.selected-1 .pick-btn-odds, .pick-btn.selected-1 .pick-btn-label { color: var(--red); }
.pick-btn.selected-X { background: rgba(245,197,66,0.16); border-color: var(--gold); }
.pick-btn.selected-X .pick-btn-odds, .pick-btn.selected-X .pick-btn-label { color: var(--gold); }
.pick-btn.selected-2 { background: rgba(59,123,255,0.16); border-color: var(--blue); }
.pick-btn.selected-2 .pick-btn-odds, .pick-btn.selected-2 .pick-btn-label { color: var(--blue); }

/* DISTRIBUTION BAR */
.dist-bar { height: 7px; border-radius: 4px; overflow: hidden; background: rgba(255,255,255,0.06); display: flex; }
.dist-seg { height: 100%; transition: width 0.4s ease; }

/* COMMUNITY VOTE block */
.community { margin-top: 14px; padding-top: 12px; border-top: 1px solid rgba(255,255,255,0.06); }
.community-head {
  font-size: 10px; font-weight: 700; letter-spacing: 1.2px; text-transform: uppercase;
  color: var(--muted); margin-bottom: 8px;
}
.community-legend { display: flex; justify-content: space-between; margin-top: 7px; font-size: 11px; font-weight: 700; }
.community-empty { font-size: 12px; color: var(--muted); font-style: italic; }

/* TOAST */
.toast {
  position: fixed;
  top: calc(66px + env(safe-area-inset-top, 0px));
  left: 50%; transform: translateX(-50%);
  background: linear-gradient(135deg, #f5c542, #e0a510);
  color: #0a1230;
  padding: 11px 22px;
  border-radius: 30px;
  font-family: var(--font-display);
  font-weight: 800;
  font-size: 14px;
  letter-spacing: 0.5px;
  z-index: 9999;
  box-shadow: 0 8px 28px rgba(245,197,66,0.35);
  white-space: nowrap;
  animation: toastIn 0.25s cubic-bezier(0.34,1.56,0.64,1);
  pointer-events: none;
}
@keyframes toastIn {
  from { opacity: 0; transform: translateX(-50%) translateY(-10px) scale(0.92); }
  to   { opacity: 1; transform: translateX(-50%) translateY(0) scale(1); }
}

/* SECTION HEADINGS */
.section-label {
  font-family: var(--font-display);
  font-weight: 700;
  font-size: 11px;
  letter-spacing: 1.4px;
  text-transform: uppercase;
  color: var(--gold);
  margin-bottom: 4px;
}
.section-title {
  font-family: var(--font-display);
  font-weight: 900;
  font-size: 26px;
  letter-spacing: -0.5px;
  line-height: 1;
  margin-bottom: 16px;
}

/* MATCH CARD */
.match-header {
  display: flex; justify-content: space-between; align-items: center;
  font-size: 11px; color: var(--muted); font-weight: 600;
  text-transform: uppercase; letter-spacing: 0.5px;
  margin-bottom: 14px;
}
.match-teams {
  display: flex; align-items: center; justify-content: center;
  gap: 12px;
  font-family: var(--font-display);
  font-weight: 800;
  font-size: 17px;
  text-align: center;
  margin-bottom: 14px;
}
.match-team { display: flex; flex-direction: column; align-items: center; gap: 3px; flex: 1; min-width: 0; }
.match-flag { font-size: 28px; line-height: 1; }
.match-team-name { font-size: 13px; font-weight: 800; letter-spacing: 0.3px; max-width: 100%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; text-align: center; padding: 0 2px; }
.match-vs {
  font-family: var(--font-display);
  font-size: 13px;
  font-weight: 700;
  color: var(--muted);
  flex-shrink: 0;
}

/* LEADERBOARD */
.lb-row {
  display: flex; align-items: center; gap: 14px;
  padding: 14px 18px;
  border-radius: var(--radius);
  background: var(--card);
  border: 1px solid var(--card-border);
  margin-bottom: 8px;
  cursor: pointer;
  transition: background 0.2s, border-color 0.2s;
}
.lb-row:hover { background: rgba(255,255,255,0.06); border-color: rgba(245,197,66,0.2); }
.lb-row.gold-row { background: rgba(245,197,66,0.07); border-color: rgba(245,197,66,0.25); }
.lb-rank-num {
  font-family: var(--font-display);
  font-size: 22px; font-weight: 900;
  width: 36px; text-align: center; flex-shrink: 0;
}
.lb-rank-num.top3 { color: var(--gold); }
.lb-delta { font-size: 10px; font-weight: 800; text-align: center; }
.lb-name { font-family: var(--font-display); font-size: 17px; font-weight: 800; }
.lb-sub { font-size: 12px; color: var(--muted); margin-top: 1px; }
.lb-pts { font-family: var(--font-display); font-size: 22px; font-weight: 900; color: var(--gold); }
.lb-wins { font-size: 11px; color: var(--muted); text-align: right; }

/* PROFILE HEADER */
.profile-hero {
  background: linear-gradient(135deg, rgba(24,36,79,0.95) 0%, rgba(16,25,63,0.95) 100%);
  border: 1px solid rgba(245,197,66,0.2);
  border-radius: var(--radius);
  padding: 26px 20px 22px;
  margin-bottom: 12px;
  display: flex; flex-direction: column; align-items: center; gap: 12px;
  text-align: center;
}
.profile-avatar {
  width: 66px; height: 66px;
  background: linear-gradient(135deg, var(--gold), #b8860b);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-family: var(--font-display);
  font-size: 28px; font-weight: 900;
  color: #0a1230;
  flex-shrink: 0;
  box-shadow: 0 6px 20px rgba(245,197,66,0.25);
}
.profile-name { font-family: var(--font-display); font-size: 28px; font-weight: 900; line-height: 1; }
.profile-rank { font-family: var(--font-display); font-size: 28px; font-weight: 900; color: var(--gold); }
.stat-row { display: flex; gap: 10px; width: 100%; margin-top: 6px; }
.stat-box {
  flex: 1; background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.07); border-radius: 10px;
  padding: 12px 8px;
}
.stat-label { font-size: 10px; font-weight: 700; letter-spacing: 1.2px; text-transform: uppercase; color: var(--muted); margin-bottom: 3px; }
.stat-value { font-family: var(--font-display); font-size: 24px; font-weight: 900; line-height: 1; }
.stat-value.gold { color: var(--gold); }

/* CHAMPION custom dropdown (so we can show real flag images + odds) */
.champ-dd { position: relative; }
.champ-dd-btn {
  width: 100%; display: flex; align-items: center; justify-content: space-between; gap: 8px;
  background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.12);
  border-radius: var(--radius-sm); color: var(--white);
  padding: 11px 12px; font-size: 15px; cursor: pointer; text-align: left; min-height: 46px;
}
.champ-dd-btn:disabled { cursor: default; opacity: 0.85; }
.champ-dd-cur { display: flex; align-items: center; gap: 8px; min-width: 0; }
.champ-dd-cur .champ-dd-name { font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.champ-dd-odds {
  font-family: var(--font-display); font-weight: 800; font-size: 13px;
  color: var(--gold); background: var(--gold-dim);
  padding: 2px 8px; border-radius: 20px; flex-shrink: 0;
}
.champ-dd-caret {
  width: 10px; height: 6px; flex-shrink: 0;
  background: var(--muted); clip-path: polygon(0 0, 100% 0, 50% 100%);
}
.champ-dd-backdrop { position: fixed; inset: 0; z-index: 50; }
.champ-dd-list {
  position: absolute; top: calc(100% + 6px); left: 0; right: 0; z-index: 51;
  max-height: 300px; overflow-y: auto;
  background: #0c1430; border: 1px solid rgba(255,255,255,0.14);
  border-radius: var(--radius-sm); box-shadow: 0 16px 40px rgba(0,0,0,0.5);
  padding: 4px;
}
.champ-dd-item {
  display: flex; align-items: center; gap: 10px;
  padding: 9px 10px; border-radius: 6px; cursor: pointer;
}
.champ-dd-item:hover { background: rgba(255,255,255,0.07); }
.champ-dd-item.sel { background: var(--gold-dim); }
.champ-dd-item .champ-dd-name { flex: 1; font-size: 14px; font-weight: 600; }
.champ-dd-item.clear { justify-content: center; color: var(--muted); font-size: 12px; }

/* CHAMPION bonus message */
.champion-msg {
  font-size: 12.5px; line-height: 1.5; color: var(--white);
  background: rgba(245,197,66,0.08);
  border: 1px solid rgba(245,197,66,0.18);
  border-radius: 10px; padding: 10px 12px;
}

/* STREAK panels (hot / cold) */
.streak-panel {
  border-radius: var(--radius);
  padding: 12px 14px 6px;
  margin-bottom: 12px;
  border: 1px solid transparent;
}
.streak-panel.hot {
  background: linear-gradient(135deg, rgba(226,59,78,0.16) 0%, rgba(245,140,40,0.12) 100%);
  border-color: rgba(245,120,40,0.4);
}
.streak-panel.cold {
  background: linear-gradient(135deg, rgba(59,123,255,0.14) 0%, rgba(120,200,255,0.1) 100%);
  border-color: rgba(120,180,255,0.35);
}
.streak-head {
  font-family: var(--font-display); font-weight: 800; font-size: 12px;
  letter-spacing: 1px; text-transform: uppercase; margin-bottom: 8px;
}
.streak-panel.hot .streak-head { color: #ff9d5c; }
.streak-panel.cold .streak-head { color: #8fc2ff; }
.streak-row {
  display: flex; justify-content: space-between; align-items: center;
  padding: 7px 0; border-top: 1px solid rgba(255,255,255,0.06);
}
.streak-name { font-family: var(--font-display); font-weight: 800; font-size: 15px; }
.streak-tag { font-size: 11px; font-weight: 700; padding: 3px 9px; border-radius: 20px; white-space: nowrap; }
.streak-tag.hot { background: rgba(245,120,40,0.2); color: #ff9d5c; }
.streak-tag.cold { background: rgba(120,180,255,0.18); color: #8fc2ff; }

/* HOME / AUTH */
.home-hero {
  text-align: center;
  padding: 24px 20px 16px;
}
@media (min-height: 760px) {
  .home-hero { padding: 52px 20px 32px; }
}

<script type="text/babel">
const { useState, useEffect, useMemo } = React;

const SUPABASE_URL = "https://mfvwumillzpofmvjibkp.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_QUjFKlHhgcIgisSV-SESdg_49GIA0c0";
const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// Results are pulled from football-data.org by the `sync-results` Supabase Edge
// Function, which keeps the API token server-side. See SETUP_API_SYNC.md. The function
// runs automatically on a cron schedule; the admin button below just triggers it on demand.

const TEAMS = [
  "United States","Canada","Mexico","Argentina","Brazil","Colombia","Ecuador","Paraguay","Uruguay",
  "England","France","Croatia","Norway","Portugal","Germany","Netherlands","Austria","Belgium",
  "Scotland","Spain","Switzerland","Sweden","Türkiye","Bosnia and Herzegovina","Czechia",
  "Algeria","Cabo Verde","Côte d'Ivoire","Egypt","Ghana","Morocco","Senegal","South Africa","Tunisia","DR Congo",
  "Australia","Iran","Japan","Jordan","South Korea","Qatar","Saudi Arabia","Uzbekistan","Iraq",
  "Curaçao","Haiti","Panama","New Zealand"
].sort();

const WORLD_CUP_KICKOFF = new Date("2026-06-11T20:00:00Z");

const flagEmoji = (team) => {
  if (!team || typeof team !== 'string') return "🏳️";
  const flags = {
    "United States":"🇺🇸","Canada":"🇨🇦","Mexico":"🇲🇽","Argentina":"🇦🇷","Brazil":"🇧🇷","Colombia":"🇨🇴",
    "Ecuador":"🇪🇨","Paraguay":"🇵🇾","Uruguay":"🇺🇾","England":"🏴󠁧󠁢󠁥󠁮󠁧󠁿","France":"🇫🇷","Croatia":"🇭🇷",
    "Norway":"🇳🇴","Portugal":"🇵🇹","Germany":"🇩🇪","Netherlands":"🇳🇱","Austria":"🇦🇹","Belgium":"🇧🇪",
    "Scotland":"🏴󠁧󠁢󠁳󠁣󠁴󠁿","Spain":"🇪🇸","Switzerland":"🇨🇭","Sweden":"🇸🇪","Türkiye":"🇹🇷",
    "Bosnia and Herzegovina":"🇧🇦","Czechia":"🇨🇿","Algeria":"🇩🇿","Cabo Verde":"🇨🇻",
    "Côte d'Ivoire":"🇨🇮","Egypt":"🇪🇬","Ghana":"🇬🇭","Morocco":"🇲🇦","Senegal":"🇸🇳",
    "South Africa":"🇿🇦","Tunisia":"🇹🇳","DR Congo":"🇨🇩","Australia":"🇦🇺","Iran":"🇮🇷",
    "Japan":"🇯🇵","Jordan":"🇯🇴","South Korea":"🇰🇷","Qatar":"🇶🇦","Saudi Arabia":"🇸🇦",
    "Uzbekistan":"🇺🇿","Iraq":"🇮🇶","Curaçao":"🇨🇼","Haiti":"🇭🇹","Panama":"🇵🇦","New Zealand":"🇳🇿"
  };
  return flags[team] || "🏴‍☠️";
};

// ISO codes for real flag IMAGES (flag emoji don't render on Windows/Chrome — they
// show "BE" etc. — so we use flagcdn.com images, which work on every platform).
const FLAG_CODE = {
  "United States":"us","Canada":"ca","Mexico":"mx","Argentina":"ar","Brazil":"br","Colombia":"co",
  "Ecuador":"ec","Paraguay":"py","Uruguay":"uy","England":"gb-eng","France":"fr","Croatia":"hr",
  "Norway":"no","Portugal":"pt","Germany":"de","Netherlands":"nl","Austria":"at","Belgium":"be",
  "Scotland":"gb-sct","Spain":"es","Switzerland":"ch","Sweden":"se","Türkiye":"tr",
  "Bosnia and Herzegovina":"ba","Czechia":"cz","Algeria":"dz","Cabo Verde":"cv",
  "Côte d'Ivoire":"ci","Egypt":"eg","Ghana":"gh","Morocco":"ma","Senegal":"sn",
  "South Africa":"za","Tunisia":"tn","DR Congo":"cd","Australia":"au","Iran":"ir",
  "Japan":"jp","Jordan":"jo","South Korea":"kr","Qatar":"qa","Saudi Arabia":"sa",
  "Uzbekistan":"uz","Iraq":"iq","Curaçao":"cw","Haiti":"ht","Panama":"pa","New Zealand":"nz"
};
// Flag image component. Falls back to the emoji if the image fails to load
// (state-driven so it stays React-safe across re-renders).
const Flag = ({ team, h = 14 }) => {
  const [failed, setFailed] = useState(false);
  const code = FLAG_CODE[team];
  if (!code || failed) return <span style={{ fontSize: h, lineHeight: 1 }}>{flagEmoji(team)}</span>;
  return (
    <img
      src={`https://flagcdn.com/${code}.svg`}
      alt=""
      width={Math.round(h * 1.5)}
      height={h}
      loading="lazy"
      onError={() => setFailed(true)}
      style={{ borderRadius: 2, objectFit: 'cover', verticalAlign: 'middle', display: 'inline-block', boxShadow: '0 0 0 1px rgba(0,0,0,0.25)', flexShrink: 0 }}
    />
  );
};

// Password input with a show/hide (eye) toggle.
function PasswordField({ placeholder, onChange, onKeyDown }) {
  const [show, setShow] = useState(false);
  return (
    <div className="pwd-wrap">
      <input type={show ? "text" : "password"} className="input" placeholder={placeholder} onChange={onChange} onKeyDown={onKeyDown} />
      <button type="button" className="pwd-eye" onClick={() => setShow(s => !s)} aria-label="Show or hide password" title="Show / hide">{show ? "🙈" : "👁️"}</button>
    </div>
  );
}

// Map a football-data.org team name to the app's dropdown name (so flags + the
// API result-matching line up). Mirrors the CANON map in the Edge Function.
const _CANON_ALIAS = {
  caboverde: "capeverde", capeverdeislands: "capeverde",
  bosniaandherzegovina: "bosnia", bosniaherzegovina: "bosnia",
  turkiye: "turkey", cotedivoire: "ivorycoast",
  drcongo: "congodr", democraticrepublicofcongo: "congodr",
  unitedstates: "usa", unitedstatesofamerica: "usa",
  republicofkorea: "southkorea", korearepublic: "southkorea",
};
const _canonName = (s) => {
  const base = (s || "").normalize("NFD").replace(/[̀-ͯ]/g, "").toLowerCase().replace(/[^a-z0-9]/g, "");
  return _CANON_ALIAS[base] || base;
};
const APP_TEAM_BY_CANON = {};
// (diacritics stripped via Unicode NFD range U+0300–U+036F)
TEAMS.forEach(t => { APP_TEAM_BY_CANON[_canonName(t)] = t; });
const apiTeamToApp = (name) => APP_TEAM_BY_CANON[_canonName(name)] || name;

function App() {
  const [session, setSession] = useState(() => {
    try { return JSON.parse(localStorage.getItem("pariuri_session")); } catch { return null; }
  });
  const [users, setUsers] = useState({});
  const [matches, setMatches] = useState([]);
  const [tournamentConfig, setTournamentConfig] = useState({ tournament_name: "World Cup 2026", tournament_winner: null, champion_odds: {} });
  const [page, setPage] = useState("home");
  const [authMode, setAuthMode] = useState("login");
  const [form, setForm] = useState({ username: "", password: "", confirmPassword: "", favoriteTeam: "" });
  const [error, setError] = useState("");
  const [toast, setToast] = useState("");
  const [adminTab, setAdminTab] = useState("matches");
  const [inspectUser, setInspectUser] = useState(null);
  const [inspectMatchBets, setInspectMatchBets] = useState(null);
  const [globalTimer, setGlobalTimer] = useState("");
  const [isTournamentBegun, setIsTournamentBegun] = useState(false);
  const [matchForm, setMatchForm] = useState({ team1: "", team2: "", date: "", time: "21:00", odds1: "", oddsX: "", odds2: "", stage: "", apiFixtureId: "" });
  const [scoreDrafts, setScoreDrafts] = useState({});
  const [importOpen, setImportOpen] = useState(false);
  const [importLoading, setImportLoading] = useState(false);
  const [apiFixtures, setApiFixtures] = useState([]);
  const [importFilter, setImportFilter] = useState("");
  const [championEdit, setChampionEdit] = useState(false);
  const [champOpen, setChampOpen] = useState(false);
  const [lang, setLang] = useState(() => { try { return localStorage.getItem("pariuri_lang") || "en"; } catch { return "en"; } });
  // Tiny i18n helper: tr("English", "Română"). Falls back to English if no translation given.
  // (Named `tr` because `t` is used as the team loop variable in TEAMS.map(t => ...).)
  const tr = (en, ro) => (lang === "ro" && ro != null) ? ro : en;
  function switchLang(l) { setLang(l); try { localStorage.setItem("pariuri_lang", l); } catch {} }
  // Match-history display: show the team the player backed (or "X" for a draw)
  // instead of the raw 1 / X / 2 code.
  const pickName = (m, code) =>
    code === "1" ? m.team1 :
    code === "2" ? m.team2 :
    code === "X" ? "X" : "–";

  // Format match header: "Wed, 11 Jun · 21:00"
  const matchKickoff = (m) => {
    try {
      const d = new Date(m.match_date + "T" + m.match_time);
      const day = d.toLocaleDateString("en-GB", { weekday: "short" });
      const dateStr = d.toLocaleDateString("en-GB", { day: "numeric", month: "short" });
      const time = m.match_time.slice(0, 5);
      return `${day}, ${dateStr} · ${time}`;
    } catch { return `${m.match_date} · ${m.match_time}`; }
  };

  async function fetchAllData() {
    try {
      const { data: m } = await supabaseClient.from('matches').select('*');
      if (m) setMatches(m);
      const { data: p } = await supabaseClient.from('profiles').select('*');
      if (p) {
        const mapped = {};
        p.forEach(u => {
          if (u.username) {
            mapped[u.username.toLowerCase().trim()] = {
              id: u.id, username: String(u.username), password: u.password != null ? String(u.password) : "",
              isAdmin: u.is_admin || false, favoriteTeam: u.favorite_team ? String(u.favorite_team) : "",
              tournamentWinnerPick: u.tournament_winner_pick ? String(u.tournament_winner_pick) : null,
              isPickLocked: u.is_pick_locked || false,
              picks: u.picks && typeof u.picks === 'object' ? u.picks : {},
              pickTimes: u.pick_times && typeof u.pick_times === 'object' ? u.pick_times : {},
              previousRank: u.previous_rank || 0
            };
          }
        });
        setUsers(mapped);
      }
      const { data: cfg } = await supabaseClient.from('tournament_config').select('*').eq('id', 1).maybeSingle();
      if (cfg) setTournamentConfig({ tournament_name: cfg.tournament_name || "World Cup 2026", tournament_winner: cfg.tournament_winner || null, champion_odds: cfg.champion_odds || {} });
    } catch (ex) { console.error(ex); }
  }

  useEffect(() => {
    fetchAllData().then(() => {
      const el = document.getElementById("loader");
      if (el) el.classList.add("hidden");
    });
    const interval = setInterval(fetchAllData, 8000);
    return () => clearInterval(interval);
  }, []);

  useEffect(() => {
    if (session) {
      localStorage.setItem("pariuri_session", JSON.stringify(session));
      const targetUser = users[session.username.toLowerCase()];
      if (targetUser?.isAdmin) {
        if (page === "home" || page === "gateway") setPage("admin");
      }
      else if (page === "home") {
        const timeRemaining = WORLD_CUP_KICKOFF - new Date();
        setPage(timeRemaining > 0 ? "gateway" : "profile");
      }
    } else {
      localStorage.removeItem("pariuri_session");
    }
  }, [session, users]);

  useEffect(() => {
    function computeTimer() {
      const remaining = WORLD_CUP_KICKOFF - new Date();
      if (remaining <= 0) { setIsTournamentBegun(true); setGlobalTimer(tr("LIVE","ÎN DIRECT")); return; }
      const days = Math.floor(remaining / 86400000);
      const hours = Math.floor((remaining % 86400000) / 3600000);
      const minutes = Math.floor((remaining % 3600000) / 60000);
      const seconds = Math.floor((remaining % 60000) / 1000);
      setGlobalTimer(`${days}${tr("d","z")} ${hours}h ${minutes}m ${seconds}s`);
    }
    computeTimer();
    const id = setInterval(computeTimer, 1000);
    return () => clearInterval(id);
  }, [lang]);

  function triggerToast(msg) { setToast(msg); setTimeout(() => setToast(""), 2800); }

  const currentUser = (session && users[session.username.toLowerCase()]) ? users[session.username.toLowerCase()] : null;

  // Finished matches in chronological order (by kickoff) — used for scoring, the
  // lock-lead tiebreaker, and streaks.
  const finishedChrono = useMemo(() =>
    matches.filter(m => m.result).sort((a, b) =>
      new Date(a.match_date + "T" + a.match_time) - new Date(b.match_date + "T" + b.match_time)
    ), [matches]);

  const sortedLeaderboard = useMemo(() => {
    // Step 1 — points + correct wins for everyone (always needed to rank).
    const rows = Object.values(users).filter(u => !u.isAdmin).map(u => {
      let pts = 0, correctWins = 0;
      finishedChrono.forEach(m => {
        if (u.picks?.[m.id] === m.result) {
          correctWins++;
          pts += parseFloat(m.result === "1" ? m.odds1 : m.result === "X" ? m.oddsx : m.odds2) || 0;
        }
      });
      if (tournamentConfig.tournament_winner && u.tournamentWinnerPick === tournamentConfig.tournament_winner)
        pts += parseFloat(tournamentConfig.champion_odds[tournamentConfig.tournament_winner]) || 0;
      return { ...u, totalPoints: Math.round(pts * 100) / 100, correctWins };
    });

    // Step 2 — lock-lead is ONLY needed to break a points+wins tie, so it's computed
    // lazily (and cached). Once players are separated on points (or wins), it never runs.
    // Lock-lead = total minutes locked before kickoff across all played games (each game
    // adds its own kickoff − lock-time; no pick / no lock = 0 = worst).
    const leadCache = {};
    const lockLead = (u) => {
      if (leadCache[u.username] !== undefined) return leadCache[u.username];
      let s = 0;
      finishedChrono.forEach(m => {
        const pick = u.picks?.[m.id], t = u.pickTimes?.[m.id];
        if (pick && t) {
          const lead = (new Date(m.match_date + "T" + m.match_time) - new Date(t)) / 60000;
          if (lead > 0) s += lead;
        }
      });
      return (leadCache[u.username] = s);
    };

    return rows.sort((a, b) =>
      b.totalPoints - a.totalPoints      // 1st: points
      || b.correctWins - a.correctWins   // 2nd: correct picks (only if points tie)
      || lockLead(b) - lockLead(a)       // 3rd: earliest locking (only if still tied)
    );
  }, [users, finishedChrono, tournamentConfig]);

  // Hot (4+ correct in a row) and Cold (5+ wrong in a row) streaks, on each player's
  // current trailing run over the matches they picked (ignoring ones they skipped).
  const { hotPlayers, coldPlayers } = useMemo(() => {
    const hot = [], cold = [];
    Object.values(users).filter(u => !u.isAdmin).forEach(u => {
      let run = 0, runType = null;
      finishedChrono.forEach(m => {
        const pick = u.picks?.[m.id];
        if (!pick) return;
        const type = pick === m.result ? 'W' : 'L';
        if (type === runType) run++; else { runType = type; run = 1; }
      });
      if (runType === 'W' && run >= 4) hot.push({ username: u.username, streak: run });
      if (runType === 'L' && run >= 5) cold.push({ username: u.username, streak: run });
    });
    hot.sort((a, b) => b.streak - a.streak);
    cold.sort((a, b) => b.streak - a.streak);
    return { hotPlayers: hot, coldPlayers: cold };
  }, [users, finishedChrono]);

  async function runLogin() {
    if (!form.username || !form.password) { setError(tr("Please fill in all fields","Completați toate câmpurile")); return; }

    const target = users[normalized];
    if (!target) { setError(tr("Invalid login details","Date de autentificare invalide")); return; }
    setError("");
    // Primary: credentials live in Supabase Auth, not in a DB column.
    const { error: authErr } = await supabaseClient.auth.signInWithPassword({
      email: `${normalized}@pariuriwc2026.com`, password: form.password
    });
    if (!authErr) { setSession({ username: target.username }); return; }
    // Transitional fallback for legacy accounts whose plaintext password predates the
    // Auth migration. Goes inert once `password` is blanked in the DB (see setup SQL).
    if (target.password && target.password === form.password) { setSession({ username: target.username }); return; }
    setError(tr("Invalid login details","Date de autentificare invalide"));
  }

  async function runRegister() {
    if (!form.username || !form.password || !form.favoriteTeam) { setError(tr("Please fill in all fields","Completați toate câmpurile")); return; }
    const normalized = form.username.trim().toLowerCase();
    if (!/^[a-z0-9_.-]{2,20}$/.test(normalized)) { setError(tr("Username: 2–20 characters, only letters, numbers and _ . -","Nume utilizator: 2–20 caractere, doar litere, cifre și _ . -")); return; }
    if (form.password.length < 6) { setError(tr("Password must be at least 6 characters","Parola trebuie să aibă minim 6 caractere")); return; }
    if (form.password !== form.confirmPassword) { setError(tr("Passwords don't match","Parolele nu coincid")); return; }
    if (users[normalized]) { setError(tr("Username already taken","Nume de utilizator deja folosit")); return; }
    const generatedEmail = `${normalized}@pariuriwc2026.com`;
    const { data: authWrap, error: authErr } = await supabaseClient.auth.signUp({ email: generatedEmail, password: form.password });
    if (authErr) { setError(/already registered/i.test(authErr.message) ? tr("Username already taken","Nume de utilizator deja folosit") : authErr.message); return; }
    if (authWrap.user) {
      // Password is held by Supabase Auth — never store the plaintext in the profile row.
      // Admins are provisioned in the DB (set is_admin = true), not via client-side magic creds.
      const { error: profErr } = await supabaseClient.from('profiles').insert([{
        id: authWrap.user.id, username: form.username.trim(), password: "",
        is_admin: false, favorite_team: form.favoriteTeam,
        tournament_winner_pick: null, is_pick_locked: false, picks: {}
      }]);
      if (profErr) { setError(profErr.message); return; }

    await fetchAllData();
    setSession({ username: form.username.trim() });

  // Tap a pick = save a DRAFT (changeable until you lock it or kickoff). A draft is NOT
  // in the community vote, and has no lock time. It still counts for points once the match
  // finishes (auto-locked at kickoff with the worst time-lead).
  async function submitPrediction(matchId, outcome) {
    const m = matches.find(x => x.id === matchId);
    if (!m || m.result || new Date(m.match_date + "T" + m.match_time) <= new Date()) {
      triggerToast(tr("🔒 Predictions are closed","🔒 Predicțiile sunt închise")); return;
    }
    if (currentUser.pickTimes?.[matchId]) { triggerToast(tr("🔒 Already locked — can't change","🔒 Deja blocat — nu poți schimba")); return; }
    const localUpdated = { ...(currentUser.picks || {}), [matchId]: outcome };
    const { error: updateErr } = await supabaseClient.from('profiles').update({ picks: localUpdated }).eq('username', currentUser.username);
    if (updateErr) { triggerToast(tr("❌ Sync error","❌ Eroare de sincronizare")); return; }
    setUsers(prev => ({ ...prev, [currentUser.username.toLowerCase()]: { ...currentUser, picks: localUpdated } }));
  }

  // LOCK IN = commit the pick: final (immutable), timestamped (true lock time for the
  // tiebreaker), and from now on counted in the community vote.
  async function lockPick(matchId) {
    const m = matches.find(x => x.id === matchId);
    const choice = currentUser.picks?.[matchId];
    if (!choice) { triggerToast(tr("Pick Home, Draw or Away first","Alege întâi Acasă, Egal sau Oaspeți")); return; }
    if (!m || m.result || new Date(m.match_date + "T" + m.match_time) <= new Date()) { triggerToast(tr("🔒 Predictions are closed","🔒 Predicțiile sunt închise")); return; }
    if (currentUser.pickTimes?.[matchId]) return; // already locked
    const label = choice === "1" ? m.team1 : choice === "2" ? m.team2 : tr("Draw","Egal");
    const confirmMsg = tr(`Lock ${label} on ${m.team1} vs ${m.team2}?\nYou can't change it after this.`, `Blochezi ${label} la ${m.team1} vs ${m.team2}?\nNu mai poți schimba după.`);
    if (!window.confirm(confirmMsg)) return;
    // Read the authoritative lock times straight from the DB and merge, so locking one
    // game can NEVER overwrite the timestamps already saved for other games.
    const { data: fresh } = await supabaseClient.from('profiles').select('pick_times').eq('username', currentUser.username).maybeSingle();
    const base = (fresh && fresh.pick_times && typeof fresh.pick_times === 'object') ? fresh.pick_times : (currentUser.pickTimes || {});
    const merged = { ...base, [matchId]: new Date().toISOString() };
    const { error: lockErr } = await supabaseClient.from('profiles').update({ pick_times: merged }).eq('username', currentUser.username);
    if (lockErr) { triggerToast(tr("❌ Sync error","❌ Eroare de sincronizare")); return; }
    setUsers(prev => ({ ...prev, [currentUser.username.toLowerCase()]: { ...currentUser, pickTimes: merged } }));
    triggerToast(tr("🔒 Pick locked!","🔒 Predicție blocată!"));
  }

    if (currentUser.isPickLocked || isTournamentBegun) return;
    await supabaseClient.from('profiles').update({ tournament_winner_pick: team || null }).eq('username', currentUser.username);
    fetchAllData(); triggerToast(tr("🏆 Champion updated","🏆 Campion actualizat"));

    if (!window.confirm(tr("Lock in your champion pick for good?","Blochezi definitiv alegerea campionului?"))) return;
    await supabaseClient.from('profiles').update({ is_pick_locked: true }).eq('username', currentUser.username);
    fetchAllData(); triggerToast(tr("🔒 Champion locked in!","🔒 Campion blocat!"));

  function computeGlobalBetDistribution(matchId) {
    // Locked picks only — a pick counts here once it has a lock timestamp.
    const pool = Object.values(users).filter(u => !u.isAdmin && u.pickTimes?.[matchId]).map(u => u.picks?.[matchId]).filter(Boolean);
    if (!pool.length) return { p1: 0, pX: 0, p2: 0 };
    const c = { "1": 0, "X": 0, "2": 0 };
    pool.forEach(v => { if (c[v] !== undefined) c[v]++; });
    const tot = pool.length;
    return { p1: Math.round((c["1"]/tot)*100), pX: Math.round((c["X"]/tot)*100), p2: Math.round((c["2"]/tot)*100) };
  }

  // Download a complete snapshot of everything (picks, lock times, results, scores,
  // champion picks, standings) as a JSON file — a manual backup the admin can keep.
  function adminDownloadBackup() {
    const players = Object.values(users).filter(u => !u.isAdmin).map(u => ({
      username: u.username, favoriteTeam: u.favoriteTeam,
      championPick: u.tournamentWinnerPick, championLocked: u.isPickLocked,
      picks: u.picks || {}, pickTimes: u.pickTimes || {}
    }));
    const matchesOut = matches.map(m => ({
      id: m.id, team1: m.team1, team2: m.team2, date: m.match_date, time: m.match_time,
      matchday: m.tournament_stage, odds: { "1": m.odds1, "X": m.oddsx, "2": m.odds2 },
      result: m.result, score: (m.home_score != null && m.away_score != null) ? `${m.home_score}-${m.away_score}` : null,
      apiFixtureId: m.api_fixture_id
    }));
    const leaderboard = sortedLeaderboard.map((u, i) => ({ rank: i + 1, username: u.username, points: u.totalPoints, wins: u.correctWins }));
    const backup = { exportedAt: new Date().toISOString(), tournamentConfig, leaderboard, players, matches: matchesOut };
    const blob = new Blob([JSON.stringify(backup, null, 2)], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = `wc2026-backup-${new Date().toISOString().slice(0, 16).replace(/[:T]/g, "-")}.json`;
    document.body.appendChild(a); a.click(); a.remove();
    URL.revokeObjectURL(url);
    triggerToast("💾 Backup downloaded");
  }

  async function commitMatchResultWithRankSnapshot(matchId, outcome, homeScore = null, awayScore = null) {
    // Writing the result also snapshots every player's prior rank for the ↑/↓ arrows —
    // handled by the `trg_snapshot_ranks` DB trigger (see supabase/sql/leaderboard_rank_snapshot.sql),
    // which fires before the result lands and works for both this manual path and the cron sync.
    const patch = { result: outcome };
    if (homeScore !== null && awayScore !== null) { patch.home_score = homeScore; patch.away_score = awayScore; }
    await supabaseClient.from('matches').update(patch).eq('id', matchId);

            {adminTab === "winner" && (
              <div className="card card-gold">
                <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 12 }}>
                  <div>
                    <div className="section-label" style={{ marginBottom: 4 }}>Final Stage</div>
                    <div style={{ fontFamily: 'var(--font-display)', fontSize: 18, fontWeight: 800 }}>🏆 Champion &amp; Odds</div>
                  </div>
                  <button className={`btn btn-sm ${championEdit ? "btn-green" : "btn-gold"}`} onClick={() => { if (championEdit) triggerToast("🔒 Saved & locked"); setChampionEdit(!championEdit); }}>
                    {championEdit ? "🔒 Lock" : "✏️ Edit"}
                  </button>
                </div>
                {!championEdit && <div style={{ fontSize: 12, color: 'var(--muted)', marginBottom: 14 }}>🔒 Locked so you can't change it by accident — press <strong>Edit</strong> to adjust the winner or odds.</div>}

                <div style={{ opacity: championEdit ? 1 : 0.5, pointerEvents: championEdit ? 'auto' : 'none', filter: championEdit ? 'none' : 'blur(0.7px)', transition: 'opacity 0.2s, filter 0.2s' }}>
                  <div className="section-label" style={{ marginBottom: 8 }}>World Champion</div>
                  <div className="select-wrap" style={{ marginBottom: 20 }}>
                    <select className="input" disabled={!championEdit} value={tournamentConfig.tournament_winner || ""} onChange={e => adminSaveWinnerConfig(e.target.value || null)}>
                      <option value="">— Tournament ongoing —</option>
                      {TEAMS.map(t => <option key={t} value={t}>{flagEmoji(t)} {t}</option>)}
                    </select>
                  </div>

                  <div className="section-label" style={{ marginBottom: 12 }}>Champion Odds per Team</div>
                  <div className="grid-2">
                    {TEAMS.map(t => (
                      <div key={t} style={{ display: 'flex', alignItems: 'center', gap: 8, background: 'rgba(255,255,255,0.02)', padding: '7px 10px', borderRadius: 8 }}>
                        <span style={{ flex: 1, fontSize: 12, display: 'flex', alignItems: 'center', gap: 6 }}><Flag team={t} h={12} /> {t}</span>
                        <input type="number" step="0.01" className="input" disabled={!championEdit} style={{ width: 72, padding: '6px 8px', fontSize: 13 }} placeholder="10.0" value={tournamentConfig.champion_odds[t] || ""} onChange={e => adminSetOddsConfig(t, e.target.value)} />
                      </div>
                    ))}
                  </div>
                </div>
              </div>
            )}

            {adminTab === "players" && (
              <div>
                <div className="section-label" style={{ marginBottom: 12 }}>All Players</div>
                {Object.keys(users).map(k => {
                  const u = users[k];
                  return (
                    <div key={k} className="admin-match-row">
                      <div>
                        <div style={{ fontFamily: 'var(--font-display)', fontWeight: 800, fontSize: 15 }}>
                          {String(u.username)} {u.isAdmin && <span className="badge badge-gold" style={{ fontSize: 10 }}>Admin</span>}
                        </div>
                        <div style={{ fontSize: 11, color: 'var(--muted)', marginTop: 2 }}>
                          <Flag team={u.favoriteTeam} h={12} /> {u.favoriteTeam} · Champion: {u.tournamentWinnerPick || "Not picked"}
                        </div>
                      </div>
                      {!u.isAdmin && (
                        <button className="btn btn-danger btn-sm" onClick={async () => {
                          if (window.confirm("Delete this account?")) {
                            await supabaseClient.from('profiles').delete().eq('username', u.username);
                            fetchAllData();
                          }
                        }}>DELETE</button>
                      )}
                    </div>
                  );
                })}
              </div>
            )}
          </div>
        )}

      </div>{/* /container */}

      {/* ── BOTTOM NAV (mobile) ── */}
      {session && !currentUser?.isAdmin && (
        <div className="bottom-nav">
          {[["profile","👤",tr("Profile","Profil")],["leaderboard","📊",tr("Leaderboard","Clasament")],["matchday","⚽",tr("Matches","Meciuri")]].map(([key, icon, label]) => (
            <button key={key} className={`nav-btn ${page===key?"active":""}`} onClick={() => setPage(key)}>
              <span className="nav-btn-icon">{icon}</span>
              <span>{label}</span>
            </button>
          ))}
        </div>
      )}

      {/* ── INSPECT USER MODAL ── */}
      {inspectUser && (
        <div className="modal-overlay" onClick={() => setInspectUser(null)}>
          <div className="modal-content" onClick={e => e.stopPropagation()}>
            <div className="modal-handle"></div>
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 16 }}>
              <div>
                <div className="section-label">{tr("Profile","Profil")}</div>
                <div style={{ fontFamily: 'var(--font-display)', fontSize: 22, fontWeight: 900 }}>{String(inspectUser.username).toUpperCase()}</div>
              </div>
              <button style={{ background: 'rgba(255,255,255,0.06)', border: 'none', color: '#fff', width: 32, height: 32, borderRadius: '50%', cursor: 'pointer', fontSize: 14 }} onClick={() => setInspectUser(null)}>✕</button>
            </div>

            <div style={{ background: 'rgba(255,255,255,0.03)', padding: '12px 16px', borderRadius: 8, marginBottom: 16, display: 'flex', flexDirection: 'column', gap: 8 }}>
              <div style={{ fontSize: 13, display: 'flex', alignItems: 'center', gap: 6 }}><strong>{tr("Favorite team:","Echipă favorită:")}</strong> <Flag team={inspectUser.favoriteTeam} h={12} /> {String(inspectUser.favoriteTeam)}</div>
              <div style={{ fontSize: 13 }}>
                <strong>{tr("Champion pick:","Predicție campion:")}</strong>{" "}
                {(isTournamentBegun || String(inspectUser.username).toLowerCase() === String(currentUser?.username).toLowerCase())
                  ? (inspectUser.tournamentWinnerPick
                      ? <span style={{ display: 'inline-flex', alignItems: 'center', gap: 6 }}><Flag team={inspectUser.tournamentWinnerPick} h={12} /> {inspectUser.tournamentWinnerPick}</span>
                      : tr("Not picked","Neselectat"))
                  : tr("🔒 Hidden until kickoff","🔒 Ascuns până la start")
                }
                {inspectUser.isPickLocked && " 🔒"}
              </div>
            </div>

            <div className="section-label" style={{ marginBottom: 10 }}>{tr("Pick History","Istoric Selecții")}</div>
            {(() => {
              const isSelf = String(inspectUser.username).toLowerCase() === String(currentUser?.username).toLowerCase();
              // Viewing someone else: reveal a pick only once that match has KICKED OFF (or
              // finished) — picks on upcoming games stay secret. Viewing yourself: see all.
              const started = (m) => m.result || new Date(m.match_date + "T" + m.match_time) <= new Date();
              const shownMatches = isSelf ? matches : matches.filter(started);
              if (shownMatches.length === 0) {
                return <div style={{ textAlign: 'center', color: 'var(--muted)', padding: '24px 0', fontSize: 13 }}>{tr("No kicked-off matches yet — picks stay hidden until games start.","Niciun meci început încă — predicțiile rămân ascunse până încep meciurile.")}</div>;
              }
              return shownMatches.map(m => {
                const choice = inspectUser.picks?.[m.id];
                const label = choice ? pickName(m, choice) : tr("– No pick","– Nicio predicție");
                let variant = "muted";
                if (m.result && choice) variant = choice === m.result ? "green" : "danger";
                return (
                  <div key={m.id} style={{ display: 'flex', justifyContent: 'space-between', padding: '10px 12px', background: 'rgba(255,255,255,0.02)', borderRadius: 8, marginBottom: 6, border: '1px solid rgba(255,255,255,0.04)' }}>
                    <div>
                      <div style={{ fontFamily: 'var(--font-display)', fontWeight: 700, fontSize: 13 }}>{m.team1} vs {m.team2}</div>
                      <div style={{ fontSize: 10, color: 'var(--muted)', marginTop: 2 }}>{m.match_date} {m.result && `· ${tr("Result","Rezultat")}: ${pickName(m, m.result)}${(m.home_score != null && m.away_score != null) ? ` (${m.home_score}–${m.away_score})` : ""}`}</div>
                    </div>
                    <span className={`badge badge-${variant}`}>{label}</span>
                  </div>
                );
              });
            })()}
          </div>
        </div>
      )}

      {/* ── INSPECT MATCH BETS MODAL ── */}
      {inspectMatchBets && (
        <div className="modal-overlay" onClick={() => setInspectMatchBets(null)}>
          <div className="modal-content" onClick={e => e.stopPropagation()}>
            <div className="modal-handle"></div>
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 16 }}>
              <div>
                <div className="section-label">{tr("Who picked what","Cine ce a ales")}</div>
                <div style={{ fontFamily: 'var(--font-display)', fontSize: 18, fontWeight: 900 }}>{inspectMatchBets.team1} vs {inspectMatchBets.team2}</div>
              </div>
              <button style={{ background: 'rgba(255,255,255,0.06)', border: 'none', color: '#fff', width: 32, height: 32, borderRadius: '50%', cursor: 'pointer', fontSize: 14 }} onClick={() => setInspectMatchBets(null)}>✕</button>
            </div>
            {Object.values(users).filter(u => !u.isAdmin).map(u => {
              const choice = u.picks?.[inspectMatchBets.id];
              const isCorrect = inspectMatchBets.result && choice === inspectMatchBets.result;
              return (
                <div key={u.username} style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', padding: '10px 14px', background: 'rgba(255,255,255,0.02)', borderRadius: 8, marginBottom: 6, border: '1px solid rgba(255,255,255,0.04)' }}>
                  <span style={{ fontFamily: 'var(--font-display)', fontSize: 14, fontWeight: 700 }}>{String(u.username)}</span>
                  <span className={`badge ${isCorrect ? "badge-green" : "badge-muted"}`}>{choice ? pickName(inspectMatchBets, choice) : tr("No pick","Fără pred.")}</span>
                </div>
              );
            })}
          </div>
        </div>
      )}

      {/* ── IMPORT FIXTURES MODAL ── */}
      {importOpen && (
        <div className="modal-overlay" onClick={() => setImportOpen(false)}>
          <div className="modal-content" onClick={e => e.stopPropagation()}>
            <div className="modal-handle"></div>
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 12 }}>
              <div>
                <div className="section-label">API Schedule</div>
                <div style={{ fontFamily: 'var(--font-display)', fontSize: 18, fontWeight: 900 }}>Import a match</div>
              </div>
              <button style={{ background: 'rgba(255,255,255,0.06)', border: 'none', color: '#fff', width: 32, height: 32, borderRadius: '50%', cursor: 'pointer', fontSize: 14 }} onClick={() => setImportOpen(false)}>✕</button>
            </div>
            <input className="input" placeholder="🔎 Search team…" value={importFilter} onChange={e => setImportFilter(e.target.value)} style={{ marginBottom: 12 }} />
            {apiFixtures.length === 0 && (
              <div style={{ textAlign: 'center', color: 'var(--muted)', padding: '30px 0', fontSize: 13 }}>No matches returned by the API.</div>
            )}
            {apiFixtures
              .filter(fx => !importFilter || `${fx.home} ${fx.away}`.toLowerCase().includes(importFilter.toLowerCase()))
              .sort((a, b) => new Date(a.utcDate) - new Date(b.utcDate))
              .map(fx => {
                const t1 = apiTeamToApp(fx.home), t2 = apiTeamToApp(fx.away);
                const already = matches.some(m => String(m.api_fixture_id) === String(fx.id));
                const d = new Date(fx.utcDate);
                return (
                  <div key={fx.id} onClick={() => adminPickFixture(fx)}
                    style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', padding: '10px 14px', background: 'rgba(255,255,255,0.02)', borderRadius: 8, marginBottom: 6, border: '1px solid rgba(255,255,255,0.04)', cursor: 'pointer', opacity: already ? 0.5 : 1 }}>
                    <div>
                      <div style={{ fontFamily: 'var(--font-display)', fontSize: 14, fontWeight: 700, display: 'flex', alignItems: 'center', gap: 6, flexWrap: 'wrap' }}><Flag team={t1} h={13} /> {t1} vs {t2} <Flag team={t2} h={13} /></div>
                      <div style={{ fontSize: 10, color: 'var(--muted)', marginTop: 2 }}>{d.toLocaleString()} · ID {fx.id}</div>
                    </div>
                    {already ? <span className="badge badge-muted">Added</span> : <span className="badge badge-gold">+ Pick</span>}
                  </div>
                );
              })}
          </div>
        </div>
      )}

    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>
</body>
</html>
