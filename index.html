<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Pariuri World Cup 2026</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%E2%9A%BD%3C/text%3E%3C/svg%3E" />
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  html, body, #root { margin: 0; padding: 0; min-height: 100vh; background: #0a0e1a; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
  * { box-sizing: border-box; }
  input, select, button { font-family: inherit; }
  
  #loader {
    position: fixed; inset: 0; background: #0a0e1a; color: #f5c842;
    display: flex; align-items: center; justify-content: center; flex-direction: column;
    gap: 14px; font-weight: 700; font-size: 15px; z-index: 9999;
    transition: opacity 0.3s ease;
  }
  #loader.hidden { opacity: 0; pointer-events: none; }
  .spinner {
    width: 36px; height: 36px; border: 3px solid rgba(245,200,66,0.2);
    border-top-color: #f5c842; border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div id="loader">
  <div class="spinner"></div>
  <div>⚽ Loading Pariuri World Cup 2026...</div>
</div>

<div id="root"></div>

<script type="text/babel" data-presets="react">
const { useState, useEffect } = React;

const SUPABASE_URL = "https://mfvwumillzpofmvjibkp.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_QUjFKlHhgcIgisSV-SESdg_49GIA0c0";
const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const TEAMS = [
  "United States", "Canada", "Mexico", "Argentina", "Brazil", "Colombia", "Ecuador", "Paraguay", "Uruguay",
  "England", "France", "Croatia", "Norway", "Portugal", "Germany", "Netherlands", "Austria", "Belgium",
  "Scotland", "Spain", "Switzerland", "Sweden", "Türkiye", "Bosnia and Herzegovina", "Czechia",
  "Algeria", "Cabo Verde", "Côte d'Ivoire", "Egypt", "Ghana", "Morocco", "Senegal", "South Africa", "Tunisia", "DR Congo",
  "Australia", "Iran", "Japan", "Jordan", "South Korea", "Qatar", "Saudi Arabia", "Uzbekistan", "Iraq",
  "Curaçao", "Haiti", "Panama", "New Zealand"
];

const WORLD_CUP_KICKOFF = new Date("2026-06-11T20:00:00Z");

const styles = {
  app: { minHeight: "100vh", background: "#0a0e1a", color: "#e8eaf0", fontFamily: "-apple-system, BlinkMacSystemFont, sans-serif" },
  nav: { background: "rgba(10,14,26,0.95)", borderBottom: "1px solid rgba(255,255,255,0.08)", padding: "0 16px", display: "flex", alignItems: "center", height: 56, position: "sticky", top: 0, zIndex: 100 },
  logo: { fontWeight: 800, fontSize: 20, color: "#f5c842", letterSpacing: "-0.5px", marginRight: "auto", cursor: "pointer" },
  navBtn: (active) => ({ background: active ? "rgba(245,200,66,0.12)" : "transparent", border: "none", color: active ? "#f5c842" : "rgba(232,234,240,0.6)", padding: "6px 10px", borderRadius: 8, cursor: "pointer", fontSize: 13, fontWeight: active ? 600 : 400 }),
  hero: { padding: "80px 24px 60px", maxWidth: 820, margin: "0 auto", textAlign: "center" },
  heroTitle: { fontSize: 52, fontWeight: 800, color: "#f5c842", margin: "0 0 12px", lineHeight: 1.1, letterSpacing: "-2px" },
  heroSub: { fontSize: 18, color: "rgba(232,234,240,0.6)", margin: "0 0 48px" },
  card: { background: "rgba(255,255,255,0.04)", border: "1px solid rgba(255,255,255,0.08)", borderRadius: 14, padding: "20px 24px", marginBottom: 16 },
  btn: (variant="primary") => ({ background: variant === "primary" ? "#f5c842" : variant === "danger" ? "#e24b4b" : "rgba(255,255,255,0.07)", color: variant === "primary" ? "#0a0e1a" : "#e8eaf0", border: "none", borderRadius: 10, padding: "10px 20px", fontWeight: 700, fontSize: 14, cursor: "pointer" }),
  pickBtn: (selected, type) => {
    const colors = { "1": "#4caf50", "X": "#f5c842", "2": "#2196f3" };
    return { background: selected ? colors[type] : "rgba(255,255,255,0.06)", color: selected ? "#0a0e1a" : "#e8eaf0", border: `1.5px solid ${selected ? colors[type] : "rgba(255,255,255,0.12)"}`, borderRadius: 8, padding: "8px 14px", cursor: "pointer", fontWeight: 700, fontSize: 13, minWidth: 52 };
  },
  input: { background: "rgba(255,255,255,0.06)", border: "1px solid rgba(255,255,255,0.12)", borderRadius: 10, color: "#e8eaf0", padding: "10px 14px", fontSize: 14, width: "100%", outline: "none" },
  label: { fontSize: 12, color: "rgba(232,234,240,0.5)", marginBottom: 5, display: "block" },
  badge: (color) => ({ background: color === "gold" ? "rgba(245,200,66,0.15)" : color === "green" ? "rgba(76,175,80,0.15)" : "rgba(255,255,255,0.08)", color: color === "gold" ? "#f5c842" : color === "green" ? "#4caf50" : "rgba(232,234,240,0.5)", borderRadius: 6, padding: "3px 10px", fontSize: 12, fontWeight: 600 }),
  podium: [
    { bg: "rgba(255,215,0,0.12)", border: "rgba(255,215,0,0.3)", color: "#ffd700", rank: "🥇" },
    { bg: "rgba(192,192,192,0.1)", border: "rgba(192,192,192,0.25)", color: "#c0c0c0", rank: "🥈" },
    { bg: "rgba(205,127,50,0.1)", border: "rgba(205,127,50,0.25)", color: "#cd7f32", rank: "🥉" },
  ],
};

const flagEmoji = (team) => {
  const flags = {
    "United States":"🇺🇸","Canada":"🇨🇦","Mexico":"🇲🇽","Argentina":"🇦🇷","Brazil":"🇧🇷","Colombia":"🇨🇴","Ecuador":"🇪🇨","Paraguay":"🇵🇾","Uruguay":"🇺🇾",
    "England":"🏴󠁧󠁢󠁥󠁮󠁧󠁿","France":"🇫🇷","Croatia":"🇭🇷","Norway":"🇳🇴","Portugal":"🇵🇹","Germany":"🇩🇪","Netherlands":"🇳🇱","Austria":"🇦🇹","Belgium":"🇧🇪",
    "Scotland":"🏴󠁧󠁢󠁳󠁣󠁴󠁿","Spain":"🇪🇸","Switzerland":"🇨🇭","Sweden":"🇸🇪","Türkiye":"🇹🇷","Bosnia and Herzegovina":"🇧🇦","Czechia":"🇨🇿",
    "Algeria":"🇩🇿","Cabo Verde":"🇨🇻","Côte d'Ivoire":"🇨🇮","Egypt":"🇪🇬","Ghana":"🇬🇭","Morocco":"🇲🇦","Senegal":"🇸🇳","South Africa":"🇿🇦","Tunisia":"🇹🇳","DR Congo":"🇨🇩",
    "Australia":"🇦🇺","Iran":"🇮🇷","Japan":"🇯🇵","Jordan":"🇯🇴","South Korea":"🇰🇷","Qatar":"🇶🇦","Saudi Arabia":"🇸🇦","Uzbekistan":"🇺🇿","Iraq":"🇮🇶",
    "Curaçao":"🇨🇼","Haiti":"🇭🇹","Panama":"🇵🇦","New Zealand":"🇳🇿"
  };
  return flags[team] || "🏳️";
};

function App() {
  const [session, setSession] = useState(() => {
    const saved = localStorage.getItem("pariuri_session");
    return saved ? JSON.parse(saved) : null;
  });

  const [users, setUsers] = useState({});
  const [matches, setMatches] = useState([]);
  const [tournamentConfig, setTournamentConfig] = useState({ tournament_name: "World Cup 2026", tournament_winner: null, champion_odds: {} });

  const [page, setPage] = useState("home");
  const [authMode, setAuthMode] = useState("login");
  const [form, setForm] = useState({});
  const [error, setError] = useState("");
  const [adminTab, setAdminTab] = useState("matches");
  const [toast, setToast] = useState("");

  const [scheduleFilter, setScheduleFilter] = useState("ALL");
  const [bulkTeam1, setBulkTeam1] = useState("");
  const [bulkTeam2, setBulkTeam2] = useState("");
  const [bulkDate, setBulkDate] = useState("");
  const [bulkTime, setBulkTime] = useState("20:00");
  const [bulkOdds1, setBulkOdds1] = useState("");
  const [bulkOddsX, setBulkOddsX] = useState("");
  const [bulkOdds2, setBulkOdds2] = useState("");
  const [bulkGroup, setBulkGroup] = useState("");
  const [addError, setAddError] = useState("");

  const [kickoffCountdown, setKickoffCountdown] = useState("");

  // Global Countdown Handler for the World Cup Start Date
  useEffect(() => {
    function updateTimer() {
      const ms = WORLD_CUP_KICKOFF - new Date();
      if (ms <= 0) {
        setKickoffCountdown("Tournament Started");
        return;
      }
      const days = Math.floor(ms / (1000 * 60 * 60 * 24));
      const hours = Math.floor((ms % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
      const minutes = Math.floor((ms % (1000 * 60 * 60)) / (1000 * 60));
      setKickoffCountdown(`${days}d ${hours}h ${minutes}m`);
    }
    updateTimer();
    const interval = setInterval(updateTimer, 60000);
    return () => clearInterval(interval);
  }, []);

  async function fetchCloudData() {
    try {
      const { data: dbMatches } = await supabaseClient.from('matches').select('*');
      if (dbMatches) setMatches(dbMatches);

      const { data: dbProfiles } = await supabaseClient.from('profiles').select('*');
      if (dbProfiles) {
        const mappedUsers = {};
        dbProfiles.forEach(u => {
          const usernameKey = u.username ? u.username.toLowerCase().trim() : "";
          if (usernameKey) {
            mappedUsers[usernameKey] = {
              id: u.id,
              username: u.username,
              password: u.password,
              isAdmin: u.is_admin || false,
              favoriteTeam: u.favorite_team || null,
              tournamentWinnerPick: u.tournament_winner_pick || null,
              isPickLocked: u.is_pick_locked || false,
              picks: typeof u.picks === 'object' && u.picks !== null ? u.picks : {}
            };
          }
        });
        setUsers(mappedUsers);
      }

      const { data: dbConfig } = await supabaseClient.from('tournament_config').select('*').eq('id', 1).maybeSingle();
      if (dbConfig) {
        setTournamentConfig({
          tournament_name: dbConfig.tournament_name || "World Cup 2026",
          tournament_winner: dbConfig.tournament_winner || null,
          champion_odds: dbConfig.champion_odds || {}
        });
      }
    } catch (err) {
      console.error("Data fetch error:", err);
    }
  }

  useEffect(() => {
    fetchCloudData().then(() => {
      const loader = document.getElementById("loader");
      if (loader) loader.classList.add("hidden");
    });
  }, []);

  useEffect(() => {
    const id = setInterval(fetchCloudData, 15000);
    return () => clearInterval(id);
  }, []);

  useEffect(() => {
    if (session) {
      localStorage.setItem("pariuri_session", JSON.stringify(session));
    } else {
      localStorage.removeItem("pariuri_session");
    }
  }, [session]);

  function showToast(msg) {
    setToast(msg);
    setTimeout(() => setToast(""), 2800);
  }

  const currentUser = session ? users[session.username] : null;
  const isAdmin = currentUser?.isAdmin;

  function computeLeaderboard() {
    return Object.values(users)
      .filter(u => !u.isAdmin)
      .map(u => {
        let pts = 0;
        matches.forEach(m => {
          if (m.result && u.picks && u.picks[m.id] === m.result) {
            const odds = m.result === "1" ? m.odds1 : m.result === "X" ? m.oddsx : m.odds2;
            pts += parseFloat(odds) || 0;
          }
        });
        if (tournamentConfig.tournament_winner && u.tournamentWinnerPick === tournamentConfig.tournament_winner) {
          pts += parseFloat(tournamentConfig.champion_odds[tournamentConfig.tournament_winner]) || 0;
        }
        return { ...u, computedPoints: Math.round(pts * 100) / 100 };
      })
      .sort((a, b) => b.computedPoints - a.computedPoints);
  }

  function handleLogin() {
    if (!form.username || !form.password) { setError("Fields required."); return; }
    const uname = form.username.trim().toLowerCase();
    const user = users[uname];
    if (!user || user.password !== form.password) { setError("Invalid credentials."); return; }
    setError("");
    setSession({ username: uname });
    setForm({});
    setPage(user.isAdmin ? "admin" : "leaderboard");
  }

  async function handleRegister() {
    if (!form.username || !form.password || !form.password2) { setError("All fields required."); return; }
    if (form.password !== form.password2) { setError("Passwords don't match."); return; }
    
    const uname = form.username.trim().toLowerCase();
    if (users[uname]) { setError("Username taken."); return; }
    if (!form.favoriteTeam && uname !== "dobrinescu") { setError("Please pick your favorite team."); return; }

    setError("");
    const isFirstAdmin = uname === "dobrinescu" && form.password === "admin123";
    const validEmail = `${uname}@pariuriwc2026.com`;

    const { data: authData, error: regError } = await supabaseClient
      .auth
      .signUp({
        email: validEmail,
        password: form.password
      });

    if (regError) {
      console.error("Supabase Registration Error:", regError);
      setError(`Registration sync failure: ${regError.message}`);
      return;
    }

    if (authData && authData.user) {
      const { error: profileError } = await supabaseClient
        .from('profiles')
        .insert([{
          id: authData.user.id,
          username: form.username.trim(),
          password: form.password,
          is_admin: isFirstAdmin,
          favorite_team: form.favoriteTeam || null,
          tournament_winner_pick: null,
          is_pick_locked: false,
          picks: {}
        }]);

      if (profileError) {
        console.error("Profile Sync Error:", profileError);
        setError(`Database constraint failure: ${profileError.message}`);
        return;
      }
    }

    await fetchCloudData();
    setSession({ username: uname });
    setForm({});
    setPage(isFirstAdmin ? "admin" : "leaderboard");
    showToast(`Welcome ${form.username.trim()}!`);
  }

  function handleLogout() {
    setSession(null);
    setPage("home");
  }

  // Handle auto-saving the champion pick inside the panel
  async function handleAutosaveWinner(teamSelected) {
    if (currentUser?.isPickLocked || new Date() >= WORLD_CUP_KICKOFF) return;

    const { error: err } = await supabaseClient
      .from('profiles')
      .update({ tournament_winner_pick: teamSelected || null })
      .eq('username', currentUser.username);

    if (err) {
      showToast("❌ Autosave failed connection issue.");
      console.error(err);
    } else {
      showToast(`Autosaved Champion: ${teamSelected || "Cleared"}`);
      fetchCloudData();
    }
  }

  // Trigger manual lock mechanism
  async function handleLockPick() {
    if (!currentUser?.tournamentWinnerPick) {
      showToast("⚠️ Pick a team before locking your choice.");
      return;
    }
    if (!window.confirm("Are you sure? This will freeze your predictive choice and you cannot adjust it again.")) return;

    const { error: err } = await supabaseClient
      .from('profiles')
      .update({ is_pick_locked: true })
      .eq('username', currentUser.username);

    if (err) {
      showToast("❌ Failed to lock choice.");
    } else {
      showToast("Locked! 🔒 Choice finalized.");
      fetchCloudData();
    }
  }

  const kickoffDate = (m) => new Date(m.match_date + "T" + (m.match_time || "00:00"));
  const isLocked = (m) => !!m.result || kickoffDate(m) <= new Date();

  const countdown = (m) => {
    const ms = kickoffDate(m) - new Date();
    if (ms <= 0) return null;
    const mins = Math.floor(ms / 60000);
    const days = Math.floor(mins / 1440);
    const hours = Math.floor((mins % 1440) / 60);
    const remMins = mins % 60;
    if (days > 0) return `${days}d ${hours}h`;
    if (hours > 0) return `${hours}h ${remMins}m`;
    if (mins > 0) return `${mins}m`;
    return "<1m";
  };

  async function makePick(matchId, pick) {
    const m = matches.find(x => x.id === matchId);
    if (!m) return;
    if (isLocked(m)) { showToast("⛔ Picks locked — match started."); return; }

    const updatedPicks = { ...(currentUser.picks || {}), [matchId]: pick };

    const { error: syncErr } = await supabaseClient
      .from('profiles')
      .update({ picks: updatedPicks })
      .eq('username', currentUser.username);

    if (syncErr) {
      showToast("❌ Connection error. Pick failed to log.");
      return;
    }

    setUsers(prev => {
      const u = { ...prev[session.username] };
      u.picks = updatedPicks;
      return { ...prev, [session.username]: u };
    });
    showToast(`Pick saved: ${pick === "1" ? m.team1 : pick === "2" ? m.team2 : "Draw"}`);
  }

  async function adminAddMatch() {
    if (!bulkTeam1 || !bulkTeam2 || !bulkDate || !bulkOdds1 || !bulkOddsX || !bulkOdds2) {
      setAddError("Fill all fields."); return;
    }
    const id = `m_${Date.now()}`;
    const newMatch = {
      id, team1: bulkTeam1, team2: bulkTeam2,
      match_date: bulkDate, match_time: bulkTime || "20:00",
      odds1: parseFloat(bulkOdds1), oddsx: parseFloat(bulkOddsX), odds2: parseFloat(bulkOdds2),
      tournament_stage: bulkGroup || "", result: null
    };

    const { error: insErr } = await supabaseClient.from('matches').insert([newMatch]);
    if (insErr) {
      setAddError("Insertion rejected by schema rules."); return;
    }

    await fetchCloudData();
    setBulkTeam1(""); setBulkTeam2(""); setBulkOdds1(""); setBulkOddsX(""); setBulkOdds2(""); setBulkGroup("");
    setAddError("");
    showToast("Match scheduled!");
  }

  async function adminSetResult(matchId, result) {
    await supabaseClient.from('matches').update({ result }).eq('id', matchId);
    await fetchCloudData();
    showToast("Result published!");
  }

  async function adminUndoResult(matchId) {
    await supabaseClient.from('matches').update({ result: null }).eq('id', matchId);
    await fetchCloudData();
    showToast("Result reverted.");
  }

  async function adminDeleteMatch(matchId) {
    if (!window.confirm("Delete match?")) return;
    await supabaseClient.from('matches').delete().eq('id', matchId);
    await fetchCloudData();
    showToast("Match cleared.");
  }

  async function adminDeleteUser(uname) {
    const targetUser = Object.values(users).find(x => x.username.toLowerCase() === uname.toLowerCase());
    if (!targetUser) return;
    if (!window.confirm(`Wipe account "${targetUser.username}"?`)) return;

    await supabaseClient.from('profiles').delete().eq('username', targetUser.username);
    await fetchCloudData();
    showToast("Profile purged.");
  }

  async function adminUpdateConfig(name, winner) {
    await supabaseClient.from('tournament_config').update({ tournament_name: name, tournament_winner: winner }).eq('id', 1);
    setTournamentConfig(prev => ({ ...prev, tournament_name: name, tournament_winner: winner }));
  }

  async function adminUpdateChampionOdds(team, val) {
    const updatedOdds = { ...tournamentConfig.champion_odds };
    if (val === "") delete updatedOdds[team]; else updatedOdds[team] = parseFloat(val);

    await supabaseClient.from('tournament_config').update({ champion_odds: updatedOdds }).eq('id', 1);
    setTournamentConfig(prev => ({ ...prev, champion_odds: updatedOdds }));
  }

  const pickableMatches = matches.filter(m => !isLocked(m)).sort((a, b) => kickoffDate(a) - kickoffDate(b));
  const leaderboard = computeLeaderboard();

  return (
    <div style={styles.app}>
      {toast && <div style={{ position: "fixed", bottom: 24, left: "50%", transform: "translateX(-50%)", background: "#f5c842", color: "#0a0e1a", padding: "12px 24px", borderRadius: 12, fontWeight: 700, fontSize: 14, zIndex: 9999, boxShadow: "0 4px 20px rgba(0,0,0,0.3)" }}>{toast}</div>}
      
      <nav style={styles.nav}>
        <div style={styles.logo} onClick={() => setPage(isAdmin ? "admin" : session ? "leaderboard" : "home")}>⚽ Pariuri World Cup 2026</div>
        {session ? (
          <>
            {isAdmin ? (
              <button style={styles.navBtn(page==="admin")} onClick={() => setPage("admin")}>Admin</button>
            ) : (
              [["leaderboard", "Leaderboard"], ["picks", "Next Matchday"], ["results", "Results"], ["schedule", "Schedule"]].map(([key, label]) => (
                <button key={key} style={styles.navBtn(page===key)} onClick={() => setPage(key)}>{label}</button>
              ))
            )}
            <div style={{ marginLeft: "auto", display: "flex", alignItems: "center", gap: 10 }}>
              <span style={{ fontSize: 13, color: "rgba(232,234,240,0.4)" }}>{currentUser?.username}</span>
              <button style={{ ...styles.btn("ghost"), padding: "6px 12px", fontSize: 13, border: "1px solid rgba(255,255,255,0.1)" }} onClick={handleLogout}>Logout</button>
            </div>
          </>
        ) : (
          <div style={{ display: "flex", gap: 8 }}>
            <button style={{ ...styles.btn("ghost"), padding: "6px 12px", fontSize: 13, border: "1px solid rgba(255,255,255,0.1)" }} onClick={() => { setAuthMode("login"); setPage("auth"); }}>Sign in</button>
            <button style={{ ...styles.btn("primary"), padding: "6px 12px", fontSize: 13 }} onClick={() => { setAuthMode("register"); setPage("auth"); }}>Join</button>
          </div>
        )}
      </nav>

      {!session && page === "home" && (
        <div style={styles.hero}>
          <div style={{ fontSize: 48, marginBottom: 8 }}>⚽</div>
          <h1 style={styles.heroTitle}>Pariuri World Cup 2026</h1>
          <p style={styles.heroSub}>The ultimate football prediction arena with friends.</p>
          <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit,minmax(220px,1fr))", gap: 16, marginBottom: 48, textAlign: "left" }}>
            {[
              ["⚽", "Pick the result", "Choose 1, X, or 2 for each match before kickoff."],
              ["📊", "Earn fractional points", "Correct picks score points matching the dynamic match odds."],
              ["🏆", "Crown the champion", "Predict your tournament winner for custom bonus points."],
              ["🥇", "Dominate rankings", "Scale the local bracket and out-smart your competition."],
            ].map(([icon, title, desc]) => (
              <div key={title} style={{ ...styles.card, padding: "18px 20px" }}>
                <div style={{ fontSize: 26, marginBottom: 8 }}>{icon}</div>
                <div style={{ fontWeight: 700, fontSize: 15, marginBottom: 6 }}>{title}</div>
                <div style={{ fontSize: 13, color: "rgba(232,234,240,0.55)", lineHeight: 1.6 }}>{desc}</div>
              </div>
            ))}
          </div>
          <div style={{ display: "flex", gap: 12, justifyContent: "center" }}>
            <button style={{ ...styles.btn("primary"), padding: "13px 32px", fontSize: 15 }} onClick={() => { setAuthMode("register"); setPage("auth"); }}>Join the game</button>
            <button style={{ ...styles.btn("ghost"), padding: "13px 32px", fontSize: 15, border: "1px solid rgba(255,255,255,0.1)" }} onClick={() => { setAuthMode("login"); setPage("auth"); }}>Sign in</button>
          </div>
        </div>
      )}

      {!session && page === "auth" && (
        <div style={{ maxWidth: 420, margin: "60px auto", padding: "0 24px" }}>
          <div style={styles.card}>
            <div style={{ textAlign: "center", marginBottom: 24 }}>
              <div style={{ fontSize: 32, marginBottom: 8 }}>⚽</div>
              <div style={{ fontSize: 22, fontWeight: 800, color: "#f5c842" }}>Pariuri World Cup 2026</div>
            </div>
            <div style={{ display: "flex", marginBottom: 20, background: "rgba(255,255,255,0.04)", borderRadius: 10, padding: 3 }}>
              {["login","register"].map(m => (
                <button key={m} style={{ flex: 1, background: authMode === m ? "rgba(245,200,66,0.15)" : "transparent", border: "none", color: authMode === m ? "#f5c842" : "rgba(232,234,240,0.5)", padding: "9px 0", borderRadius: 8, cursor: "pointer", fontWeight: 600, fontSize: 13.5 }} onClick={() => { setAuthMode(m); setError(""); }}>
                  {m === "login" ? "Sign in" : "Register"}
                </button>
              ))}
            </div>

            {authMode === "login" ? (
              <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>
                <div><label style={styles.label}>Username</label><input style={styles.input} value={form.username||""} onChange={e=>setForm(p=>({...p,username:e.target.value}))} onKeyDown={e=>e.key==="Enter"&&handleLogin()} /></div>
                <div><label style={styles.label}>Password</label><input style={styles.input} type="password" value={form.password||""} onChange={e=>setForm(p=>({...p,password:e.target.value}))} onKeyDown={e=>e.key==="Enter"&&handleLogin()} /></div>
                {error && <div style={{ color: "#e24b4b", fontSize: 13 }}>{error}</div>}
                <button style={{ ...styles.btn("primary"), padding: "12px", fontSize: 15 }} onClick={handleLogin}>Sign in</button>
              </div>
            ) : (
              <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>
                <div><label style={styles.label}>Username</label><input style={styles.input} value={form.username||""} onChange={e=>setForm(p=>({...p,username:e.target.value}))} /></div>
                <div><label style={styles.label}>Password</label><input style={styles.input} type="password" value={form.password||""} onChange={e=>setForm(p=>({...p,password:e.target.value}))} /></div>
                <div><label style={styles.label}>Confirm password</label><input style={styles.input} type="password" value={form.password2||""} onChange={e=>setForm(p=>({...p,password2:e.target.value}))} /></div>
                <div>
                  <label style={styles.label}>❤️ Pick your favourite team (NO Bonus Points)</label>
                  <select style={styles.input} value={form.favoriteTeam||""} onChange={e=>setForm(p=>({...p,favoriteTeam:e.target.value}))}>
                    <option value="">Choose your fan team...</option>
                    {TEAMS.map(t=><option key={t} value={t}>{flagEmoji(t)} {t}</option>)}
                  </select>
                </div>
                {error && <div style={{ color: "#e24b4b", fontSize: 13 }}>{error}</div>}
                <button style={{ ...styles.btn("primary"), padding: "12px", fontSize: 15 }} onClick={handleRegister}>Create account</button>
              </div>
            )}
          </div>
        </div>
      )}

      {session && !isAdmin && page === "leaderboard" && (
        <div style={{ maxWidth: 700, margin: "0 auto", padding: "32px 24px" }}>
          
          {/* TOURNAMENT CHAMPION MANAGEMENT PANEL FOR PLAYERS */}
          <div style={{ ...styles.card, border: "1px solid rgba(245,200,66,0.35)", background: "rgba(245,200,66,0.02)" }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 12 }}>
              <div>
                <h3 style={{ margin: 0, color: "#f5c842", fontSize: 18, fontWeight: 800 }}>🏆 Predict the Tournament Winner</h3>
                <p style={{ margin: "4px 0 0", fontSize: 12, color: "rgba(232,234,240,0.5)" }}>Correct answers grant bonus points computed from active team betting odds.</p>
              </div>
              <div style={{ textAlign: "right" }}>
                <span style={styles.badge("gold")}>⏱️ {kickoffCountdown}</span>
              </div>
            </div>

            <div style={{ display: "flex", gap: 12, marginTop: 14, alignItems: "center" }}>
              <div style={{ flex: 1 }}>
                <select 
                  style={styles.input} 
                  value={currentUser?.tournamentWinnerPick || ""} 
                  disabled={currentUser?.isPickLocked || kickoffCountdown === "Tournament Started"}
                  onChange={(e) => handleAutosaveWinner(e.target.value)}
                >
                  <option value="">Choose winning champion...</option>
                  {TEAMS.map(t => {
                    const odds = tournamentConfig.champion_odds[t] || "10.00";
                    return <option key={t} value={t}>{flagEmoji(t)} {t} (Odds: {odds})</option>;
                  })}
                </select>
              </div>

              {!currentUser?.isPickLocked && kickoffCountdown !== "Tournament Started" && (
                <button 
                  style={{ ...styles.btn("primary"), padding: "10px 16px", whiteSpace: "nowrap", fontWeight: 700 }}
                  onClick={handleLockPick}
                >
                  Lock Pick 🔒
                </button>
              )}
            </div>

            {currentUser?.isPickLocked && (
              <div style={{ marginTop: 12, background: "rgba(76,175,80,0.1)", border: "1px solid rgba(76,175,80,0.3)", padding: "8px 12px", borderRadius: 8, fontSize: 13, color: "#4caf50", fontWeight: 600 }}>
                🔒 Your prediction is locked: {currentUser?.tournamentWinnerPick ? `${flagEmoji(currentUser.tournamentWinnerPick)} ${currentUser.tournamentWinnerPick}` : ""}
              </div>
            )}
          </div>

          <div style={{ marginBottom: 28, marginTop: 24 }}>
            <h2 style={{ margin: "0 0 4px", fontSize: 26, fontWeight: 800 }}>Leaderboard</h2>
            <p style={{ margin: 0, color: "rgba(232,234,240,0.5)", fontSize: 14 }}>{tournamentConfig.tournament_name} · {leaderboard.length} players</p>
          </div>

          {tournamentConfig.tournament_winner && (
            <div style={{ ...styles.card, background: "rgba(245,200,66,0.08)", border: "1px solid rgba(245,200,66,0.25)", marginBottom: 20, display: "flex", alignItems: "center", gap: 12 }}>
              <div style={{ fontSize: 28 }}>🏆</div>
              <div>
                <div style={{ fontWeight: 700, color: "#f5c842" }}>Official champion: {flagEmoji(tournamentConfig.tournament_winner)} {tournamentConfig.tournament_winner}</div>
              </div>
            </div>
          )}

          {currentUser && (
            <div style={{ ...styles.card, background: "rgba(245,200,66,0.06)", border: "1px solid rgba(245,200,66,0.2)", marginBottom: 24 }}>
              <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between" }}>
                <div>
                  <div style={{ fontSize: 12, color: "rgba(232,234,240,0.4)" }}>Your bracket position</div>
                  <div style={{ fontWeight: 800, fontSize: 20 }}>#{leaderboard.findIndex(u => u.username?.toLowerCase() === session.username) + 1} — {currentUser.username}</div>
                </div>
                <div style={{ textAlign: "right", marginLeft: "auto" }}>
                  <div style={{ fontSize: 28, fontWeight: 800, color: "#f5c842" }}>{(leaderboard.find(x=>x.username?.toLowerCase()===session.username)?.computedPoints || 0).toFixed(2)}</div>
                  <div style={{ fontSize: 11, color: "rgba(232,234,240,0.4)" }}>pts</div>
                </div>
              </div>
              <div style={{ marginTop: 10, display: "flex", gap: 10 }}>
                <span style={styles.badge("default")}>❤️ Fan of: {currentUser.favoriteTeam ? `${flagEmoji(currentUser.favoriteTeam)} ${currentUser.favoriteTeam}` : "None"}</span>
                <span style={styles.badge("gold")}>🏆 Prediction: {currentUser.tournamentWinnerPick ? `${flagEmoji(currentUser.tournamentWinnerPick)} ${currentUser.tournamentWinnerPick}` : "Not selected"} {currentUser.isPickLocked && "🔒"}</span>
              </div>
            </div>
          )}

          <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(180px, 1fr))", gap: 12, marginBottom: 20 }}>
            {leaderboard.slice(0,3).map((u, i) => (
              <div key={u.username} style={{ ...styles.card, background: styles.podium[i]?.bg, border: `1px solid ${styles.podium[i]?.border}`, textAlign: "center", padding: "16px 12px" }}>
                <div style={{ fontSize: 26, marginBottom: 4 }}>{styles.podium[i]?.rank}</div>
                <div style={{ fontWeight: 800, fontSize: 14, color: styles.podium[i]?.color, marginBottom: 2 }}>{u.username}</div>
                <div style={{ fontSize: 20, fontWeight: 800 }}>{u.computedPoints.toFixed(2)}</div>
                <div style={{ fontSize: 11, marginTop: 6, color: "rgba(232,234,240,0.45)", display: 'flex', flexDirection: 'column', gap: 2 }}>
                  <span>❤️ {u.favoriteTeam ? flagEmoji(u.favoriteTeam) : "🏳️"}</span>
                  <span>🏆 {u.tournamentWinnerPick ? flagEmoji(u.tournamentWinnerPick) : "🏳️"} {u.isPickLocked && "🔒"}</span>
                </div>
              </div>
            ))}
          </div>

          {leaderboard.slice(3).map((u, i) => (
            <div key={u.username} style={{ ...styles.card, display: "flex", alignItems: "center", gap: 14, padding: "14px 20px" }}>
              <div style={{ width: 28, textAlign: "center", fontWeight: 700, color: "rgba(232,234,240,0.3)" }}>#{i+4}</div>
              <div style={{ flex: 1 }}>
                <div style={{ fontWeight: 600, fontSize: 14 }}>{u.username}</div>
                <div style={{ fontSize: 12, color: "rgba(232,234,240,0.4)", display: "flex", gap: 10 }}>
                  <span>Fan: {u.favoriteTeam ? `${flagEmoji(u.favoriteTeam)} ${u.favoriteTeam}` : "🏳️"}</span>
                  <span>Champ: {u.tournamentWinnerPick ? `${flagEmoji(u.tournamentWinnerPick)} ${u.tournamentWinnerPick}` : "🏳️"} {u.isPickLocked && "🔒"}</span>
                </div>
              </div>
              <div style={{ fontWeight: 800, fontSize: 18 }}>{u.computedPoints.toFixed(2)}</div>
            </div>
          ))}
        </div>
      )}

      {session && !isAdmin && page === "picks" && (
        <div style={{ maxWidth: 700, margin: "0 auto", padding: "32px 24px" }}>
          <div style={{ marginBottom: 28 }}>
            <h2 style={{ margin: "0 0 4px", fontSize: 26, fontWeight: 800 }}>Next matchday</h2>
            <p style={{ margin: 0, color: "rgba(232,234,240,0.5)", fontSize: 14 }}>⏱ Picks lock automatically at match kickoff</p>
          </div>
          {pickableMatches.slice(0, 10).length === 0 ? (
            <div style={{ textAlign: "center", padding: "60px 0", color: "rgba(232,234,240,0.3)" }}>No upcoming fixtures with odds. Check back soon!</div>
          ) : (
            pickableMatches.slice(0, 10).map(m => {
              const userPick = currentUser?.picks?.[m.id];
              const cd = countdown(m);
              return (
                <div key={m.id} style={styles.card}>
                  <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 14 }}>
                    <div>
                      <div style={{ fontWeight: 800, fontSize: 17 }}>{flagEmoji(m.team1)} {m.team1} vs {m.team2} {flagEmoji(m.team2)}</div>
                      <div style={{ fontSize: 12, color: "rgba(232,234,240,0.4)", marginTop: 3 }}>{m.match_date} · {m.match_time} {m.tournament_stage && `· ${m.tournament_stage}`}</div>
                    </div>
                    {cd && <span style={styles.badge("gold")}>⏱ {cd}</span>}
                  </div>
                  <div style={{ display: "flex", gap: 10 }}>
                    {[["1", m.odds1, m.team1], ["X", m.oddsx, "Draw"], ["2", m.odds2, m.team2]].map(([val, odds, label]) => (
                      <button key={val} style={{ ...styles.pickBtn(userPick === val, val), flex: 1, display: "flex", flexDirection: "column", alignItems: "center" }} onClick={() => makePick(m.id, val)}>
                        <span style={{ fontSize: 11, opacity: 0.6 }}>{label}</span>
                        <span style={{ fontSize: 16 }}>{val}</span>
                        <span style={{ fontSize: 13, fontWeight: 800 }}>{odds}</span>
                      </button>
                    ))}
                  </div>
                </div>
              );
            })
          )}
        </div>
      )}

      {session && !isAdmin && page === "results" && (
        <div style={{ maxWidth: 700, margin: "0 auto", padding: "32px 24px" }}>
          <div style={{ marginBottom: 28 }}>
            <h2 style={{ margin: "0 0 4px", fontSize: 26, fontWeight: 800 }}>Results</h2>
          </div>
          {matches.filter(m => m.result).sort((a,b) => kickoffDate(b) - kickoffDate(a)).map(m => {
            const userPick = currentUser?.picks?.[m.id];
            const correct = userPick === m.result;
            return (
              <div key={m.id} style={{ ...styles.card, background: correct ? "rgba(76,175,80,0.05)" : "rgba(255,255,255,0.04)" }}>
                <div style={{ display: "flex", justifyContent: "space-between" }}>
                  <div style={{ fontWeight: 800 }}>{flagEmoji(m.team1)} {m.team1} vs {m.team2} {flagEmoji(m.team2)}</div>
                  <div style={{ color: "#f5c842", fontWeight: 700 }}>Outcome: {m.result}</div>
                </div>
                <div style={{ marginTop: 10 }}>
                  {userPick ? <span style={styles.badge(correct ? "green" : "")}>Your selection: {userPick}</span> : <span>No prediction logged</span>}
                </div>
              </div>
            );
          })}
        </div>
      )}

      {session && !isAdmin && page === "schedule" && (
        <div style={{ maxWidth: 760, margin: "0 auto", padding: "32px 24px" }}>
          <div style={{ display: "flex", gap: 8, marginBottom: 24 }}>
            {["ALL", "UPCOMING", "RESULTS"].map(f => (
              <button key={f} style={styles.btn(scheduleFilter===f?"primary":"ghost")} onClick={()=>setScheduleFilter(f)}>{f}</button>
            ))}
          </div>
          {matches.filter(m => {
            if (scheduleFilter === "UPCOMING") return !m.result;
            if (scheduleFilter === "RESULTS") return !!m.result;
            return true;
          }).map(m => (
            <div key={m.id} style={styles.card}>
              <div style={{ display: "grid", gridTemplateColumns: "1fr auto 1fr", alignItems: "center", textAlign: "center" }}>
                <div>{flagEmoji(m.team1)} {m.team1}</div>
                <div style={{ fontWeight: 800, background: "rgba(255,255,255,0.05)", padding: "4px 12px", borderRadius: 6 }}>
                  {m.result ? `FT: ${m.result}` : m.match_time}
                </div>
                <div>{m.team2} {flagEmoji(m.team2)}</div>
              </div>
            </div>
          ))}
        </div>
      )}

      {session && isAdmin && page === "admin" && (
        <div style={{ maxWidth: 780, margin: "0 auto", padding: "32px 24px" }}>
          <div style={{ display: "flex", gap: 8, marginBottom: 24 }}>
            {["matches","results","tournament","players"].map(k => (
              <button key={k} style={styles.btn(adminTab===k?"primary":"ghost")} onClick={() => setAdminTab(k)}>{k.toUpperCase()}</button>
            ))}
          </div>

          {adminTab === "matches" && (
            <div>
              <div style={styles.card}>
                <div style={{ fontWeight: 700, marginBottom: 16 }}>Schedule Single Match</div>
                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
                  <select style={styles.input} value={bulkTeam1} onChange={e=>setBulkTeam1(e.target.value)}><option value="">Home team...</option>{TEAMS.map(t=><option key={t}>{t}</option>)}</select>
                  <select style={styles.input} value={bulkTeam2} onChange={e=>setBulkTeam2(e.target.value)}><option value="">Away team...</option>{TEAMS.map(t=><option key={t}>{t}</option>)}</select>
                  <input type="date" style={styles.input} value={bulkDate} onChange={e=>setBulkDate(e.target.value)} />
                  <input type="time" style={styles.input} value={bulkTime} onChange={e=>setBulkTime(e.target.value)} />
                  <input type="number" step="0.01" style={styles.input} placeholder="Odds 1" value={bulkOdds1} onChange={e=>setBulkOdds1(e.target.value)} />
                  <input type="number" step="0.01" style={styles.input} placeholder="Odds X" value={bulkOddsX} onChange={e=>setBulkOddsX(e.target.value)} />
                  <input type="number" step="0.01" style={styles.input} placeholder="Odds 2" value={bulkOdds2} onChange={e=>setBulkOdds2(e.target.value)} />
                  <input style={styles.input} placeholder="Stage (e.g. Group A)" value={bulkGroup} onChange={e=>setBulkGroup(e.target.value)} />
                </div>
                {addError && <div style={{ color: "#e24b4b", marginTop: 8 }}>{addError}</div>}
                <button style={{ ...styles.btn("primary"), marginTop: 16 }} onClick={adminAddMatch}>Add match</button>
              </div>

              {matches.filter(m => !m.result).map(m => (
                <div key={m.id} style={{ ...styles.card, display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                  <div>{m.team1} vs {m.team2} ({m.match_date})</div>
                  <button style={styles.btn("danger")} onClick={() => adminDeleteMatch(m.id)}>Delete</button>
                </div>
              ))}
            </div>
          )}

          {adminTab === "results" && (
            <div>
              {matches.filter(m => !m.result && kickoffDate(m) <= new Date()).sort((a, b) => kickoffDate(a) - kickoffDate(b)).map(m => (
                <div key={m.id} style={styles.card}>
                  <div style={{ fontWeight: 700, marginBottom: 10 }}>{m.team1} vs {m.team2}</div>
                  <div style={{ display: "flex", gap: 10 }}>
                    <button style={styles.btn("ghost")} onClick={() => adminSetResult(m.id, "1")}>1</button>
                    <button style={styles.btn("ghost")} onClick={() => adminSetResult(m.id, "X")}>X</button>
                    <button style={styles.btn("ghost")} onClick={() => adminSetResult(m.id, "2")}>2</button>
                  </div>
                </div>
              ))}
              {matches.filter(m => m.result).sort((a,b) => kickoffDate(b) - kickoffDate(a)).map(m => (
                <div key={m.id} style={{ ...styles.card, display: "flex", justifyContent: "space-between" }}>
                  <div>{m.team1} vs {m.team2} [Winner: {m.result}]</div>
                  <button style={styles.btn("ghost")} onClick={() => adminUndoResult(m.id)}>Undo</button>
                </div>
              ))}
            </div>
          )}

          {adminTab === "tournament" && (
            <div style={styles.card}>
              <label style={styles.label}>Tournament Headline</label>
              <input style={{ ...styles.input, marginBottom: 14 }} value={tournamentConfig.tournament_name} onChange={e => adminUpdateConfig(e.target.value, tournamentConfig.tournament_winner)} />
              
              <label style={styles.label}>Set Decided Tournament Winner</label>
              <select style={styles.input} value={tournamentConfig.tournament_winner || ""} onChange={e => adminUpdateConfig(tournamentConfig.tournament_name, e.target.value || null)}>
                <option value="">Tournament Ongoing</option>
                {TEAMS.map(t => <option key={t} value={t}>{t}</option>)}
              </select>

              <div style={{ marginTop: 20, display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
                {TEAMS.map(t => (
                  <div key={t} style={{ display: "flex", alignItems: "center", background: "rgba(255,255,255,0.02)", padding: 6, borderRadius: 6 }}>
                    <span style={{ flex: 1, fontSize: 12 }}>{t}</span>
                    <input type="number" step="0.01" style={{ ...styles.input, width: 70 }} value={tournamentConfig.champion_odds[t] || ""} onChange={e => adminUpdateChampionOdds(t, e.target.value)} />
                  </div>
                ))}
              </div>
            </div>
          )}

          {adminTab === "players" && (
            <div>
              {Object.keys(users).map(k => {
                const u = users[k];
                return (
                  <div key={k} style={{ ...styles.card, display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                    <div>
                      <strong>{u.username}</strong> {u.isAdmin && "(Admin)"}
                      <div style={{ fontSize: 12, color: "rgba(232,234,240,0.4)" }}>
                        Fan: {u.favoriteTeam} | Prediction: {u.tournamentWinnerPick} {u.isPickLocked && "🔒"}
                      </div>
                    </div>
                    {!u.isAdmin && <button style={styles.btn("danger")} onClick={() => adminDeleteUser(k)}>Delete Account</button>}
                  </div>
                );
              })}
            </div>
          )}
        </div>
      )}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>
</body>
</html>
